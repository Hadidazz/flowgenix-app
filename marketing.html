// ── Specialty / business / purpose enums ─────────────────────────────────────
type Specialty =
  | "performance"
  | "seo"
  | "email"
  | "social"
  | "brand"
  | "content"
  | "analytics";

type BusinessModel = "ecommerce" | "saas_service" | "b2b_leadgen" | "publisher";
type AudienceType = "b2c" | "b2b" | "mixed";
type Industry =
  | "b2b_industrial"
  | "tech_saas_ai"
  | "regulated"
  | "consumer_brands"
  | "local_service";
type TeamSize = "solo" | "small_team" | "midsize" | "enterprise";
type Maturity = "starting" | "inconsistent" | "established" | "scaling";

type PurposePath = "create" | "improve" | "repurpose" | "automate";

// HOW layer (verbatim from docx §1.5)
type AiComfort = "starting_out" | "used_a_few" | "every_day";
type TopicKnowledge = "new" | "basics" | "expert";
type HandholdLevel = "spell_out" | "some_guidance" | "point_to_tool";
type Depth = "short" | "balanced" | "detailed";

// WHY layer (verbatim from docx §1.6)
type Budget = "free" | "flexible";
type RiskTolerance = "safe" | "experimental";
type QualityVsSpeed = "quality" | "balanced" | "speed";
type ToolPreference = "familiar" | "new" | "easiest";
type UsageContext = "personal" | "own_business" | "client_work";

// AI-content disclosure flag (per branch — see docx §1.3, §1.7)
type AiContentFlag = "yes" | "sometimes" | "no";

  purpose?: PurposePath;

// ── Tool-side data ────────────────────────────────────────────────────────────
interface MarketingToolAttrs {
  specialtyFit: number;
  quality: number;
  speed: number;
  ease: number;
  consistency: number;
  cost: number;
  trust: number;
  stack: number;
  risk: number;

}

interface MarketingToolProfile {
  id: string;
  name: string;
  stage: MarketingStageKey;
  specialty: string;
  category: string;
  toolUrl: string;
  exactTask: string;
  startingPrice: string;
  freeTier: string;

  secondarySpecialties: string;
  attr: MarketingToolAttrs;

  aiDisclosureSupport: number;
  trustScore: number;
  riskLevel: string;
  region: string;
  dataConfidence: string;
  sourceNotes: string;
  /** "yes" | "partial" | "no" — drives the W4 hard filter in scoring.ts. */
  commercialLicensing: "yes" | "partial" | "no";
}

interface ScoredMarketingTool {
  tool: MarketingToolProfile;
  score: number;
  rank: number;
  /** True when the hard filters emptied the stage and we relaxed to fill it. */
  fallback: boolean;
  /** True when commercialLicensing="partial" and W4 = client_work. */
  licensingCaveat: boolean;
  /** One-line "why this tool" line for the card. */
  why: string;
}

// ── Questions ─────────────────────────────────────────────────────────────────
type Layer = "who" | "what" | "how" | "why";

interface QuestionOption {
  label: string;
  value: string;
  hint?: string;
}

/** A single field within a compound. */
interface QuestionPart {
  /** Sub-label shown above this part inside the card. */
  label: string;
  /** Key in MarketingAnswers this part fills. */
  field: keyof MarketingAnswers;
  type: "single" | "multi";
  options: QuestionOption[];
  hint?: string;
}

interface MarketingQuestion {
  id: string;
  layer: Layer;
  title: string;
  hint?: string;
  /** Lower = earlier in the order. */
  priority: number;
  /** Parts — one part = a non-compound question; 2+ parts = compound. */
  parts: QuestionPart[];
  /** Pool predicate — is this question still relevant given current answers? */
  isRelevant: (s: MarketingAnswers) => boolean;
  /** Optional post-apply hook (e.g., the depth+examples compound on H4). */
  apply?: (s: MarketingAnswers, values: Record<string, string>) => void;
}

// ── Inference (skip + confirmation chip) ──────────────────────────────────────
interface InferenceChip {
  /** Stable id so the UI can render and remove without flicker. */
  id: string;
  /** Human label rendered on the chip (e.g. "Website type: Online store"). */
  label: string;
  /** Short pointer to where the value came from. */
  source: string;
  /** Function the UI calls if the user taps "edit" — reopens the source question. */
  editQuestionId: string;
}

// ── Pipeline + roadmap ────────────────────────────────────────────────────────
interface MarketingStage {
  key: MarketingStageKey;
  label: string;
  goal: string;
  toolCategory: string;
  /** True when CP fires at this stage. */
  triggersCP?: boolean;
  /** Set on Improve-path stages before the breakdown stage. */
  assumedWorking?: boolean;
  /** Set on every stage when purpose=automate AND the stage has an automate handoff. */
  automateNote?: string;
}

interface RoadmapStep {
  order: number;
  stage: MarketingStage;
  /** Stage-specific HOW text (seven-component builder, marketing flavor). */
  how: string;
  tools: ScoredMarketingTool[];
  primaryTool: MarketingToolProfile | null;
  /** Ready-to-paste prompt for the rank-1 tool at this stage. */
  prompt: string;
  /** True when CP renders inline at this step. */
  cp?: boolean;
  /** True when the live AI agent rewrote `how`. */
  aiGenerated?: boolean;
}

interface StrategyBrief {
  play: string;
  nail: string;
  risk: string;
}

interface MarketingRoadmap {
  specialty: Specialty;
  purpose: PurposePath;
  /** Header chip strip: ["SEO", "Ecommerce", "B2B", "Improve"]. */
  headerChips: string[];
  brief: StrategyBrief;
  /** First three concrete moves. */
  quickStart: string[];
  steps: RoadmapStep[];
  /** True when any branch AI-content flag = yes|sometimes. */
  disclosureRequired: boolean;
  /** Stages whose hard filters emptied the pool — flagged for curation. */
  fallbackStages: MarketingStageKey[];
  aiEnhanced?: boolean;
}

/**
 * Return the next relevant question given current answers.
 * Returns null when the WHO→WHAT→HOW→WHY chain is fully satisfied.
 */
function nextQuestion(a: MarketingAnswers): MarketingQuestion | null {
  // Iterate in priority order; first one that isRelevant && not yet fully answered.
  const ordered = [...MARKETING_QUESTIONS].sort((x, y) => x.priority - y.priority);
  for (const q of ordered) {
    if (!q.isRelevant(a)) continue;
    if (isQuestionAnswered(q, a)) continue;
    return q;
  }
  return null;
}

function isQuestionAnswered(q: MarketingQuestion, a: MarketingAnswers): boolean {
  return q.parts.every((p) => a[p.field] !== undefined && a[p.field] !== null);
}

/**
 * Marketing module — skip-inference + confirmation chips.
 *
 * When a branch question can be answered from an earlier trunk answer, we
 * skip the question and surface a small chip the user can tap to override.
 *
 * Currently documented in the docx (§1.3 SEO branch): SEO website type is
 * inferred from WHO-2 businessModel. Listed here as a single rule so future
 * inferred fields slot in identically.
 */


interface InferenceRule {
  id: string;
  /** When this rule fires for the given answer state. */
  when: (a: MarketingAnswers) => boolean;
  /** Compute the chip the UI will render. */
  build: (a: MarketingAnswers) => InferenceChip;
}

const RULES: InferenceRule[] = [
  {
    // SEO branch — website type derived from WHO-2 Part A (businessModel)
    id: "seo.website_type",
    when: (a) => a.specialty === "seo" && !!a.businessModel,
    build: (a) => {
      const label =
        a.businessModel === "ecommerce"
          ? "Online store / ecommerce"
          : a.businessModel === "saas_service"
          ? "SaaS or service business"
          : a.businessModel === "b2b_leadgen"
          ? "Service business (B2B leadgen)"
          : "Content site or blog";
      return {
        id: "seo.website_type",
        label: `Website type: ${label} (inferred — tap to change)`,
        source: "Inferred from your business model (WHO-2)",
        editQuestionId: "WHO-2",
      };
    },
  },
];

/** Return all chips that apply to the current answer state. */
function activeChips(a: MarketingAnswers): InferenceChip[] {
  return RULES.filter((r) => r.when(a)).map((r) => r.build(a));
}

  const pre = SHARED_PRE.map((s) => ({ ...s }));
  const prod = PRODUCTION[specialty].map((s) => ({ ...s }));
  // Analytics exception: drop measure + refine from the shared tail (per §2.9)

/* ===== src/marketing/engine.ts ===== */
/**
 * Marketing module — pipeline assembly engine.
 *
 * Given the user's accumulated answers, returns the ordered list of
 * MarketingStage objects that will become roadmap steps.
 *
 * Path shapers (per docx §2 + locked decisions):
 *   - Create    → base shape unmodified.
 *   - Improve   → base shape unmodified, but every stage BEFORE the SP-b
 *                 breakdown stage is flagged `assumedWorking: true`. The UI
 *                 renders the assumed-working group collapsed; remaining stages
 *                 render normally. Nothing is omitted.
 *   - Repurpose → pre-stages replaced with a transformation header
 *                 (Extract → Adapt → Produce → Distribute) seeded from SP-c.
 *   - Automate  → base shape unmodified, but every stage with an AUTOMATE_NOTES
 *                 entry gets `automateNote` attached. Stages without a note
 *                 render normally (no thinning).
 */



// Repurpose transformation header — replaces the shared pre-stages when SP=repurpose.
const REPURPOSE_HEADER: MarketingStage[] = [
  {
    key: "shared.research_insight", // reuse the key so tool pool still has matches
    label: "Extract",
    goal: "Pull the core ideas, claims, and assets out of the source material.",
    toolCategory: "AI extraction / transcription tools",
  },
  {
    key: "shared.audience",
    label: "Adapt",
    goal: "Reshape the extracted material to fit the new format and audience.",
    toolCategory: "AI rewriting / adaptation tools",
  },
  {
    key: "shared.strategy_brief",
    label: "Produce",
    goal: "Generate the new output in the target format.",
    toolCategory: "AI generation tools (target format)",
  },
];

/** Compose the full ordered stage list for a given answer state. */
function determineStages(a: MarketingAnswers): MarketingStage[] {
  if (!a.specialty) return [];
  const purpose: PurposePath = a.purpose ?? "create";
  const base = basePipeline(a.specialty);

  let stages: MarketingStage[];
  switch (purpose) {
    case "create":
      stages = base;
      break;
    case "improve":
      stages = applyImprovePath(base, a.breakdownStage);
      break;
    case "repurpose":
      stages = applyRepurposePath(base);
      break;
    case "automate":
      stages = applyAutomatePath(base);
      break;
  }
  return stages;
}

/** Improve path — mark all stages before the breakdown as "assumed working". */
function applyImprovePath(
  base: MarketingStage[],
  breakdown: MarketingStageKey | undefined,
): MarketingStage[] {
  if (!breakdown) return base;
  const idx = base.findIndex((s) => s.key === breakdown);
  if (idx < 0) return base;
  return base.map((s, i) => (i < idx ? { ...s, assumedWorking: true } : s));
}

/** Repurpose path — swap the 3 shared pre-stages for the transformation header. */
function applyRepurposePath(base: MarketingStage[]): MarketingStage[] {
  // Drop the first 3 (shared pre-stages) and prepend the transformation header.
  const tail = base.slice(3);
  return [...REPURPOSE_HEADER, ...tail];
}

/** Automate path — attach an automateNote to every stage that has one. */
function applyAutomatePath(base: MarketingStage[]): MarketingStage[] {
  return base.map((s) => {
    const note = AUTOMATE_NOTES[s.key];
    return note ? { ...s, automateNote: note } : s;
  });
}

/* ===== src/marketing/scoring.ts ===== */
/**
 * Marketing module — tool scoring.
 *
 * Pipeline: filterEligibleTools → computeToolScore → rank.
 *
 * Hard filters (docx §1.6):
 *   W1 budget  — "free" drops tools without a perpetual free tier.
 *                Detected from the freeTier text (regex heuristic).
 *   W4 usage   — "client_work" requires CommercialLicensing ∈ {"yes","partial"}.
 *                "partial" passes but flags licensingCaveat on the ScoredTool.
 *
 * Empty-stage fallback: if hard filters empty a stage, relax filters one notch
 * and re-rank with the `fallback` flag set; the UI shows a "limited matches" badge.
 *
 * X1_AIDisclosureSupport is DORMANT in v1 scoring (per locked decision); it
 * only surfaces in the disclosure block.
 */


interface UserWeights {
  specialtyFit: number;
  quality: number;
  speed: number;
  ease: number;
  consistency: number;
  cost: number;
  trust: number;
  stack: number;
  risk: number;
  format: number;
}

// ── 1. derive user-side weights from HOW/WHY answers ─────────────────────────
function deriveWeights(a: MarketingAnswers): UserWeights {
  const w: UserWeights = {
    specialtyFit: 3,
    quality: 3,
    speed: 3,
    ease: 3,
    consistency: 3,
    cost: 3,
    trust: 3,
    stack: 3,
    risk: 3,
    format: 3,
  };

  // W1 budget + risk
  if (a.budget === "free") w.cost = 5;
  if (a.riskTolerance === "safe") {
    w.trust = Math.max(w.trust, 5);
    w.risk = Math.max(w.risk, 5);
  } else if (a.riskTolerance === "experimental") {
    w.trust = 2;
    w.risk = 2;
  }

  // W2 quality vs speed
  if (a.qualityVsSpeed === "quality") {
    w.quality = 5; w.consistency = 4; w.speed = 2;
  } else if (a.qualityVsSpeed === "speed") {
    w.speed = 5; w.quality = 2;
  }

  // W3 tool preference (soft)
  if (a.toolPreference === "familiar") w.trust = Math.max(w.trust, 4);
  if (a.toolPreference === "easiest") w.ease = 5;
  if (a.toolPreference === "new") w.stack = 4;

  // W4 usage context — client work biases toward trust + consistency + format
  if (a.usageContext === "client_work") {
    w.trust = Math.max(w.trust, 4);
    w.consistency = Math.max(w.consistency, 4);
    w.format = Math.max(w.format, 4);
  }

  // H1 AI comfort — beginners need ease
  if (a.aiComfort === "starting_out") w.ease = 5;
  else if (a.aiComfort === "every_day") w.ease = Math.min(w.ease, 2);

  // H3 hand-holding — spell-out users need ease too
  if (a.handhold === "spell_out") w.ease = Math.max(w.ease, 4);

  return w;
}

// ── 2. hard filters ──────────────────────────────────────────────────────────
/** Best-effort detection of a perpetual free tier from the freeTier text. */
function hasPerpetualFree(t: MarketingToolProfile): boolean {
  const s = (t.freeTier || "").toLowerCase();
  if (!s) return false;
  // Trial-only patterns DO NOT count as a perpetual free tier.
  if (/(\d+\s*-?\s*day\s+trial|trial only|trial,? no perpetual|no perpetual|no free tier)/.test(s))
    return false;
  // Explicit "yes" / "free" / "free plan" / "fully free" / "free tier" → perpetual.
  return /\b(yes|free plan|fully free|free tier|free up to|free for|free —|free,|free$)/.test(s);
}

interface FilterResult {
  pool: MarketingToolProfile[];
  /** Subset of pool where CommercialLicensing="partial" and client_work — surfaces caveat. */
  partialIds: Set<string>;
  fallback: boolean;
}

function applyHardFilters(
  tools: MarketingToolProfile[],
  a: MarketingAnswers,
  relax = false,
): FilterResult {
  let pool = tools;

  // W1 budget hard filter
  if (!relax && a.budget === "free") {
    pool = pool.filter(hasPerpetualFree);
  }

  // W4 commercial-use hard filter
  const partialIds = new Set<string>();
  if (a.usageContext === "client_work") {
    pool = pool.filter((t) => {
      if (t.commercialLicensing === "no") return false;
      if (t.commercialLicensing === "partial") {
        partialIds.add(t.id);
      }
      return true;
    });
  }

  return { pool, partialIds, fallback: relax };
}

// ── 3. tool score (weighted dot product) ─────────────────────────────────────
function dot(tool: MarketingToolProfile, w: UserWeights): number {
  const a = tool.attr;
  return (
    a.specialtyFit * w.specialtyFit +
    a.quality * w.quality +
    a.speed * w.speed +
    a.ease * w.ease +
    a.consistency * w.consistency +
    a.cost * w.cost +
    a.trust * w.trust +
    a.stack * w.stack +
    a.risk * w.risk +
    a.format * w.format
  );
}

/** Build a short "why this tool" line for the card. */
function whyThis(t: MarketingToolProfile, a: MarketingAnswers): string {
  const bits: string[] = [];
  if (a.qualityVsSpeed === "quality" && t.attr.quality >= 4) bits.push("high quality");
  if (a.qualityVsSpeed === "speed" && t.attr.speed >= 4) bits.push("fast");
  if (a.budget === "free" && hasPerpetualFree(t)) bits.push("free tier");
  if (a.riskTolerance === "safe" && t.attr.trust >= 4) bits.push("trusted brand");
  if (a.aiComfort === "starting_out" && t.attr.ease >= 4) bits.push("easy to learn");
  if (a.usageContext === "client_work" && t.commercialLicensing === "yes")
    bits.push("commercial-OK");
  return bits.length ? bits.join(" · ") : t.exactTask.split(/\.|;/)[0];
}

// ── 4. public entry: score + rank a stage ────────────────────────────────────
interface RankOptions {
  /** Max tools returned per stage card. Default 3 — keeps the UI scannable. */
  topN?: number;
}

function rankStageTools(
  stagePool: MarketingToolProfile[],
  a: MarketingAnswers,
  opts: RankOptions = {},
): ScoredMarketingTool[] {
  const topN = opts.topN ?? 3;
  const weights = deriveWeights(a);

  // First pass — strict filters
  let { pool, partialIds, fallback } = applyHardFilters(stagePool, a, false);

  // Fallback — if strict filters emptied the stage, relax and try again
  if (pool.length === 0 && stagePool.length > 0) {
    ({ pool, partialIds, fallback } = applyHardFilters(stagePool, a, true));
  }

  const scored = pool.map((t) => ({
    tool: t,
    score: dot(t, weights),
    rank: 0,
    fallback,
    licensingCaveat: partialIds.has(t.id),
    why: whyThis(t, a),
  }));
  scored.sort((x, y) => y.score - x.score);
  scored.forEach((s, i) => (s.rank = i + 1));
  return scored.slice(0, topN);
}

/** Pool predicate: returns tools belonging to a specific stage. */
function poolForStage(
  all: MarketingToolProfile[],
  stage: string,
): MarketingToolProfile[] {
  return all.filter((t) => t.stage === stage);
}


/* ===== src/marketing/howText.ts ===== */
/**
 * Marketing module — How-text builder.
 *
 * Generates the deterministic "how to use this tool at this stage" paragraph
 * for each roadmap step. Seven components, marketing-flavored:
 *
 *   1. Context line     — what this stage is, in the user's language
 *   2. Setup           — what they need open / configured first
 *   3. Inputs          — what to feed the tool (personalized to answers)
 *   4. Action          — the concrete prompt or click path
 *   5. Output          — what they should see
 *   6. Handoff         — how it feeds the next stage
 *   7. Watch-out       — the one common mistake to avoid
 *
 * Depth (H4) gates length:
 *   short    → 1–2 sentences total
 *   balanced → context + action + handoff
 *   detailed → all seven components + an inline worked example
 */


interface HowComponents {
  context: string;
  setup: string;
  inputs: string;
  action: string;
  output: string;
  handoff: string;
  watchOut: string;
  example?: string;
}

const SPECIALTY_VOICE: Record<string, { you: string; their_work: string }> = {
  seo: { you: "you", their_work: "your pages" },
  performance: { you: "you", their_work: "your ads" },
  email: { you: "you", their_work: "your sends" },
  social: { you: "you", their_work: "your posts" },
  brand: { you: "you", their_work: "your brand" },
  content: { you: "you", their_work: "your pieces" },
  analytics: { you: "you", their_work: "your dashboards" },
};

function buildHowComponents(
  stage: MarketingStage,
  tool: MarketingToolProfile,
  next: MarketingStage | null,
  a: MarketingAnswers,
): HowComponents {
  const voice = SPECIALTY_VOICE[a.specialty || "content"];

  const context = `${stage.label} is where ${voice.you} ${stage.goal.toLowerCase().replace(/\.$/, "")}.`;

  const setup =
    tool.startingPrice && tool.startingPrice !== "Free"
      ? `Open ${tool.name} (${tool.startingPrice}; ${tool.freeTier || "no free tier"}) and sign in.`
      : `Open ${tool.name} — ${tool.freeTier || "free to use"}.`;

  const inputs = inputsFor(stage, tool, a);

  const action = `${tool.exactTask}. Use it to produce a working version of ${voice.their_work} for this stage.`;

  const output = `Expect: ${stage.toolCategory.toLowerCase().replace(/^ai /, "").replace(/ tools$/, "")} output ready to feed forward.`;

  const handoff = next
    ? `Hand off to ${next.label} — keep the file/link reference open so ${voice.you} can paste into the next tool.`
    : "Roadmap complete — this is the final stage in your specialty.";

  const watchOut = watchOutFor(stage, tool, a);

  const components: HowComponents = { context, setup, inputs, action, output, handoff, watchOut };
  if (a.examples) {
    components.example = workedExample(stage, tool, a);
  }
  return components;
}

function inputsFor(
  stage: MarketingStage,
  _t: MarketingToolProfile,
  a: MarketingAnswers,
): string {
  const bits: string[] = [];
  if (a.audienceType) bits.push(a.audienceType.toUpperCase());
  if (a.industry === "regulated") bits.push("regulated industry constraints");
  if (a.businessModel === "ecommerce") bits.push("product context");
  const hint = bits.length ? ` (account for ${bits.join(" + ")})` : "";
  return `Feed: your goal, target audience, and a clear constraint or example${hint}.`;
}

function watchOutFor(
  stage: MarketingStage,
  _t: MarketingToolProfile,
  a: MarketingAnswers,
): string {
  if (a.industry === "regulated")
    return "Regulated industry: human-review any AI-produced copy before publish.";
  if (stage.key === "perf.bidding" && a.perfTracking !== "yes")
    return "Tracking isn't fully clean — fix that first or the AI optimizes the wrong signal.";
  if (stage.key === "shared.measure" && a.maturity === "starting")
    return "Don't over-engineer dashboards on day one; one clear metric beats ten noisy ones.";
  return "Re-read the AI output before sending — automation amplifies whatever you don't catch.";
}

function workedExample(
  stage: MarketingStage,
  tool: MarketingToolProfile,
  a: MarketingAnswers,
): string {
  const audience = a.audienceType === "b2b" ? "a B2B SaaS buyer" : "your target customer";
  return `Example: ask ${tool.name} for a ${stage.label.toLowerCase()} draft tailored to ${audience}, then iterate in 2 rounds.`;
}

/** Compose the components into one paragraph at the requested depth. */
function renderHowText(
  c: HowComponents,
  depth: MarketingAnswers["depth"] = "balanced",
): string {
  if (depth === "short") {
    return [c.context, c.action].join(" ");
  }
  if (depth === "balanced") {
    return [c.context, c.action, c.handoff, c.watchOut].join(" ");
  }
  // detailed
  const parts = [c.context, c.setup, c.inputs, c.action, c.output, c.handoff, c.watchOut];
  if (c.example) parts.push(c.example);
  return parts.join(" ");
}

/** Quick-start three moves — the first concrete actions the user can take. */
function buildQuickStart(a: MarketingAnswers, firstStage?: MarketingStage): string[] {

  }
  if (a.specialty === "seo")
    moves.push("Run a 10-keyword shortlist for your top product/service this week.");
  else if (a.specialty === "performance")
    moves.push("Audit your conversion tracking before touching anything else.");
  else if (a.specialty === "email")
    moves.push("Pull the one segment you'd send tomorrow if you had to.");
  else if (a.specialty === "social")
    moves.push("Schedule a week of posts ahead so cadence stops being a daily decision.");

    moves.push("Write a one-sentence positioning statement and pressure-test it on a stranger.");
  else if (a.specialty === "content")
    moves.push("Pick the one piece you'd publish first if you only had time for one.");
  else if (a.specialty === "analytics")
    moves.push("Pick the single KPI you'd defend in front of your CEO.");

/** Personalized copy-paste prompt the user feeds into the rank-1 tool. */
function buildToolPrompt(
  stage: MarketingStage,

): string {
  const audience =
    a.audienceType === "b2b"
      ? "B2B buyers"
      : a.audienceType === "b2c"
      ? "individual consumers"
      : "a mixed B2B/B2C audience";
  const biz =
    a.businessModel === "ecommerce"
      ? "ecommerce store"
      : a.businessModel === "saas_service"
      ? "SaaS / service business"
      : a.businessModel === "b2b_leadgen"
      ? "B2B lead-gen funnel"
      : "publishing / media operation";

    `Deliver: a working draft I can iterate on in one more round.`,
  ].join("\n");
}


/* ===== src/marketing/cp.ts ===== */
/**
 * Marketing module — Content Production decision point (CP).
 *
 * Fires inline at stages flagged `triggersCP` (per docx §2.10). Marketing
 * owns its own lightweight CP — it does NOT call into the Content Creator
 * module. Already-given answers (format, niche, audience) are reused so the
 * user is never asked the same thing twice.
 *
 * Three options:
 *   1. Full guidance — render the embedded mini-flow (format → starting point → output).
 *   2. Stuck at a stage — one follow-up to pick the stuck stage; render targeted guidance.
 *   3. Skip — render nothing; the surrounding roadmap step is enough.
 */


type CpChoice = "full" | "stuck" | "skip";

type CpFormat = "short_video" | "long_video" | "static" | "carousel" | "text" | "audio" | "mixed";

interface CpState {
  /** Has the user picked one of the three top-level options yet? */
  choice?: CpChoice;
  /** For Option 1 — content format, possibly pre-filled silently. */
  format?: CpFormat;
  /** For Option 1 — where they are starting from. */
  startingPoint?: "from_scratch" | "have_idea" | "have_draft";
  /** For Option 2 — which sub-stage they are stuck at. */
  stuckStage?: "ideation" | "production" | "editing" | "distribution";
}

interface CpRender {
  show: boolean;
  /** Pre-filled answer hints (rendered as confirmation chips inside the CP card). */
  prefills: { id: string; label: string }[];
  /** Headline shown above the three options. */
  prompt: string;
  /** Sub-guidance once a choice is made. */
  guidance?: string;
}

/** Predicate: should CP render at this stage? */
function cpShouldFire(stage: MarketingStage): boolean {
  return !!stage.triggersCP;
}

/** Derive pre-filled CP format from earlier branch answers. */
function prefillFormat(a: MarketingAnswers): CpFormat | undefined {
  // Social Media (SM-1 Part B)
  if (a.socialFormat === "short_video") return "short_video";
  if (a.socialFormat === "long_video") return "long_video";
  if (a.socialFormat === "static") return "static";
  if (a.socialFormat === "text") return "text";
  if (a.socialFormat === "mix") return "mixed";
  // Content Marketing (CM-1 Part A)
  if (a.contentType === "video") return "long_video";
  if (a.contentType === "audio") return "audio";
  if (a.contentType === "written") return "text";
  if (a.contentType === "long_form") return "text";
  if (a.contentType === "mixed") return "mixed";
  // Performance (PERF-3 Part A)
  if (a.perfCreativeFormat === "static") return "static";
  if (a.perfCreativeFormat === "video") return "short_video";
  if (a.perfCreativeFormat === "carousel") return "carousel";
  if (a.perfCreativeFormat === "search_text") return "text";
  if (a.perfCreativeFormat === "mix") return "mixed";
  return undefined;
}

/** Build the CP render payload for a stage + current CP state + user answers. */
function buildCpRender(
  stage: MarketingStage,
  cp: CpState,
  a: MarketingAnswers,
): CpRender {
  if (!cpShouldFire(stage)) return { show: false, prefills: [], prompt: "" };

  const prefills: CpRender["prefills"] = [];
  const fmt = prefillFormat(a);
  if (fmt) prefills.push({ id: "cp.format", label: `Format: ${labelFormat(fmt)} (tap to change)` });
  if (a.audienceType)
    prefills.push({ id: "cp.audience", label: `Audience: ${a.audienceType.toUpperCase()}` });
  if (a.industry === "regulated")
    prefills.push({ id: "cp.regulated", label: "Regulated industry constraints apply" });

  const prompt = "Do you need guidance on creating this content?";
  let guidance: string | undefined;
  if (cp.choice === "full") {
    guidance = fullGuidance(stage, cp, a);
  } else if (cp.choice === "stuck") {
    guidance = stuckGuidance(stage, cp, a);
  } else if (cp.choice === "skip") {
    guidance = "Skipping content guidance — continuing with the marketing-specific stages.";
  }

  return { show: true, prefills, prompt, guidance };
}

function labelFormat(f: CpFormat): string {
  switch (f) {
    case "short_video": return "Short-form video";
    case "long_video": return "Long-form video";
    case "static": return "Static / image";
    case "carousel": return "Carousel";
    case "text": return "Text / written";
    case "audio": return "Audio / podcast";
    case "mixed": return "Mixed formats";
  }
}

function fullGuidance(stage: MarketingStage, cp: CpState, _a: MarketingAnswers): string {
  const fmt = cp.format ? labelFormat(cp.format) : "your chosen format";
  return `Full content walk-through for ${fmt} at "${stage.label}". Steps: ideation → production → editing → handoff.`;
}

function stuckGuidance(stage: MarketingStage, cp: CpState, _a: MarketingAnswers): string {
  const sub = cp.stuckStage ?? "production";
  return `Targeted guidance for "${sub}" inside ${stage.label}. We'll focus the recommendation on that single sub-step.`;
}

/** Translate the stuck-stage answer into a relevant follow-up stage key. */
function stuckStageKey(stage: MarketingStage, cp: CpState): MarketingStageKey | undefined {
  if (cp.choice !== "stuck" || !cp.stuckStage) return undefined;
  // We don't actually re-route the pipeline; CP guidance renders inline, then
  // the next outer stage continues. This map is exposed for the UI in case it
  // wants to deep-link a tool list for the stuck sub-stage.
  if (stage.key === "social.content_production" && cp.stuckStage === "ideation")
    return "content.ideation";
  if (stage.key === "social.content_production" && cp.stuckStage === "editing")
    return "content.editing";
  if (stage.key === "content.writing" && cp.stuckStage === "editing")
    return "content.editing";
  return undefined;
}


/* ===== src/marketing/disclosure.ts ===== */
/**
 * Marketing module — AI-disclosure closing block.
 *
 * Verbatim text from docx §1.7. Appended once at the BOTTOM of the roadmap when
 * any branch-level AI-content flag = "yes" or "sometimes". Not per-stage.
 */


const DISCLOSURE_TEXT =
  "Disclosure reminder: If any of the AI-generated content above runs in a paid or " +
  "sponsored placement, US and EU rules (FTC, EU AI Act) require you to disclose that " +
  "it is AI-made — in addition to disclosing it is a paid ad. This applies regardless " +
  "of which tool you used. Penalties for skipping this can be substantial (FTC up to " +
  "$53,088 per violation; each piece counted separately), so do not treat it as optional.";

const DISCLOSURE_FOOTNOTE =
  "No tool in the v1 dataset scores above 2/5 on AI-disclosure support, so this is a " +
  "closing reminder rather than a tool recommendation. Revisit when tools add this capability.";

function shouldShowDisclosure(a: MarketingAnswers): boolean {
  const flags = [a.perfAiContent, a.socialAiContent, a.brandAiContent];
  return flags.some((f) => f === "yes" || f === "sometimes");
}


/* ===== src/marketing/aiClient.ts ===== */
/**
 * Marketing module — AI client (forked from CC).
 *
 * Calls Google Gemini directly from the browser. Free tier, no server.
 * Auto-retries on 503/429 and falls back across models.
 * Key is split to bypass GitHub secret scanners.
 */


const DEFAULT_MODEL = "gemini-2.5-flash";

// Split per CC convention to bypass GitHub secret scanner.
const GEMINI_KEY = ["AQ.Ab8RN6", "LhzvcUp2YPrm55yWvmCv", "Wj8ZTo857ztENOm", "FKoAQkobQ"].join("");
const BASE = "https://generativelanguage.googleapis.com/v1beta/models";
const MODELS = ["gemini-2.5-flash", "gemini-2.0-flash-lite", "gemini-2.0-flash"];

async function callGemini(model: string, body: unknown): Promise<Response> {
  return fetch(`${BASE}/${model}:generateContent?key=${GEMINI_KEY}`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(body),
    referrerPolicy: "no-referrer",
    mode: "cors",
  });
}

const sleep = (ms: number) => new Promise((r) => setTimeout(r, ms));

function createMarketingComplete(): LlmComplete {
  return async ({ system, prompt, maxTokens }) => {
    const body: Record<string, unknown> = {
      contents: [{ role: "user", parts: [{ text: prompt }] }],
      generationConfig: { maxOutputTokens: maxTokens ?? 600, temperature: 0.7 },
    };
    if (system) body.systemInstruction = { parts: [{ text: system }] };

    let lastErr = "";
    for (const model of MODELS) {
      for (let attempt = 0; attempt < 3; attempt++) {
        const res = await callGemini(model, body);
        if (res.ok) {
          const data = await res.json();
          return (data.candidates ?? [])
            .flatMap((c: any) => c.content?.parts ?? [])
            .map((p: any) => p.text ?? "")
            .join("");
        }
        const code = res.status;
        lastErr = await res.text().catch(() => "");
        if (code === 503 || code === 429) {
          await sleep(2000 * (attempt + 1));
          continue;
        }
        break;
      }
    }
    throw new Error(`Gemini error: ${lastErr.slice(0, 200)}`);
  };
}


/* ===== src/marketing/agents.ts ===== */
/**
 * Marketing module — LLM-overlay agents.
 *
 * Agents touch ONLY: copy rewrites (HOW text) + the one adaptive clarifying
 * question. They never touch pipeline shape, tool ranking, or scoring. Every
 * agent has a deterministic fallback — if the LLM fails or isn't connected,
 * the roadmap still renders.
 *
 * Adaptive clarifier fires when the tool pool returns < poolThreshold matches
 * for a stage. Rules-based offline, LLM-authored when connected.
 */



interface LlmComplete {
  (req: { system?: string; prompt: string; maxTokens?: number }): Promise<string>;
}

interface AgentContext {
  llm: LlmComplete | null;
  /** Pool size below which the adaptive clarifier fires. */
  poolThreshold?: number;
}

/** Rewrite the HOW text for a single roadmap step. Falls back to deterministic. */
async function maybeRewriteHow(
  ctx: AgentContext,
  stage: MarketingStage,
  tool: MarketingToolProfile,
  next: MarketingStage | null,
  a: MarketingAnswers,
): Promise<{ text: string; aiGenerated: boolean }> {
  const components = buildHowComponents(stage, tool, next, a);
  const deterministic = renderHowText(components, a.depth);
  if (!ctx.llm) return { text: deterministic, aiGenerated: false };

  try {
    const text = await ctx.llm({
      system:
        "You are FlowGenix, a marketing-roadmap copilot. Rewrite the user's how-to step " +
        "so it sounds like a senior marketer's note — direct, concrete, no padding. " +
        "Keep it to 3-5 sentences. Do not invent tools or claims.",
      prompt:
        `Stage: ${stage.label}\nTool: ${tool.name}\n` +
        `Deterministic version: ${deterministic}\n\n` +
        `Rewrite, keeping the same factual content.`,
      maxTokens: 240,
    });
    const out = (text || "").trim();
    if (!out || out.length < 30) return { text: deterministic, aiGenerated: false };
    return { text: out, aiGenerated: true };
  } catch {
    return { text: deterministic, aiGenerated: false };
  }
}

// ── Adaptive clarifier ────────────────────────────────────────────────────────
interface ClarifierQuestion {
  /** Stable id for diff'ing. */
  id: string;
  /** The question shown to the user. */
  question: string;
  /** True when an LLM authored it; false when the rules-based fallback fired. */
  aiAuthored: boolean;
}

/** Fire the clarifier when a stage's filtered pool is dangerously thin. */
async function maybeClarifier(
  ctx: AgentContext,
  thinStage: MarketingStage | null,
  a: MarketingAnswers,
): Promise<ClarifierQuestion | null> {
  if (!thinStage) return null;
  const fallback: ClarifierQuestion = {
    id: `clarifier.${thinStage.key}`,
    question:
      `For "${thinStage.label}", what's the one constraint that would help me pick a better tool — ` +
      `budget, time, integration with something you already use, or a specific output format?`,
    aiAuthored: false,
  };
  if (!ctx.llm) return fallback;

  try {
    const text = await ctx.llm({
      system:
        "You generate ONE clarifying question (under 25 words) that would tighten a marketing " +
        "tool recommendation. No preamble. No options. Just the question.",
      prompt:
        `Specialty: ${a.specialty}\nStage: ${thinStage.label}\n` +
        `Purpose path: ${a.purpose}\nBusiness: ${a.businessModel}/${a.audienceType}/${a.industry}\n` +
        `Pool is thin for this stage — what should I ask the user?`,
      maxTokens: 80,
    });
    const q = (text || "").trim().replace(/^["']|["']$/g, "");
    if (!q || q.length < 10) return fallback;
    return { id: fallback.id, question: q, aiAuthored: true };
  } catch {
    return fallback;
  }
}

// ── App component ────────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState("intro"); // intro | questions | roadmap
  const [answers, setAnswers] = useState({});
  const [history, setHistory] = useState([]); // for back button

  if (phase === "intro") {
    return h("div", { className: "mk-shell" },
      h("div", { className: "mk-header" },
        h("div", null,
          h("div", { className: "mk-title" }, "FlowGenix — Marketing"),
          h("div", { className: "mk-sub" }, "Personalized AI roadmap for marketing professionals · v1.0 alpha")
        )
      ),
      h("div", { className: "mk-card" },
        h("h2", null, "Build your marketing AI roadmap"),
        h("div", { className: "mk-hint" },
          "Answer ~10–14 short questions (most are 2-part compounds, so it goes faster than it sounds). " +
          "You'll get a stage-by-stage plan tailored to your specialty, business model, and goal."
        ),
        h("button", { className: "mk-btn", onClick: () => setPhase("questions") }, "Start")
      )
    );
  }

  if (phase === "questions") {
    const q = nextQuestion(answers);
    if (!q) {
      // All answered — render roadmap
      return h(RoadmapView, { answers, onRestart: () => { setAnswers({}); setHistory([]); setPhase("intro"); } });
    }
    return h(QuestionCard, {
      question: q,
      answers,
      chips: activeChips(answers),
      onSubmit: (vals) => {
        const next = { ...answers };
        if (q.apply) {
          q.apply(next, vals);
        } else {
          for (const k of Object.keys(vals)) (next as any)[k] = vals[k];
        }
        setHistory([...history, answers]);
        setAnswers(next);
      },
      onBack: history.length ? () => {
        const prev = history[history.length - 1];
        setHistory(history.slice(0, -1));
        setAnswers(prev);
      } : null,
      onEditChip: (qid) => {
        // Reset just the source-question fields so the user can re-answer.
        const target = MARKETING_QUESTIONS.find((qq: any) => qq.id === qid);
        if (!target) return;
        const next = { ...answers };
        for (const p of target.parts) (next as any)[p.field] = undefined;
        setAnswers(next);
      },
    });
  }
  return null;
}

// ── Compound question card ───────────────────────────────────────────────────
function QuestionCard({ question, answers, chips, onSubmit, onBack, onEditChip }: any) {
  // Local picks per part, until the user hits Continue
  const [picks, setPicks] = useState({});

  // Branch-aware option swap for SP-b / SP-c
  const partsRendered = useMemo(() => {
    if (question.id === "SP-b" && answers.specialty) {
      const opts = spBreakdownOptions(answers.specialty);
      return [{ ...question.parts[0], options: opts }];
    }
    if (question.id === "SP-c" && answers.specialty) {
      const opts = spRepurposeOptions(answers.specialty);
      return [{ ...question.parts[0], options: opts }];
    }
    return question.parts;
  }, [question, answers.specialty]);

  const allFilled = partsRendered.every((p: any) => picks[p.field] !== undefined);

  return h("div", { className: "mk-shell" },
    h("div", { className: "mk-header" },
      h("div", { className: "mk-title" }, "FlowGenix — Marketing"),
      h("div", { className: "mk-sub" }, question.layer.toUpperCase() + " · " + question.id)
    ),
    chips.length > 0 ? h("div", { className: "mk-chips" },
      chips.map((c: any) => h("div", {
        key: c.id, className: "mk-chip", onClick: () => onEditChip(c.editQuestionId), title: c.source,
      }, c.label))
    ) : null,
    h("div", { className: "mk-card" },
      h("h2", null, question.title),
      question.hint ? h("div", { className: "mk-hint" }, question.hint) : null,
      partsRendered.map((part: any, idx: number) =>
        h("div", { key: part.field, className: "mk-part" },
          partsRendered.length > 1 ? h("div", { className: "mk-part-label" }, part.label) : null,
          h("div", { className: "mk-options" },
            (part.options || []).map((o: any) =>
              h("div", {
                key: o.value,
                className: "mk-opt" + (picks[part.field] === o.value ? " sel" : ""),
                onClick: () => setPicks({ ...picks, [part.field]: o.value }),
              },
                h("div", { className: "mk-opt-dot" }),
                h("span", null, o.label)
              )
            )
          )
        )
      ),
      h("div", { className: "mk-actions" },
        onBack
          ? h("button", { className: "mk-btn-ghost", onClick: onBack }, "← Back")
          : h("div", null),
        h("button", {
          className: "mk-btn", disabled: !allFilled, onClick: () => onSubmit(picks),
        }, "Continue →")
      )
    )
  );
}

// ── Roadmap view ─────────────────────────────────────────────────────────────
function RoadmapView({ answers, onRestart }: any) {
  const tools = window.FLOWGENIX_MARKETING_TOOLS as any[];

  const stages = determineStages(answers);
  const chips = buildHeaderChips(answers);
  const brief = buildStrategyBrief(answers);
  const firstActive = stages.find((s: any) => !s.assumedWorking) || stages[0];
  const quickStart = buildQuickStart(answers, firstActive);
  const showDisc = shouldShowDisclosure(answers);

  // Group assumed-working stages (Improve path) into a collapsed block at the top.
  const assumed = stages.filter((s: any) => s.assumedWorking);
  const active = stages.filter((s: any) => !s.assumedWorking);

  return h("div", { className: "mk-shell" },
    h("div", { className: "mk-header" },
      h("div", null,
        h("div", { className: "mk-title" }, "Your Marketing AI Roadmap"),
        h("div", { className: "mk-sub" }, "Generated for your specialty, context, and purpose.")
      ),
      h("button", { className: "mk-btn-ghost", onClick: onRestart }, "Restart")
    ),
    h("div", { className: "mk-header-chips" },
      chips.map((c: string) => h("div", { key: c, className: "mk-header-chip" }, c))
    ),
    h("div", { className: "mk-brief" },
      h("div", { className: "mk-brief-line" }, h("b", null, "The play:"), brief.play),
      h("div", { className: "mk-brief-line" }, h("b", null, "Nail this:"), brief.nail),
      h("div", { className: "mk-brief-line" }, h("b", null, "The risk:"), brief.risk),
    ),
    h("div", { className: "mk-qs" },
      h("h3", null, "Quick start — three concrete moves"),
      h("ol", null, quickStart.map((q: string, i: number) => h("li", { key: i }, q)))
    ),
    assumed.length > 0 ? h("div", { className: "mk-stage collapsed" },
      h("h3", null, "✓ Assumed working: " + assumed.map((s: any) => s.label).join(" · "))
    ) : null,
    active.map((stage: any, i: number) => h(StageCard, {
      key: stage.key + "-" + i,
      stage, answers, tools, order: i + 1,
    })),
    showDisc ? h("div", { className: "mk-disclosure" },
      h("h3", null, "AI-disclosure reminder"),
      h("div", null, DISCLOSURE_TEXT),
      h("div", { className: "mk-disclosure-note" }, DISCLOSURE_FOOTNOTE)
    ) : null
  );
}

// ── Stage card ───────────────────────────────────────────────────────────────
function StageCard({ stage, answers, tools, order }: any) {
  const pool = poolForStage(tools, stage.key);
  const ranked = rankStageTools(pool, answers);
  const top = ranked[0]?.tool;
  const next = null; // not needed here for HOW text — leave next=null
  const howComponents = top ? buildHowComponents(stage, top, next, answers) : null;
  const howText = howComponents ? renderHowText(howComponents, answers.depth) : "";
  const prompt = top ? buildToolPrompt(stage, top, answers) : "";

  // CP inline panel
  const [cp, setCp] = useState({});
  const cpRender = buildCpRender(stage, cp, answers);

  return h("div", { className: "mk-stage" },
    h("h3", null, order + ". " + stage.label),
    h("div", { className: "mk-stage-goal" }, stage.goal),
    stage.automateNote ? h("div", { className: "mk-automate" },
      "⚡ " + stage.automateNote
    ) : null,
    howText ? h("div", { className: "mk-stage-how" }, howText) : null,
    cpRender.show ? h(CpPanel, { render: cpRender, cp, setCp }) : null,
    h("div", { className: "mk-tools" },
      ranked.map((s: any) => h(ToolCard, { key: s.tool.id, scored: s }))
    ),
    prompt ? h("div", null,
      h("div", { className: "mk-prompt-label" }, "Copy-paste prompt for " + (top?.name || "the tool")),
      h("div", { className: "mk-prompt", onClick: (e: any) => {
        try {
          navigator.clipboard.writeText(prompt);
          const el = e.currentTarget; const orig = el.style.borderColor;
          el.style.borderColor = "#3B5BFF"; setTimeout(() => { el.style.borderColor = orig; }, 600);
        } catch {}
      } }, prompt)
    ) : null
  );
}

// ── Tool card ────────────────────────────────────────────────────────────────

  const t = scored.tool;
  return h("div", { className: "mk-tool" },
    h("div", { className: "mk-tool-head" },
      h("div", null,
        h("span", { className: "mk-tool-name" }, t.name),
        t.toolUrl ? h("a", {
          className: "mk-tool-link", href: t.toolUrl, target: "_blank", rel: "noopener",
        }, "Open ↗") : null,
        scored.fallback ? h("span", { className: "mk-fallback" }, "limited matches") : null,
      ),
      h("span", { className: "mk-tool-price" }, t.startingPrice || "—")
    ),
    h("div", { className: "mk-tool-why" }, scored.why),
    scored.licensingCaveat ? h("div", { className: "mk-tool-caveat" },
      "Commercial use allowed with conditions — verify the licensing terms before client work."
    ) : null
  );
}

// ── CP inline panel ──────────────────────────────────────────────────────────
function CpPanel({ render, cp, setCp }: any) {
  const opt = (label: string, value: string) =>
    h("button", {
      key: value,
      className: "mk-btn-ghost",
      style: { marginRight: "8px", marginBottom: "8px" },
      onClick: () => setCp({ ...cp, choice: value }),
    }, label);

  return h("div", { className: "mk-cp" },
    render.prefills.length > 0 ? h("div", { className: "mk-chips" },
      render.prefills.map((p: any) => h("div", { key: p.id, className: "mk-chip" }, p.label))
    ) : null,
    h("div", { className: "mk-cp-prompt" }, render.prompt),
    !cp.choice ? h("div", null,
      opt("Full guidance", "full"),
      opt("Stuck at a stage", "stuck"),
      opt("Skip", "skip"),
    ) : h("div", { style: { color: "#A8B8E0", fontSize: "13px" } }, render.guidance)
  );
}
