/**
 * Stage registry — the canonical vocabulary every pipeline is composed from.
 *
 * Each StageKey owns:
 *   - label / goal           : shown in the roadmap card header
 *   - toolStage (optional)    : borrow another stage's candidate tool pool. Used by
 *                               "bridge" stages that the spec lists in a pipeline but
 *                               that reuse a sibling stage's tools (e.g. the Repurpose
 *                               "adaptation" bridge reuses the script/copy writers).
 *
 * The How-text content lives here too:
 *   - STAGE_CORE_INSTRUCTION : Component #3, the fixed factual task (bare imperative,
 *                              no tool name — the opening line names the tool).
 *   - STAGE_TIP              : the one-line tip used by the Balanced/Detailed depths.
 *   - STAGE_SUBSTEPS         : the numbered sub-steps used by the Detailed depth.
 */

/** Resolve the stage whose tool pool should serve `stage` (follows toolStage bridges). */
function resolveToolStage(stage: StageKey): StageKey {
  const def = STAGE_DEFS[stage] as StageDef;
  return (def.toolStage as StageKey | undefined) ?? stage;
}

/**
 * The 14-question dynamic pool (spec §2 + §8).
 *
 * Questions are NOT a fixed sequence. Each carries a `priority` (tie-break ordering)
 * and an `isRelevant(state)` trigger. pickNextQuestion() repeatedly returns the
 * lowest-priority relevant question that hasn't been answered yet, until the pool is
 * exhausted. Session length therefore varies by branch — exactly as the spec requires.
 *
 * Compound questions (Q5 purpose+pain, Q11 budget+risk) submit a "a|b" composite value
 * and split it in `apply`. Q10 sets depth + examples flag; Q14 sets usage context.

    apply: (s, value) => {
      // Map usage context → commercialUse flag (used by the hard-filter in scoring).
      if (value === "client") {
        s.commercialUse = "high";
        s.outputReqs = ["commercial"];
      } else if (value === "business") {
        s.commercialUse = "medium";
        s.outputReqs = [];
      } else {
        s.commercialUse = "low";
        s.outputReqs = [];
      }
    },
  } as Question,
];

const BY_ID: Record<string, Question> = Object.fromEntries(QUESTIONS.map((q) => [q.id, q]));

/** Inject family-specific options (Q2 specialties, Q3 platforms, Q6 pain stages, Q5b source). */
function resolveOptions(q: Question, s: UserState): Question {
  if (q.id === "Q2" && s.contentFamily) {
    return { ...q, options: Q2_OPTIONS[s.contentFamily] };
  }
  if (q.id === "Q3") {
    return { ...q, options: platformOptionsFor(s.contentFamily) };
  }
  if (q.id === "Q6" && s.contentFamily) {
    return { ...q, options: PAIN_STAGES_BY_FAMILY[s.contentFamily] };
  }
  if (q.id === "Q5b_repurpose") {
    // Source family deepen reuses the family list, minus the already-chosen target.
    return { ...q, options: FAMILY_OPTIONS.filter((o) => o.value !== s.contentFamily) };
  }
  return q;
}

/**
 * Pick the next question: lowest-priority relevant question not yet answered.
 * Returns null when the pool is exhausted (→ assemble the roadmap).
 */
function pickNextQuestion(s: UserState, answered: Set<string>): Question | null {
  const candidates = QUESTIONS.filter((q) => !answered.has(q.id) && q.isRelevant(s)).sort(
    (a, b) => a.priority - b.priority,
  );
  const next = candidates[0];
  return next ? resolveOptions(next, s) : null;
}

/** Apply a question's answer to the state (handles compound `apply` overrides). */
function applyAnswer(s: UserState, qId: QuestionId, value: string | string[]): void {
  const q = BY_ID[qId];
  if (!q) return;
  const composite = Array.isArray(value) ? value.join(",") : value;
  const apply = (q as Question & { apply?: (s: UserState, v: string) => void }).apply;
  if (apply) {
    apply(s, composite);
    return;
  }
  if (q.type === "multi") {
    (s as Record<string, unknown>)[q.field] = Array.isArray(value) ? value : [value];
  } else {
    (s as Record<string, unknown>)[q.field] = value;
  }
}

/**
 * Rough progress estimate for the UI. Total is dynamic (depends on branch), so we
 * estimate remaining by re-counting relevant unanswered questions.
 */
function estimateProgress(s: UserState, answered: Set<string>): { answered: number; total: number } {
  const remaining = QUESTIONS.filter((q) => !answered.has(q.id) && q.isRelevant(s)).length;
  return { answered: answered.size, total: answered.size + remaining };
}


/* ===== src/engine/scoring.ts ===== */
/**
 * WHY layer — scoring & hard filters (spec §6).
 *
 *   deriveWeights()        : maps Q7/Q11/Q12/Q13/Q14 + pain source → the 10 weights,
 *                            with W4 derived from Q7 and W5 derived from Q12 (§6.1).
 *   filterEligibleTools()  : hard filters (Budget=Free, Commercial=High) with the
 *                            empty-stage fallback (§6.2).
 *   computeToolScore()     : the Σ(attr_i · W_i) formula + niche tie-break (§6.3, §4.4).
 */





const WEIGHT_KEYS: (keyof Weights)[] = [
  "specialtyFit", "quality", "speed", "ease", "consistency",
  "cost", "trust", "stack", "risk", "format",
];

function baseWeights(): Weights {
  return {
    specialtyFit: 1, quality: 1, speed: 1, ease: 1, consistency: 1,
    cost: 1, trust: 1, stack: 1, risk: 1, format: 1,
  };
}

/**
 * Build the user's weight vector from their answers. Eight weights come straight
 * from WHY questions; W4 (ease) is derived from Q7 and W5 (consistency) from Q12 —
 * closing the gap the compound questions leave (spec rule §1.4).
 */
function deriveWeights(s: UserState, memory: WeightMemory = {}): Weights {
  const w = baseWeights();

  // W1 — specialty fit (Q4 niche). A specific niche makes exact-fit matter more.
  if (s.niches?.length) w.specialtyFit *= 1 + Math.min(s.niches.length, 2) * 0.15;

  // W2 quality / W3 speed (Q12) + W5 consistency derived from Q12.
  if (s.qualityVsSpeed === "quality") {
    w.quality *= 1.6;
    w.speed *= 0.75;
    w.consistency *= 1.4; // derived W5
  } else if (s.qualityVsSpeed === "speed") {
    w.speed *= 1.6;
    w.quality *= 0.8;
    w.consistency *= 0.85; // derived W5
  }

  // W4 ease — derived from Q7 (Beginner → high).
  if (s.aiFamiliarity === "beginner") w.ease *= 1.5;
  else if (s.aiFamiliarity === "advanced") w.ease *= 0.7;

  // W6 cost / W9 risk (Q11).
  if (s.budget === "free") w.cost *= 1.8;
  else if (s.budget === "low") w.cost *= 1.3;
  else if (s.budget === "flexible") w.cost *= 0.85;
  if (s.riskTolerance === "safe") w.risk *= 1.4;
  else if (s.riskTolerance === "experimental") w.risk *= 0.75;

  // W7 trust / W8 stack (Q13).
  const stack = s.stackPrefs ?? [];
  if (stack.includes("familiar")) w.trust *= 1.4;
  if (stack.includes("owned")) {
    w.stack *= 1.4;
    w.trust *= 1.15;
  }
  if (stack.includes("new")) w.specialtyFit *= 1.15;
  if (stack.includes("easy")) w.ease *= 1.4;

  // W10 format fit (Q14) + integration → stack, consistency requirement → W5.
  const reqs = s.outputReqs ?? [];
  if (reqs.includes("format")) w.format *= 1.5;
  if (reqs.includes("integrate")) w.stack *= 1.3;
  if (reqs.includes("consistent")) w.consistency *= 1.3;

  // Pain-source pre-sets (spec §4.2) — no structural effect, weights only.
  if (s.painSource === "save_time") w.speed *= 1.3;
  else if (s.painSource === "reduce_effort") w.ease *= 1.3;
  else if (s.painSource === "improve_quality") {
    w.quality *= 1.25;
    w.consistency *= 1.2;
  }

  // Feedback weight memory (spec §8) multiplies on top.
  for (const k of WEIGHT_KEYS) {
    const m = memory[k];
    if (typeof m === "number") w[k] *= m;
  }
  return w;
}

/** Count how many of the user's niches this tool is tagged for (for the tie-break). */
function nicheMatchCount(tool: ToolProfile, niches: string[] = []): number {
  if (!niches.length) return 0;
  const hay = (
    tool.bestForNiche +
    " " +
    tool.nicheTags.join(" ") +
    " " +
    tool.secondarySpecialties +
    " " +
    tool.primarySpecialty
  ).toLowerCase();
  let n = 0;
  for (const niche of niches) {
    // match on the first significant word of the niche label, e.g. "Business" / "Finance"
    const key = niche.toLowerCase().split(/[\s/]+/)[0];
    if (key.length > 2 && hay.includes(key)) n++;
  }
  return n;
}

/**
 * Final Score = Σ (toolAttr_i · userWeight_i) over the ten axes, plus a small
 * multi-niche tie-break: a tool tagged for two of the user's niches edges out one
 * tagged only for the primary (spec §4.4). The bonus is intentionally tiny so it
 * only ever breaks ties, never overrides the weighted signal.
 */
function computeToolScore(tool: ToolProfile, w: Weights, s: UserState): number {
  let score = 0;
  for (const k of WEIGHT_KEYS) score += tool.attr[k] * w[k];
  const matches = nicheMatchCount(tool, s.niches);
  if (matches > 0) score += matches * 0.25 * w.specialtyFit;
  return score;
}

interface FilteredPool {
  tools: ToolProfile[];
  fallback: boolean;
}

/**
 * Hard filters run BEFORE scoring (spec §6.2):
 *   - Budget=Free      → drop tools with costScore (W6) < 4
 *   - Commercial=High  → drop tools with riskLevel > 3
 * If a filter empties the stage, fall back to the unfiltered pool for THAT stage
 * only, so no stage is ever empty (and we flag it for curation review).
 */
function filterEligibleTools(stage: StageKey, s: UserState): FilteredPool {
  const sourceStage = resolveToolStage(stage);
  const raw = TOOL_PROFILES.filter((t) => t.stage === sourceStage);

  let pool = raw;
  if (s.budget === "free") pool = pool.filter((t) => t.attr.cost >= 4);
  if (s.commercialUse === "high") pool = pool.filter((t) => t.riskLevel <= 3);

  if (pool.length === 0 && raw.length > 0) {
    return { tools: raw, fallback: true };
  }
  return { tools: pool, fallback: false };
}

/** One-line "why this tool" for the roadmap card, citing what aligns with the user. */
function buildWhy(tool: ToolProfile, s: UserState): string {
  const reasons: string[] = [];
  const a = tool.attr;
  if (s.qualityVsSpeed === "quality" && a.quality >= 4) reasons.push("strong output quality");
  if (s.qualityVsSpeed === "speed" && a.speed >= 4) reasons.push("fast turnaround");
  if (s.budget === "free" && a.cost >= 4) reasons.push("a genuinely usable free tier");
  if (s.riskTolerance === "safe" && tool.trustScore >= 4) reasons.push("a proven, trusted track record");
  if ((s.stackPrefs ?? []).includes("easy") && a.ease >= 4) reasons.push("a shallow learning curve");
  if (s.commercialUse === "high" && tool.riskLevel <= 2) reasons.push("commercial-safe licensing");
  if ((s.outputReqs ?? []).includes("consistent") && a.consistency >= 4) reasons.push("reliably consistent results");
  if (reasons.length === 0 && tool.exactTask) {
    return `${tool.name} — best overall fit here: ${tool.exactTask.toLowerCase()}.`;
  }
  return `${tool.name} fits because it offers ${reasons.slice(0, 3).join(", ")}.`;
}

/** Filter → score → rank the top 3 tools for one stage. */
function scoreStage(stage: StageKey, s: UserState, w: Weights): ScoredTool[] {
  const { tools, fallback } = filterEligibleTools(stage, s);
  return tools
    .map((tool) => ({ tool, score: computeToolScore(tool, w, s) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 3)
    .map((x, i) => ({
      tool: x.tool,
      score: Math.round(x.score * 100) / 100,
      rank: i + 1,
      fallback,
      why: buildWhy(x.tool, s),
    }));
}


/* ===== src/engine/howText.ts ===== */
/**
 * THE HOW-TEXT ENGINE (spec §5) — the platform's core value proposition.
 *
 * Every roadmap step's guidance is assembled from seven independent components, the
 * same engine for every content family:
 *
 *   1. Opening line      — Q7 AI familiarity (+ Q5 purpose). Beginner / Intermediate / Advanced.
 *   2. Purpose framing   — Q5 purpose. Improve / Repurpose / Automate insert a reframing clause.
 *   3. Core instruction  — FIXED per stage (STAGE_CORE_INSTRUCTION). Never varies by user.
 *   4. Depth expansion   — Q10 depth. Short = nothing / Balanced = +tip / Detailed = +sub-steps.
 *   5. Example           — Q10 examples OR Q8=Low, flavored by Q4 niche.
 *   6. Handoff note      — Q9 handoff need. Low = omitted / Medium = generic / High = exact copy→paste.
 *   7. Pain-source close — Q5 pain source. A reinforcement line, or omitted.
 *
 * The function is pure: same UserState → same text. The optional AI-agent layer
 * (agents.ts) post-processes this deterministic baseline; it never replaces it.
 */





interface HowTextContext {
  tool: ToolProfile | null;
  stage: StageKey;
  specialty: Specialty;
  state: UserState;
  /** Label of the next stage in the pipeline, for the High-handoff bridge. Null if last. */
  nextStageLabel: string | null;
}

// Per-family noun for the thing the user "already has" (Improve framing).
const ARTIFACT: Record<string, string> = {
  video: "script",
  post: "draft",
  image: "image",
  blog: "draft",
  email: "draft",
};
// Per-family noun for the source content (Repurpose framing).
const SOURCE_ARTIFACT: Record<string, string> = {
  video: "video",
  post: "post",
  image: "image",
  blog: "article",
  email: "email",
};

// Niche → a concrete exemplar used by Component #5.
const NICHE_EXEMPLAR: Record<string, string> = {
  business: "a B2B SaaS product demo",
  education: "a 5-minute lesson on a tricky concept",
  health: "a myth-busting wellness explainer",
  technology: "an AI-tool walkthrough",
  lifestyle: "a day-in-the-life routine",
  entertainment: "a pop-culture hot take",
  finance: "a market-recap breakdown",
  creative: "a behind-the-scenes process reel",
  sports: "a workout-progression breakdown",
};

function primaryNicheKey(state: UserState): string | null {
  const first = state.niches?.[0];
  if (!first) return null;
  return first.toLowerCase().split(/[\s/]+/)[0];
}

function resolveCore(stage: StageKey, specialty: Specialty): string {
  let entry = STAGE_CORE_INSTRUCTION[stage];
  if (entry === undefined) entry = STAGE_CORE_INSTRUCTION[resolveToolStage(stage)];
  if (entry === undefined) return STAGE_DEFS[stage].goal.toLowerCase();
  if (typeof entry === "string") return entry;
  // per-specialty-subtype map
  const sub = specialtySubtype(specialty);
  return entry[sub] ?? Object.values(entry)[0];
}

/** Components #1 + #2: the opening line, with purpose framing folded in. */
function buildOpening(ctx: HowTextContext): string {
  const tool = ctx.tool?.name ?? "your AI assistant";
  const fam = ctx.state.contentFamily ?? "video";
  const ai = ctx.state.aiFamiliarity ?? "intermediate";
  const purpose = ctx.state.purpose ?? "create";

  if (purpose === "improve") {
    const artifact = ARTIFACT[fam] ?? "draft";
    const frame = `Since you already have a ${artifact}, `;
    if (ai === "beginner") return frame + `open ${tool} to refine it. Here's exactly what to do: `;
    if (ai === "advanced") return frame + `${tool} (refine): `;
    return frame + `use ${tool} to refine it — specifically: `;
  }

  if (purpose === "repurpose") {
    const src = SOURCE_ARTIFACT[ctx.state.sourceContentFamily ?? fam] ?? "content";
    const frame = `To turn your existing ${src} into this, `;
    if (ai === "beginner") return frame + `open ${tool}. Here's exactly what to do: `;
    if (ai === "advanced") return frame + `${tool}: `;
    return frame + `use ${tool} to `;
  }

  if (purpose === "automate") {
    const frame = `To automate this step, `;
    if (ai === "beginner") return frame + `open ${tool} and set it up once. Here's exactly what to do: `;
    if (ai === "advanced") return frame + `${tool}: `;
    return frame + `use ${tool} to `;
  }

  // create
  if (ai === "beginner") return `Open ${tool}. Here's exactly what to do: `;
  if (ai === "advanced") return `${tool}: `;
  return `Use ${tool} to `;
}

/** Component #4: depth expansion (Short / Balanced / Detailed). */
function buildDepth(ctx: HowTextContext, effectiveDepth: string): string {
  if (effectiveDepth === "short") return "";
  const tip = STAGE_TIP[ctx.stage] ?? STAGE_TIP[resolveToolStage(ctx.stage)];

  if (effectiveDepth === "balanced") {
    return tip ? ` Tip: ${tip}` : "";
  }

  // detailed — numbered sub-steps (the depth itself; no separate Tip line)
  const steps =
    STAGE_SUBSTEPS[ctx.stage] ??
    STAGE_SUBSTEPS[resolveToolStage(ctx.stage)] ??
    (tip
      ? ["Run one quick test before committing to the full output.", capitalize(tip), "Review once, refine once, then move on."]
      : ["Run one quick test before committing to the full output.", "Review once, refine once, then move on."]);
  const numbered = steps.map((s, i) => `(${i + 1}) ${s}`).join(" ");
  return ` ${numbered}`;
}

/** Component #5: niche-flavored example. */
function buildExample(ctx: HowTextContext): string {
  const key = primaryNicheKey(ctx.state);
  const exemplar = (key && NICHE_EXEMPLAR[key]) || "your typical piece";
  return ` For example, ${exemplar} works well here.`;
}

/** Component #6: handoff note (Low / Medium / High). */
function buildHandoff(ctx: HowTextContext): string {
  const need = ctx.state.handoffNeed ?? "medium";
  if (need === "low") return "";
  if (!ctx.nextStageLabel) {
    // last stage — nothing to hand off to
    return need === "high" ? " This is your final output — it's ready to ship." : "";
  }
  if (need === "high") {
    const tool = ctx.tool?.name ?? "this tool";
    return ` Copy the output from ${tool} — you'll feed this exact result straight into the next step (${ctx.nextStageLabel}).`;
  }
  return ` Use this output as the input for the next step (${ctx.nextStageLabel}).`;
}

/** Component #7: pain-source closing. */
function buildClosing(ctx: HowTextContext): string {
  switch (ctx.state.painSource) {
    case "save_time":
      return " This is the fastest path — don't over-edit here.";
    case "reduce_effort":
      return " Let the tool carry this one — a good-enough first pass is fine.";
    case "improve_quality":
      return " Take an extra pass here — it's the biggest lever on final quality.";
    case "avoid_confusion":
      return " If the output looks different than you expected, that's normal — tweak your input slightly and retry.";
    default:
      return "";
  }
}

function capitalize(s: string): string {
  return s.length ? s[0].toUpperCase() + s.slice(1) : s;
}

/**
 * Assemble the full How-text for one roadmap step from the seven components.
 * Avoid-confusion pain forces Detailed depth (spec §4.2 overrides Q7/Q10).
 */
function buildHowText(ctx: HowTextContext): string {
  const effectiveDepth =
    ctx.state.painSource === "avoid_confusion" ? "detailed" : ctx.state.depth ?? "balanced";
  const examplesOn = (ctx.state.examples ?? false) || ctx.state.nicheFamiliarity === "low";

  const opening = buildOpening(ctx); // C1 + C2
  const core = resolveCore(ctx.stage, ctx.specialty); // C3
  const depth = buildDepth(ctx, effectiveDepth); // C4
  const example = examplesOn ? buildExample(ctx) : ""; // C5
  const handoff = buildHandoff(ctx); // C6
  const closing = buildClosing(ctx); // C7

  // opening already ends in a space/colon; core is a bare lowercase imperative.
  return (opening + core + depth + example + handoff + closing).replace(/\s+/g, " ").trim();
}


/* ===== src/engine/prompts.ts ===== */
/**
 * Intelligence layer (deterministic core).
 *
 * Two things that make the roadmap feel bespoke even before a live model is wired:
 *   - buildToolPrompt()    : a ready-to-paste prompt for the rank-1 tool at each step,
 *                            personalized to the user's niche / platform / purpose / tone.
 *   - buildStrategyBrief()  : a 3-line strategic read of THIS user's path (the play, the
 *                            highest-leverage step, the main risk) — derived from answers.
 *
 * These are intentionally template-driven but answer-aware, so they're useful offline and
 * fast. The AI-agent layer (agents.ts) upgrades both with live Claude output when connected.
 */





// Prompt-flavored tone/audience phrases (terse, for prompt injection). Distinct from the
// sentence-length versions in engine.ts — named uniquely so the demo bundler's flat scope
// doesn't collide with them.
const PROMPT_TONE: Record<string, string> = {
  business: "confident, credible, ROI-aware",
  education: "clear, structured, scaffolded",
  health: "empathetic, accurate, non-hype",
  technology: "precise, technically credible",
  lifestyle: "warm, personality-forward",
  entertainment: "playful, fast-paced",
  finance: "measured, evidence-led, compliance-aware",
  creative: "expressive, craft-driven",
  sports: "motivational, action-oriented",
};

const PROMPT_AUDIENCE: Record<string, string> = {
  business: "decision-makers weighing ROI",
  education: "learners who want to actually understand it",
  health: "people seeking trustworthy, specific help",
  technology: "a mix of early adopters and skeptics",
  lifestyle: "followers who follow the person",
  entertainment: "audiences here to be entertained",
  finance: "self-directed people protective of their money",
  creative: "makers who appreciate craft",
  sports: "goal-driven people chasing progress",
};

// Role the tool/stage plays, used to frame the prompt persona.
function roleFor(stage: StageKey): string {
  const k = resolveToolStage(stage);
  const s = k as string;
  if (/copy|writ|script|draft|hook|angle|subject|seo|meta|expansion|narrative|sequence|personal/.test(s))
    return "an expert content writer and strategist";
  if (/image|visual|keyframe|thumbnail|graphic|infographic|product|background|illustration|inpaint|upscale|element|overlay|asset/.test(s))
    return "an expert AI image art-director";
  if (/video|scene|avatar|voice|footage|assembly|caption|clip|shot/.test(s))
    return "an expert AI video producer";
  if (/publish|schedul|performance|automation|deliver|flow|send/.test(s))
    return "a growth and distribution strategist";
  return "an expert content strategist";
}

function promptNicheKey(state: UserState): string {
  const first = state.niches?.[0] ?? "";
  return first.toLowerCase().split(/[\s/]+/)[0];
}

function coreAction(stage: StageKey, specialty: Specialty): string {
  let entry = STAGE_CORE_INSTRUCTION[stage] ?? STAGE_CORE_INSTRUCTION[resolveToolStage(stage)];
  if (!entry) return STAGE_DEFS[stage].goal.toLowerCase();
  if (typeof entry === "string") return entry;
  const sub = specialtySubtype(specialty);
  return entry[sub] ?? Object.values(entry)[0];
}

/**
 * A ready-to-paste prompt for the recommended tool at this step, tailored to the user.
 * This is the single highest-utility, most "intelligent-feeling" artifact in the roadmap.
 */
function buildToolPrompt(
  stage: StageKey,
  tool: ToolProfile | null,
  state: UserState,
): string {
  const nk = promptNicheKey(state);
  const niche = state.niches?.[0] ?? "my topic";
  const tone = PROMPT_TONE[nk] ?? "clear and on-brand";
  const audience = PROMPT_AUDIENCE[nk] ?? "my target audience";
  const platform = (state.platforms ?? [])[0] ?? "my main platform";
  const role = roleFor(stage);
  const action = coreAction(stage, state.specialty as Specialty).replace(/\.$/, "");
  const toolLine = tool ? ` I'm using ${tool.name}.` : "";
  const purpose = state.purpose ?? "create";
  const purposeLine =
    purpose === "improve"
      ? "I already have a draft and want to sharpen it."
      : purpose === "repurpose"
      ? "I'm repurposing existing content into this format."
      : purpose === "automate"
      ? "I want this step set up so it runs repeatedly with little effort."
      : "I'm building this from scratch.";

  return [
    `Act as ${role} for the ${niche} space.${toolLine}`,
    `Goal: ${STAGE_DEFS[stage].label} — ${STAGE_DEFS[stage].goal.toLowerCase()}`,
    `Task: ${action}.`,
    `Audience: ${audience}. Tone: ${tone}. Primary platform: ${platform}. Context: ${purposeLine}`,
    `Give me the strongest possible output, then list 2 quick variations I can A/B test.`,
  ].join("\n");
}

function buildStrategyBrief(state: UserState, roadmap: Roadmap): StrategyBrief {
  const nk = promptNicheKey(state);
  const niche = state.niches?.[0] ?? "your topic";
  const platform = (state.platforms ?? [])[0];
  const specialtyLabel = roadmap.summary.specialtyLabel;
  const purpose = state.purpose ?? "create";

  const playByPurpose: Record<string, string> = {
    create: `You're building a ${specialtyLabel.toLowerCase()} for ${niche}${platform ? ` on ${platform}` : ""} from scratch.`,
    improve: `You're fixing an existing ${specialtyLabel.toLowerCase()} for ${niche} — we'll start right where you're stuck.`,
    repurpose: `You're turning content you already have into a ${specialtyLabel.toLowerCase()} for ${niche}.`,
    automate: `You're setting up a ${specialtyLabel.toLowerCase()} workflow for ${niche} that can run again and again.`,
  };

  // The single step that matters most — explain WHY it matters in plain language.
  let focus: string;
  const steps = roadmap.steps;
  if (state.qualityVsSpeed === "speed" || state.painSource === "save_time") {
    const first = steps[0];
    focus = `Spend most of your effort on "${first.label}". Get it good enough and keep moving — speed is your priority.`;
  } else if (state.painSource === "improve_quality" || state.qualityVsSpeed === "quality") {
    const prod = steps.find((s) => /generation|writing|draft|copy|design|video|image|drafting/.test(s.stage)) ?? steps[Math.floor(steps.length / 2)];
    focus = `Put your extra time into "${prod.label}". For ${niche}, this is the step where quality either shines or falls flat.`;
  } else {
    const hookish = steps.find((s) => /hook|angle|concept|subject|copy|draft/.test(s.stage)) ?? steps[0];
    focus = `Focus on "${hookish.label}". The first impression decides whether the rest of your work gets seen at all.`;
  }

  // Main risk from niche + budget + commercial — in plain words.
  let risk: string;
  if (state.commercialUse === "high") {
    risk = `Since this is for a paying client, double-check the licensing on anything AI-generated before you hand it over.`;
  } else if (nk === "finance" || nk === "health") {
    risk = `${niche} is a sensitive area — make sure every claim you publish is one you can defend, and don't let the AI invent facts.`;
  } else if (state.budget === "free") {
    risk = `On free tools, expect to redo outputs more often than on paid ones. Plan extra time for re-rolls.`;
  } else if (state.aiFamiliarity === "beginner") {
    risk = `Don't over-edit. Start with what the recommended tool gives you, then refine — don't try to fix it before you've seen it.`;
  } else {
    risk = `Generic input gives generic output. Feed every tool your specific ${niche} angle, not a vague brief.`;
  }

  return { play: playByPurpose[purpose], nail: focus, risk };
}

interface StepIntel {
  input: string;
  output: string;
  proMove: string;
  avoid: string;
  minutes: string;
}

function buildStepIntel(stage: StageKey, prevOutput: string | null, state: UserState): StepIntel {
  const niche = state.niches?.[0] ?? "your topic";
  const output = STAGE_DELIVERABLE[stage] ?? STAGE_DEFS[stage].label.toLowerCase();
  const proMove = capitalize(STAGE_TIP[stage] ?? STAGE_TIP[resolveToolStage(stage)] ?? "ship a good-enough pass, then refine once.");
  const avoid = STAGE_PITFALL[stage] ?? STAGE_PITFALL[resolveToolStage(stage)] ?? `Generic output. Feed the tool your specific ${niche} angle, not a vague brief.`;
  return {
    input: prevOutput ? capitalize(prevOutput) + " from the previous step" : "Your topic, goal, and brief",
    output,
    proMove,
    avoid,
    minutes: minutesFor(stage),
  };
}

function capitalize(s: string): string {
  return s.length ? s[0].toUpperCase() + s.slice(1) : s;
}

/** The first three concrete moves — a quick-start the user can act on immediately. */
function buildQuickStart(steps: RoadmapStep[]): string[] {
  return steps.slice(0, 3).map((s, i) => {
    const tool = s.primaryTool?.name ?? "the recommended tool";
    const action = (STAGE_CORE_INSTRUCTION[s.stage] ?? STAGE_CORE_INSTRUCTION[resolveToolStage(s.stage)]) as string | undefined;
    const verb = typeof action === "string" ? action.replace(/\.$/, "") : s.goal.toLowerCase();
    return `${i + 1}. Open ${tool} and ${verb}.`;
  });
}


/* ===== src/engine/feedback.ts ===== */
/**
 * Feedback handling (spec §8).
 *
 * Feedback re-enters the question pool rather than restarting — only the relevant
 * questions are re-asked, and tool-level feedback mutates a persistent WeightMemory
 * that multiplies the derived weights on the next rescore.
 *
 *   After WHAT   → reroute, re-enter at Q1
 *   After HOW    → adjust depth/examples/handoff, re-enter at Q7 (re-run How-text)
 *   After WHY    → adjust weights, re-enter at Q11 (rescore)
 *   After output → reroute / adjust / rescore depending on the signal
 */


type FeedbackScope = "what" | "how" | "why" | "output";

/** Where a feedback scope re-enters the pool (spec §8 table). */
const FEEDBACK_REENTRY: Record<FeedbackScope, QuestionId> = {
  what: "Q1",
  how: "Q7",
  why: "Q11",
  output: "Q11",
};

/**
 * Apply a tool-card thumbs-down signal to the weight memory. Each multiplier nudges
 * the next rescore toward tools that fix the complaint. `good` reinforces lightly by
 * locking in the current bias (no-op multiplier of 1).
 */
function applyToolFeedback(memory: WeightMemory, signal: FeedbackSignal): WeightMemory {
  const m: WeightMemory = { ...memory };
  const bump = (k: keyof WeightMemory, factor: number) => {
    m[k] = (m[k] ?? 1) * factor;
  };
  switch (signal) {
    case "too_expensive":
      bump("cost", 1.6);
      break;
    case "low_quality":
      bump("quality", 1.4);
      bump("specialtyFit", 1.3);
      break;
    case "too_complex":
      bump("ease", 1.5);
      break;
    case "too_slow":
      bump("speed", 1.5);
      break;
    case "untrusted":
      bump("trust", 1.5);
      bump("risk", 1.3);
      break;
    case "inconsistent":
      bump("consistency", 1.4);
      break;
    case "good":
      // reinforcement only — keep current weighting
      break;
  }
  return m;
}

/** The minimal re-entry point for a single tool-level signal: rescore from Q11. */
function reentryForSignal(_signal: FeedbackSignal): QuestionId {
  return FEEDBACK_REENTRY.output;
}

/** Clamp run-away memory so repeated feedback can't explode a weight. */
function clampMemory(memory: WeightMemory, max = 3): WeightMemory {
  const out: WeightMemory = {};
  for (const [k, v] of Object.entries(memory)) {
    if (typeof v === "number") out[k as keyof WeightMemory] = Math.min(v, max);
  }
  return out;
}


/* ===== src/engine/agents.ts ===== */
/**
 * AI-agent layer.
 *
 * The deterministic engine (questions → filter → score → How-text + prompts + brief) is the
 * validated core and always runs first. Agents are an overlay that make the experience
 * genuinely dynamic:
 *
 *   - generateAdaptiveQuestion() : reads the answers so far and produces ONE bespoke
 *                                  clarifying question — so the flow is no longer a fixed
 *                                  sequence. (Rules-based offline; LLM-authored when connected.)
 *   - refineHowText()            : rewrites each step into specific, niche-aware coaching,
 *                                  preserving the factual instruction + handoff.
 *   - strategyBrief()            : upgrades the 3-line strategic read with live reasoning.
 *   - nicheInsight() / toolRationale() : enrich the niche block and the "why this tool" line.
 *
 * Everything degrades gracefully: no runtime, or any failure, falls back to deterministic
 * output. Correctness is never gated on a model being reachable. Pipeline shape and tool
 * ranking are NEVER changed by agents — only copy and the one adaptive question.
 */


type LlmComplete = (args: {
  system: string;
  prompt: string;
  maxTokens?: number;
}) => Promise<string>;

/** A single dynamic clarifying question the agent injects into the flow. */
interface AdaptiveQuestion {
  id: string;
  title: string;
  hint: string;
  options: { label: string; value: string }[];
  /** Set when an LLM authored this question (vs the rules fallback). */
  aiGenerated?: boolean;
}

interface AgentRuntime {
  readonly live: boolean;
  generateAdaptiveQuestions(state: UserState): Promise<AdaptiveQuestion[]>;
  nicheInsight(state: UserState, fallback: NicheBlock | null): Promise<NicheBlock | null>;
  refineHowText(step: RoadmapStep, state: UserState, deterministic: string): Promise<string>;
  toolRationale(tool: ToolProfile, state: UserState, deterministic: string): Promise<string>;
  strategyBrief(state: UserState, deterministic: StrategyBrief): Promise<StrategyBrief>;
}

// ── Rules-based adaptive questions (offline default). Vary by the user's answers. ──

/** The niche/platform/purpose-specific question, or null when none applies. */
function contextAdaptiveQuestion(state: UserState): AdaptiveQuestion | null {
  const niche = (state.niches?.[0] ?? "").toLowerCase();
  const platform = (state.platforms ?? []).join(" ").toLowerCase();
  if (niche.includes("finance") || niche.includes("health")) {
    return {
      id: "adaptive_compliance",
      title: "How regulated is your claim space?",
      hint: "We'll tune tool risk and tone so nothing you publish gets you in trouble.",
      options: [
        { label: "Heavily — every claim must be defensible", value: "strict compliance: avoid promises, hedge claims, cite sources" },
        { label: "Somewhat — general best practice", value: "moderate compliance care" },
        { label: "Lightly regulated", value: "low compliance constraint" },
      ],
    };
  }
  if (platform.includes("tiktok") || platform.includes("reels")) {
    return {
      id: "adaptive_trend",
      title: "Trend-led or evergreen?",
      hint: "Decides whether we optimize for speed-to-publish or for reusable, lasting content.",
      options: [
        { label: "Trend-led — ride what's hot now", value: "trend-led: prioritize speed and current formats" },
        { label: "Evergreen — works any time", value: "evergreen: prioritize durability and depth" },
      ],
    };
  }
  if (state.purpose === "repurpose") {
    return {
      id: "adaptive_repurpose_goal",
      title: "What's the win from repurposing this?",
      hint: "Shapes how aggressively we adapt vs preserve the original.",
      options: [
        { label: "Reach a new platform's audience", value: "adapt heavily for a new platform's native style" },
        { label: "Squeeze more from a hit", value: "preserve what worked, lightly reformat" },
        { label: "Save production time", value: "minimize effort, fastest viable adaptation" },
      ],
    };
  }
  return null;
}

/** The universal "what does winning look like" question. */
function outcomeAdaptiveQuestion(): AdaptiveQuestion {
  return {
    id: "adaptive_outcome",
    title: "What does a win look like for this piece?",
    hint: "We'll bias every step's guidance toward the outcome you actually care about.",
    options: [
      { label: "Reach / views", value: "optimize for reach and shareability" },
      { label: "Engagement / replies", value: "optimize for comments and saves" },
      { label: "Conversions / clicks", value: "optimize for click-through and conversion" },
      { label: "Authority / trust", value: "optimize for credibility and depth" },
    ],
  };
}

/** Back-compat single-question helper. */
function rulesAdaptiveQuestion(state: UserState): AdaptiveQuestion | null {
  return contextAdaptiveQuestion(state) ?? outcomeAdaptiveQuestion();
}

/** The 1-2 adaptive questions to ask after the fixed pool (context first, then outcome). */
function rulesAdaptiveQuestions(state: UserState): AdaptiveQuestion[] {
  const ctxQ = contextAdaptiveQuestion(state);
  const out = [ctxQ, outcomeAdaptiveQuestion()].filter(Boolean) as AdaptiveQuestion[];
  // dedupe by id
  return out.filter((q, i) => out.findIndex((x) => x.id === q.id) === i);
}

/** Offline default — deterministic values unchanged. Used by the demo + tests. */
class DeterministicAgentRuntime implements AgentRuntime {
  readonly live = false;
  async generateAdaptiveQuestions(state: UserState) {
    return rulesAdaptiveQuestions(state);
  }
  async nicheInsight(_s: UserState, fallback: NicheBlock | null) {
    return fallback;
  }
  async refineHowText(_step: RoadmapStep, _s: UserState, deterministic: string) {
    return deterministic;
  }
  async toolRationale(_t: ToolProfile, _s: UserState, deterministic: string) {
    return deterministic;
  }
  async strategyBrief(_s: UserState, deterministic: StrategyBrief) {
    return deterministic;
  }
}

const SYSTEM = `You are FlowGenix's content-workflow co-pilot for AI content creators. Be concrete,
specific to the user's niche, and brief. You may sharpen wording and add one niche-specific detail,
but you MUST keep any underlying factual instruction and any "copy → paste into the next tool"
handoff intact. Never invent tool features. Output only what is asked, no preamble.`;

function ctx(s: UserState): string {
  return [
    `family=${s.contentFamily}`,
    `specialty=${s.specialty}`,
    `niche=${(s.niches ?? []).join(", ") || "?"}`,
    `platform=${(s.platforms ?? []).join(", ") || "?"}`,
    `purpose=${s.purpose ?? "?"}`,
    `quality/speed=${s.qualityVsSpeed ?? "?"}`,
    `ai-level=${s.aiFamiliarity ?? "?"}`,
    s.adaptiveNotes?.length ? `notes=${s.adaptiveNotes.join("; ")}` : "",
  ].filter(Boolean).join(", ");
}

/** LLM-backed runtime. Degrades to deterministic output on any error/empty response. */
class LlmAgentRuntime implements AgentRuntime {
  readonly live = true;
  constructor(private complete: LlmComplete, private fallback = new DeterministicAgentRuntime()) {}

  private async tryJson<T>(prompt: string, max = 500): Promise<T | null> {
    const raw = (await this.complete({ system: SYSTEM, prompt, maxTokens: max })).trim();
    const start = raw.indexOf("{");
    const end = raw.lastIndexOf("}");
    if (start < 0 || end < 0) return null;
    try { return JSON.parse(raw.slice(start, end + 1)) as T; } catch { return null; }
  }
  private async tryText(prompt: string, fallback: string, max = 400): Promise<string> {
    const out = (await this.complete({ system: SYSTEM, prompt, maxTokens: max })).trim();
    return out.length > 2 ? out : fallback;
  }

  async generateAdaptiveQuestions(state: UserState): Promise<AdaptiveQuestion[]> {
    const prompt = `User so far: ${ctx(state)}.
Ask ONE high-value clarifying question that would most change how you'd guide THIS creator (not a generic one).
Return JSON: {"title": "...", "hint": "...", "options": [{"label":"...","value":"short machine note"}, ...]} with 2-4 options.`;
    const parsed = await this.tryJson<{ title: string; hint: string; options: { label: string; value: string }[] }>(prompt, 400);
    if (!parsed?.title || !Array.isArray(parsed.options) || parsed.options.length < 2) {
      return this.fallback.generateAdaptiveQuestions(state);
    }
    const aiQ: AdaptiveQuestion = { id: "adaptive_ai", title: parsed.title, hint: parsed.hint ?? "", options: parsed.options.slice(0, 4), aiGenerated: true };
    return [aiQ, outcomeAdaptiveQuestion()];
  }

  async nicheInsight(state: UserState, fallback: NicheBlock | null): Promise<NicheBlock | null> {
    if (!state.niches?.length) return fallback;
    const parsed = await this.tryJson<Partial<NicheBlock>>(
      `Context: ${ctx(state)}. Return JSON {"tone":"one sentence","audience":"one sentence","presentation":"one sentence"} for this creator.`,
      350,
    );
    if (!parsed) return fallback;
    return {
      niches: state.niches.join(", "),
      platform: (state.platforms ?? []).join(", ") || null,
      tone: parsed.tone ?? fallback?.tone ?? "",
      audience: parsed.audience ?? fallback?.audience ?? "",
      presentation: parsed.presentation ?? fallback?.presentation ?? "",
    };
  }

  async refineHowText(step: RoadmapStep, state: UserState, deterministic: string): Promise<string> {
    const tool = step.primaryTool?.name ?? "the recommended tool";
    return this.tryText(
      `Context: ${ctx(state)}. Step: "${step.label}" using ${tool}.
Rewrite this guidance as a coach speaking to this specific creator — one tight paragraph, concrete to their niche, keep the action and any handoff:\n"${deterministic}"`,
      deterministic,
      380,
    );
  }

  async toolRationale(tool: ToolProfile, state: UserState, deterministic: string): Promise<string> {
    return this.tryText(
      `Context: ${ctx(state)}. One sentence on why ${tool.name} (${tool.exactTask}) fits THIS creator. Base: "${deterministic}"`,
      deterministic,
      120,
    );
  }

  async strategyBrief(state: UserState, deterministic: StrategyBrief): Promise<StrategyBrief> {
    const parsed = await this.tryJson<StrategyBrief>(
      `Context: ${ctx(state)}. Give a sharp strategic read as JSON {"play":"the move in one sentence","nail":"the single highest-leverage thing to get right","risk":"the main risk for this niche/path"}.`,
      400,
    );
    return parsed?.play ? parsed : deterministic;
  }
}


/* ===== src/engine/aiClient.ts ===== */

 * AI client — calls Google Gemini directly from the browser.

const MODELS     = ["gemini-2.5-flash", "gemini-2.0-flash-lite", "gemini-2.0-flash"];

async function callGemini(model: string, body: any): Promise<Response> {
  return fetch(`${BASE}/${model}:generateContent?key=${GEMINI_KEY}`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(body),
    referrerPolicy: "no-referrer",
    mode: "cors",
  });
}

function sleep(ms: number) { return new Promise(r => setTimeout(r, ms)); }

/** Browser-direct Gemini call with retry + model fallback. */
function createGeminiComplete(): LlmComplete {
  return async ({ system, prompt, maxTokens }) => {
    const body: any = {
      contents: [{ role: "user", parts: [{ text: prompt }] }],
      generationConfig: { maxOutputTokens: maxTokens ?? 600, temperature: 0.7 },
    };
    if (system) body.systemInstruction = { parts: [{ text: system }] };

    let lastErr = "";
    for (const model of MODELS) {
      for (let attempt = 0; attempt < 3; attempt++) {
        const res = await callGemini(model, body);
        if (res.ok) {
          const data = await res.json();
          return (data.candidates ?? [])
            .flatMap((c: any) => c.content?.parts ?? [])
            .map((p: any) => p.text ?? "")
            .join("");
        }
        const code = res.status;
        lastErr = await res.text().catch(() => "");
        // Retry on overload/rate-limit, try next model on other errors
        if (code === 503 || code === 429) {
          await sleep(2000 * (attempt + 1));
          continue;
        }
        break; // non-retryable error for this model, try next
      }
    }
    throw new Error(`Gemini error: ${lastErr.slice(0, 200)}`);
  };
}

// ── Pipeline composition ────────────────────────────────────────────────────

/** Resolve the Improve start index from the coarse pain-phase (Q6). */
function resolveStartIndex(state: UserState, preLen: number, prodLen: number, fullLen: number): number {
  const phase = state.painStage as string | undefined;
  let idx = 0;
  switch (phase) {
    case "research": idx = 0; break;
    case "ideation": idx = Math.min(1, preLen - 1); break;
    case "script": idx = Math.max(0, preLen - 1); break;
    case "production": idx = preLen; break;
    case "editing": idx = preLen + Math.max(0, prodLen - 2); break;
    case "publishing": idx = preLen + prodLen; break;
    case "all":
    default: idx = 0; break;
  }
  return Math.max(0, Math.min(idx, fullLen - 1));
}

/**
 * Compose the ordered StageKey list for the user's answers (spec §10.2):
 *   - repurpose → Extraction → Adaptation → production[Q2] → distribution (transformation)
 *   - improve   → full pipeline sliced from the pain-phase start index
 *   - create / automate → full standard pipeline
 */
function determineStages(state: UserState): StageKey[] {
  if (!state.contentFamily || !state.specialty) return [];
  const fam = PIPELINES[state.contentFamily];
  const sub = specialtySubtype(state.specialty);
  const prod = fam.production[sub] ?? [];

  if (state.purpose === "repurpose") {
    return ["extraction_clip", "adaptation", ...prod, ...fam.distribution];
  }

  const full: StageKey[] = [...fam.pre, ...prod, ...fam.distribution];

  if (state.purpose === "improve") {
    const start = resolveStartIndex(state, fam.pre.length, prod.length, full.length);
    return full.slice(start);
  }
  return full;
}

function nicheKey(state: UserState): string | null {
  const first = state.niches?.[0];
  return first ? first.toLowerCase().split(/[\s/]+/)[0] : null;
}

function buildNicheBlock(state: UserState): NicheBlock | null {
  if (!state.niches?.length) return null;
  const key = nicheKey(state) ?? "";
  const platform = (state.platforms ?? [])[0] ?? null;
  const tone = NICHE_TONE[key] ?? "Match the tone your specific niche expects.";
  const audience = NICHE_AUDIENCE[key] ?? "Define exactly who in your niche this is for.";
  let presentation = "Pick the format that matches how your audience actually consumes content.";
  if (key === "education") presentation = "Structured formats win — numbered steps and visual breakdowns aid recall.";
  else if ((key === "business" || key === "finance") && platform?.toLowerCase().includes("linkedin"))
    presentation = "LinkedIn rewards insight-dense posts with one clear professional takeaway.";
  else if (key === "technology") presentation = "Show, don't tell — demos and comparisons beat abstract claims.";
  else if (key === "lifestyle" || key === "entertainment")
    presentation = "Hook strength and visual pacing decide everything — the first 2 seconds matter most.";
  return { niches: state.niches.join(", "), platform, tone, audience, presentation };
}

// ── Assembly ────────────────────────────────────────────────────────────────

function summarize(state: UserState): RoadmapSummary {
  return {
    contentFamily: state.contentFamily as ContentFamily,
    specialty: state.specialty as Specialty,
    specialtyLabel: state.specialty ? SPECIALTY_LABELS[state.specialty] ?? state.specialty : "",
    platforms: state.platforms ?? [],
    niches: state.niches ?? [],
    purpose: state.purpose ?? "create",
    painSource: state.painSource,
    depth: state.painSource === "avoid_confusion" ? "detailed" : state.depth ?? "balanced",
    aiFamiliarity: state.aiFamiliarity ?? "intermediate",
  };
}

/**
 * Assemble the full roadmap deterministically. Pure: same state+memory → same roadmap.
 * The optional agent overlay is applied separately via enhanceRoadmap().
 */
function assembleRoadmap(state: UserState, memory: WeightMemory = {}): Roadmap {
  const stages = determineStages(state);
  const weights = deriveWeights(state, memory);
  const fallbackStages: StageKey[] = [];

  let prevOutput: string | null = null;
  const steps: RoadmapStep[] = stages.map((stage, i) => {
    const tools = scoreStage(stage, state, weights);
    if (tools[0]?.fallback) fallbackStages.push(stage);
    const primaryTool = tools[0]?.tool ?? null;
    const isLast = i === stages.length - 1;
    const nextStageLabel = isLast ? null : STAGE_DEFS[stages[i + 1]].label;
    const how = buildHowText({
      tool: primaryTool,
      stage,
      specialty: state.specialty as Specialty,
      state,
      nextStageLabel,
    });
    const handoff = nextStageLabel ? `Hand off to: ${nextStageLabel}.` : null;
    const intel = buildStepIntel(stage, prevOutput, state);
    prevOutput = intel.output;
    const step: RoadmapStep = {
      order: i + 1,
      stage,
      label: STAGE_DEFS[stage].label,
      goal: STAGE_DEFS[stage].goal,
      how,
      handoff,
      tools,
      primaryTool,
      prompt: buildToolPrompt(stage, primaryTool, state),
      input: intel.input,
      output: intel.output,
      proMove: intel.proMove,
      avoid: intel.avoid,
      minutes: intel.minutes,
    };
    if (isLast) step.exportParams = buildExportParams(state);
    return step;
  });

  const roadmap: Roadmap = {
    shape: state.purpose === "repurpose" ? "transformation" : "standard",
    contentFamily: state.contentFamily as ContentFamily,
    specialty: state.specialty as Specialty,
    summary: summarize(state),
    niche: buildNicheBlock(state),
    brief: { play: "", nail: "", risk: "" },
    quickStart: buildQuickStart(steps),
    steps,
    fallbackStages,
  };
  roadmap.brief = buildStrategyBrief(state, roadmap);
  return roadmap;
}

/**
 * Optional async overlay: run the AI-agent layer over a finished roadmap. Falls back
 * to the deterministic text on any failure, so the core output is never blocked.
 */
async function enhanceRoadmap(
  roadmap: Roadmap,
  state: UserState,
  runtime: AgentRuntime = new DeterministicAgentRuntime(),
): Promise<Roadmap> {
  const [niche, brief] = await Promise.all([
    runtime.nicheInsight(state, roadmap.niche),
    runtime.strategyBrief(state, roadmap.brief),
  ]);
  const steps = await Promise.all(
    roadmap.steps.map(async (step) => {
      const how = await runtime.refineHowText(step, state, step.how);
      let tools = step.tools;
      if (step.tools[0]) {
        const why = await runtime.toolRationale(step.tools[0].tool, state, step.tools[0].why);
        tools = [{ ...step.tools[0], why }, ...step.tools.slice(1)];
      }
      return { ...step, how, tools, aiGenerated: runtime.live && how !== step.how };
    }),
  );
  return { ...roadmap, niche, brief, steps, aiEnhanced: runtime.live };
}

/** Build the base pipeline shape for a specialty (Pattern 6). */
function basePipeline(specialty: Specialty): MarketingStage[] {
  const pre = SHARED_PRE.map((s) => ({ ...s }));
  const prod = PRODUCTION[specialty].map((s) => ({ ...s }));
  // Analytics exception: drop measure + refine from the shared tail (per §2.9)
  // because Measure & Report is core production for this specialty. Keep publish
  // since analytics teams still need to share / deliver the report.
  const dist =
    specialty === "analytics"
      ? [{ ...SHARED_DIST[0] }]
      : SHARED_DIST.map((s) => ({ ...s }));
  return [...pre, ...prod, ...dist];
}


/* ===== src/marketing/engine.ts ===== */
/**
 * Marketing module — pipeline assembly engine.
 *
 * Given the user's accumulated answers, returns the ordered list of
 * MarketingStage objects that will become roadmap steps.
 *
 * Path shapers (per docx §2 + locked decisions):
 *   - Create    → base shape unmodified.
 *   - Improve   → base shape unmodified, but every stage BEFORE the SP-b
 *                 breakdown stage is flagged `assumedWorking: true`. The UI
 *                 renders the assumed-working group collapsed; remaining stages
 *                 render normally. Nothing is omitted.
 *   - Repurpose → pre-stages replaced with a transformation header
 *                 (Extract → Adapt → Produce → Distribute) seeded from SP-c.
 *   - Automate  → base shape unmodified, but every stage with an AUTOMATE_NOTES
 *                 entry gets `automateNote` attached. Stages without a note
 *                 render normally (no thinning).
 */



// Repurpose transformation header — replaces the shared pre-stages when SP=repurpose.
const REPURPOSE_HEADER: MarketingStage[] = [
  {
    key: "shared.research_insight", // reuse the key so tool pool still has matches
    label: "Extract",
    goal: "Pull the core ideas, claims, and assets out of the source material.",
    toolCategory: "AI extraction / transcription tools",
  },
  {
    key: "shared.audience",
    label: "Adapt",
    goal: "Reshape the extracted material to fit the new format and audience.",
    toolCategory: "AI rewriting / adaptation tools",
  },
  {
    key: "shared.strategy_brief",
    label: "Produce",
    goal: "Generate the new output in the target format.",
    toolCategory: "AI generation tools (target format)",
  },
];

/** Compose the full ordered stage list for a given answer state. */
function determineStages(a: MarketingAnswers): MarketingStage[] {
  if (!a.specialty) return [];
  const purpose: PurposePath = a.purpose ?? "create";
  const base = basePipeline(a.specialty);

  let stages: MarketingStage[];
  switch (purpose) {
    case "create":
      stages = base;
      break;
    case "improve":
      stages = applyImprovePath(base, a.breakdownStage);
      break;
    case "repurpose":
      stages = applyRepurposePath(base);
      break;
    case "automate":
      stages = applyAutomatePath(base);
      break;
  }
  return stages;
}

/** Improve path — mark all stages before the breakdown as "assumed working". */
function applyImprovePath(
  base: MarketingStage[],
  breakdown: MarketingStageKey | undefined,
): MarketingStage[] {
  if (!breakdown) return base;
  const idx = base.findIndex((s) => s.key === breakdown);
  if (idx < 0) return base;
  return base.map((s, i) => (i < idx ? { ...s, assumedWorking: true } : s));
}

/** Repurpose path — swap the 3 shared pre-stages for the transformation header. */
function applyRepurposePath(base: MarketingStage[]): MarketingStage[] {
  // Drop the first 3 (shared pre-stages) and prepend the transformation header.
  const tail = base.slice(3);
  return [...REPURPOSE_HEADER, ...tail];
}

/** Automate path — attach an automateNote to every stage that has one. */
function applyAutomatePath(base: MarketingStage[]): MarketingStage[] {
  return base.map((s) => {
    const note = AUTOMATE_NOTES[s.key];
    return note ? { ...s, automateNote: note } : s;
  });
}

/** Does this answer state require the AI-disclosure closing block? */
function disclosureRequired(a: MarketingAnswers): boolean {
  const flags = [a.perfAiContent, a.socialAiContent, a.brandAiContent];
  return flags.some((f) => f === "yes" || f === "sometimes");
}

/** Header chip strip per locked UX decision. */
function buildHeaderChips(a: MarketingAnswers): string[] {
  const chips: string[] = [];
  if (a.specialty) chips.push(SPECIALTY_LABEL[a.specialty]);
  if (a.businessModel) chips.push(BUSINESS_LABEL[a.businessModel]);
  if (a.audienceType) chips.push(AUDIENCE_LABEL[a.audienceType]);
  if (a.purpose) chips.push(PURPOSE_LABEL[a.purpose]);
  return chips;
}

/**
 * Marketing module — question definitions.
 *
 * Source: AI_Roadmap_Marketing_ToolProfiles_v1.docx §1.2–§1.6.
 *
 * Order of questions:
 *   WHO-1 (specialty selector)
 *   WHO-2 (business context — 3-part compound)
 *   WHO-3 (setup — 2-part compound)
 *   Branch WHATs (1–3 compounds per specialty, with skip logic per docx §1.3)
 *   SP (purpose) — always; SP-b or SP-c conditional
 *   H1–H4 (HOW layer, H3 skipped when AI-every-day + expert)
 *   W1–W4 (WHY layer)
 *

// ── small helpers ────────────────────────────────────────────────────────────
const opt = (label: string, value: string, hint?: string): QuestionOption => ({ label, value, hint });
const always = () => true;

/** Branch predicate — only show this question when the user is on `s`. */
const onSpecialty = (...s: Specialty[]) =>
  (a: MarketingAnswers) => !!a.specialty && s.includes(a.specialty);

/** Treat a (possibly multi) field as containing `v`. Handles array | string | undefined. */
const has = (v: string, field: string[] | string | undefined) =>
  Array.isArray(field) ? field.includes(v) : field === v;
/** First element of a multi field (used where engine logic still needs a primary). */
const first = <T extends string>(field: T[] | T | undefined): T | undefined =>
  Array.isArray(field) ? field[0] : field;

/**
 * Return the next relevant question given current answers.
 * Returns null when the WHO→WHAT→HOW→WHY chain is fully satisfied.
 */
function nextQuestion(a: MarketingAnswers): MarketingQuestion | null {
  // Iterate in priority order; first one that isRelevant && not yet fully answered.
  const ordered = [...MARKETING_QUESTIONS].sort((x, y) => x.priority - y.priority);
  for (const q of ordered) {
    if (!q.isRelevant(a)) continue;
    if (isQuestionAnswered(q, a)) continue;
    return q;
  }
  return null;
}

function isQuestionAnswered(q: MarketingQuestion, a: MarketingAnswers): boolean {
  return q.parts.every((p) => {
    const v = a[p.field];
    if (v === undefined || v === null) return false;
    if (Array.isArray(v)) return v.length > 0;
    return true;
  });
}

/**

 * Currently documented in the docx (§1.3 SEO branch): SEO website type is

interface InferenceRule {
  id: string;
  /** When this rule fires for the given answer state. */
  when: (a: MarketingAnswers) => boolean;

  build: (a: MarketingAnswers) => InferenceChip;

      };
    },
  },
];

/** Return all chips that apply to the current answer state. */

}


/* ===== src/marketing/scoring.ts ===== */
/**
 * Marketing module — tool scoring.
 *
 * Pipeline: filterEligibleTools → computeToolScore → rank.
 *
 * Hard filters (docx §1.6):
 *   W1 budget  — "free" drops tools without a perpetual free tier.
 *                Detected from the freeTier text (regex heuristic).
 *   W4 usage   — "client_work" requires CommercialLicensing ∈ {"yes","partial"}.
 *                "partial" passes but flags licensingCaveat on the ScoredTool.
 *
 * Empty-stage fallback: if hard filters empty a stage, relax filters one notch
 * and re-rank with the `fallback` flag set; the UI shows a "limited matches" badge.
 *
 * X1_AIDisclosureSupport is DORMANT in v1 scoring (per locked decision); it
 * only surfaces in the disclosure block.
 */


interface UserWeights {
  specialtyFit: number;
  quality: number;
  speed: number;
  ease: number;
  consistency: number;
  cost: number;
  trust: number;
  stack: number;
  risk: number;
  format: number;
}

// ── 1. derive user-side weights from HOW/WHY answers ─────────────────────────
function deriveWeights(a: MarketingAnswers): UserWeights {
  const w: UserWeights = {
    specialtyFit: 3,
    quality: 3,
    speed: 3,
    ease: 3,
    consistency: 3,
    cost: 3,
    trust: 3,
    stack: 3,
    risk: 3,
    format: 3,
  };

  // W1 budget + risk
  if (a.budget === "free") w.cost = 5;
  if (a.riskTolerance === "safe") {
    w.trust = Math.max(w.trust, 5);
    w.risk = Math.max(w.risk, 5);
  } else if (a.riskTolerance === "experimental") {
    w.trust = 2;
    w.risk = 2;
  }

  // W2 quality vs speed
  if (a.qualityVsSpeed === "quality") {
    w.quality = 5; w.consistency = 4; w.speed = 2;
  } else if (a.qualityVsSpeed === "speed") {
    w.speed = 5; w.quality = 2;
  }

  // W3 tool preference (soft)
  if (a.toolPreference === "familiar") w.trust = Math.max(w.trust, 4);
  if (a.toolPreference === "easiest") w.ease = 5;
  if (a.toolPreference === "new") w.stack = 4;

  // W4 usage context — client work biases toward trust + consistency + format
  if (a.usageContext === "client_work") {
    w.trust = Math.max(w.trust, 4);
    w.consistency = Math.max(w.consistency, 4);
    w.format = Math.max(w.format, 4);
  }

  // H1 AI comfort — beginners need ease
  if (a.aiComfort === "starting_out") w.ease = 5;
  else if (a.aiComfort === "every_day") w.ease = Math.min(w.ease, 2);

  // H3 hand-holding — spell-out users need ease too
  if (a.handhold === "spell_out") w.ease = Math.max(w.ease, 4);

  return w;
}

// ── 2. hard filters ──────────────────────────────────────────────────────────
/** Best-effort detection of a perpetual free tier from the freeTier text. */
function hasPerpetualFree(t: MarketingToolProfile): boolean {
  const s = (t.freeTier || "").toLowerCase();
  if (!s) return false;
  // Trial-only patterns DO NOT count as a perpetual free tier.
  if (/(\d+\s*-?\s*day\s+trial|trial only|trial,? no perpetual|no perpetual|no free tier)/.test(s))
    return false;
  // Explicit "yes" / "free" / "free plan" / "fully free" / "free tier" → perpetual.
  return /\b(yes|free plan|fully free|free tier|free up to|free for|free —|free,|free$)/.test(s);
}

interface FilterResult {
  pool: MarketingToolProfile[];
  /** Subset of pool where CommercialLicensing="partial" and client_work — surfaces caveat. */
  partialIds: Set<string>;
  fallback: boolean;
}

function applyHardFilters(
  tools: MarketingToolProfile[],
  a: MarketingAnswers,
  relax = false,
): FilterResult {
  let pool = tools;

  // W1 budget hard filter
  if (!relax && a.budget === "free") {
    pool = pool.filter(hasPerpetualFree);
  }

  // W4 commercial-use hard filter
  const partialIds = new Set<string>();
  if (a.usageContext === "client_work") {
    pool = pool.filter((t) => {
      if (t.commercialLicensing === "no") return false;
      if (t.commercialLicensing === "partial") {
        partialIds.add(t.id);
      }
      return true;
    });
  }

  return { pool, partialIds, fallback: relax };
}

// ── 3. tool score (weighted dot product) ─────────────────────────────────────
function dot(tool: MarketingToolProfile, w: UserWeights): number {
  const a = tool.attr;
  return (
    a.specialtyFit * w.specialtyFit +
    a.quality * w.quality +
    a.speed * w.speed +
    a.ease * w.ease +
    a.consistency * w.consistency +
    a.cost * w.cost +
    a.trust * w.trust +
    a.stack * w.stack +
    a.risk * w.risk +
    a.format * w.format
  );
}

/** Build a short "why this tool" line for the card. */
function whyThis(t: MarketingToolProfile, a: MarketingAnswers): string {
  const bits: string[] = [];
  if (a.qualityVsSpeed === "quality" && t.attr.quality >= 4) bits.push("high quality");
  if (a.qualityVsSpeed === "speed" && t.attr.speed >= 4) bits.push("fast");
  if (a.budget === "free" && hasPerpetualFree(t)) bits.push("free tier");
  if (a.riskTolerance === "safe" && t.attr.trust >= 4) bits.push("trusted brand");
  if (a.aiComfort === "starting_out" && t.attr.ease >= 4) bits.push("easy to learn");
  if (a.usageContext === "client_work" && t.commercialLicensing === "yes")
    bits.push("commercial-OK");
  return bits.length ? bits.join(" · ") : t.exactTask.split(/\.|;/)[0];
}

// ── 4. public entry: score + rank a stage ────────────────────────────────────
interface RankOptions {
  /** Max tools returned per stage card. Default 3 — keeps the UI scannable. */
  topN?: number;
}

function rankStageTools(
  stagePool: MarketingToolProfile[],
  a: MarketingAnswers,
  opts: RankOptions = {},
): ScoredMarketingTool[] {
  const topN = opts.topN ?? 3;
  const weights = deriveWeights(a);

  // First pass — strict filters
  let { pool, partialIds, fallback } = applyHardFilters(stagePool, a, false);

  // Fallback — if strict filters emptied the stage, relax and try again
  if (pool.length === 0 && stagePool.length > 0) {
    ({ pool, partialIds, fallback } = applyHardFilters(stagePool, a, true));
  }

  const scored = pool.map((t) => ({
    tool: t,
    score: dot(t, weights),
    rank: 0,
    fallback,
    licensingCaveat: partialIds.has(t.id),
    why: whyThis(t, a),
  }));
  scored.sort((x, y) => y.score - x.score);
  scored.forEach((s, i) => (s.rank = i + 1));
  return scored.slice(0, topN);
}

/** Pool predicate: returns tools belonging to a specific stage. */
function poolForStage(
  all: MarketingToolProfile[],
  stage: string,
): MarketingToolProfile[] {
  return all.filter((t) => t.stage === stage);
}


/* ===== src/marketing/howText.ts ===== */
/**
 * Marketing module — How-text builder.
 *
 * Generates the deterministic "how to use this tool at this stage" paragraph
 * for each roadmap step. Seven components, marketing-flavored:
 *
 *   1. Context line     — what this stage is, in the user's language
 *   2. Setup           — what they need open / configured first
 *   3. Inputs          — what to feed the tool (personalized to answers)
 *   4. Action          — the concrete prompt or click path
 *   5. Output          — what they should see
 *   6. Handoff         — how it feeds the next stage
 *   7. Watch-out       — the one common mistake to avoid
 *
 * Depth (H4) gates length:
 *   short    → 1–2 sentences total
 *   balanced → context + action + handoff
 *   detailed → all seven components + an inline worked example
 */


interface HowComponents {
  context: string;
  setup: string;
  inputs: string;
  action: string;
  output: string;
  handoff: string;
  watchOut: string;
  example?: string;
}

const SPECIALTY_VOICE: Record<string, { you: string; their_work: string }> = {
  seo: { you: "you", their_work: "your pages" },
  performance: { you: "you", their_work: "your ads" },
  email: { you: "you", their_work: "your sends" },
  social: { you: "you", their_work: "your posts" },
  brand: { you: "you", their_work: "your brand" },
  content: { you: "you", their_work: "your pieces" },
  analytics: { you: "you", their_work: "your dashboards" },
};

function buildHowComponents(
  stage: MarketingStage,
  tool: MarketingToolProfile,
  next: MarketingStage | null,
  a: MarketingAnswers,
): HowComponents {
  const voice = SPECIALTY_VOICE[a.specialty || "content"];

  const context = `${stage.label} is where ${voice.you} ${stage.goal.toLowerCase().replace(/\.$/, "")}.`;

  const setup =
    tool.startingPrice && tool.startingPrice !== "Free"
      ? `Open ${tool.name} (${tool.startingPrice}; ${tool.freeTier || "no free tier"}) and sign in.`
      : `Open ${tool.name} — ${tool.freeTier || "free to use"}.`;

  const inputs = inputsFor(stage, tool, a);

  const action = `${tool.exactTask}. Use it to produce a working version of ${voice.their_work} for this stage.`;

  const output = `Expect: ${stage.toolCategory.toLowerCase().replace(/^ai /, "").replace(/ tools$/, "")} output ready to feed forward.`;

  const handoff = next
    ? `Hand off to ${next.label} — keep the file/link reference open so ${voice.you} can paste into the next tool.`
    : "Roadmap complete — this is the final stage in your specialty.";

  const watchOut = watchOutFor(stage, tool, a);

  const components: HowComponents = { context, setup, inputs, action, output, handoff, watchOut };
  if (a.examples) {
    components.example = workedExample(stage, tool, a);
  }
  return components;
}

function inputsFor(
  stage: MarketingStage,
  _t: MarketingToolProfile,
  a: MarketingAnswers,
): string {
  const bits: string[] = [];
  if (a.audienceType) bits.push(a.audienceType.toUpperCase());
  if (a.industry === "regulated") bits.push("regulated industry constraints");
  if (a.businessModel === "ecommerce") bits.push("product context");
  const hint = bits.length ? ` (account for ${bits.join(" + ")})` : "";
  return `Feed: your goal, target audience, and a clear constraint or example${hint}.`;
}

function watchOutFor(
  stage: MarketingStage,
  _t: MarketingToolProfile,
  a: MarketingAnswers,
): string {
  if (a.industry === "regulated")
    return "Regulated industry: human-review any AI-produced copy before publish.";
  if (stage.key === "perf.bidding" && a.perfTracking !== "yes")
    return "Tracking isn't fully clean — fix that first or the AI optimizes the wrong signal.";
  if (stage.key === "shared.measure" && a.maturity === "starting")
    return "Don't over-engineer dashboards on day one; one clear metric beats ten noisy ones.";
  return "Re-read the AI output before sending — automation amplifies whatever you don't catch.";
}

function workedExample(
  stage: MarketingStage,
  tool: MarketingToolProfile,
  a: MarketingAnswers,
): string {
  const audience = a.audienceType === "b2b" ? "a B2B SaaS buyer" : "your target customer";
  return `Example: ask ${tool.name} for a ${stage.label.toLowerCase()} draft tailored to ${audience}, then iterate in 2 rounds.`;
}

/** Compose the components into one paragraph at the requested depth. */
function renderHowText(
  c: HowComponents,
  depth: MarketingAnswers["depth"] = "balanced",
): string {
  if (depth === "short") {
    return [c.context, c.action].join(" ");
  }
  if (depth === "balanced") {
    return [c.context, c.action, c.handoff, c.watchOut].join(" ");
  }
  // detailed
  const parts = [c.context, c.setup, c.inputs, c.action, c.output, c.handoff, c.watchOut];
  if (c.example) parts.push(c.example);
  return parts.join(" ");
}
