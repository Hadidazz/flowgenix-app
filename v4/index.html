/**
 * Marketing module — strategy brief + per-step copy-paste prompts.
 *
 * buildStrategyBrief = bespoke 3-line read of the user's path (play / nail / risk).
 * buildToolPrompt    = personalized prompt the user pastes into the rank-1 tool.
 *
 * Forked from CC's prompts so this module can diverge freely. Marketing flavor:
 * leans on the WHO trunk (business model + audience + industry) plus purpose path.
 */


const PLAY_BY_SPECIALTY: Record<Specialty, (a: MarketingAnswers) => string> = {
  seo: (a) =>
    a.seoGoal === "ai_tools"
      ? "Build for AI citations first: a few well-structured authoritative pieces beat a high-volume traditional SEO grind."
      : "Earn rankings on a small set of well-built pages, then layer AI/GEO structuring on the ones that work.",
  performance: (a) =>
    a.perfSpend === "under_1k"
      ? "At this spend, get tracking + creative right manually before adding AI bid automation."
      : "Let AI bidding handle execution; spend your time on creative and measurement.",
  email: (a) =>
    a.emailListSize === "under_1k"
      ? "Build the list first — segmentation only pays off above ~1,000 contacts."
      : "Segment by behavior, automate the obvious flows, then test copy in the highest-traffic flow.",
  social: () =>
    "Pick the one platform that fits your format and post consistently — depth on one channel beats thin presence on three.",
  brand: (a) =>
    a.brandStage === "new"
      ? "Lock positioning + messaging before touching visuals — design without strategy ages fastest."
      : "Document what already works so it scales without diluting.",
  content: (a) =>
    a.contentPain === "production_slow"
      ? "Speed up production with AI drafts, but invest your editing time in the funnel stage that converts."
      : "Anchor each piece to a real reader question; everything else is throat-clearing.",
  analytics: () =>
    "Trust the data before automating reporting — clean instrumentation now saves weeks of doubt later.",
};

const NAIL: Record<Specialty, string> = {
  seo: "Structure: well-organized pages outrank well-written ones when AI is the reader.",
  performance: "Conversion tracking. Everything AI does downstream depends on it.",
  email: "Segmentation. Generic sends teach your list to ignore you.",
  social: "Posting consistency. Algorithms reward rhythm, not bursts.",
  brand: "Positioning clarity — every other brand decision flows from it.",
  content: "A specific reader and a specific question per piece.",
  analytics: "One trustworthy metric per goal, not five fuzzy ones.",
};

const RISK: Record<Specialty, (a: MarketingAnswers) => string> = {
  seo: () => "AI-generated thin content gets demoted — quality bar is now higher, not lower.",
  performance: (a) =>
    a.perfTracking === "no" || a.perfTracking === "unsure"
      ? "Bidding AI optimizes whatever signal you give it — bad tracking = wasted spend."
      : "Scaling too fast on one winner: keep a small test budget running in parallel.",
  email: () => "Deliverability damage from one bad send takes weeks to repair — warm carefully.",
  social: () => "Trend-chasing burns time; commit to a 60-day consistency window before judging.",
  brand: () => "AI-generated brand assets that drift off-style cost more to fix than to do once well.",
  content: () => "Volume without distribution doesn't move metrics — plan for surface area, not just output.",
  analytics: () => "Premature attribution models lock in wrong assumptions; start simple and earn complexity.",
};

function buildStrategyBrief(a: MarketingAnswers): StrategyBrief {
  const s = (a.specialty || "content") as Specialty;
  return {
    play: PLAY_BY_SPECIALTY[s](a),
    nail: NAIL[s],
    risk: RISK[s](a),
  };
}

/** Quick-start three moves — the first concrete actions the user can take. */
function buildQuickStart(a: MarketingAnswers, firstStage?: MarketingStage): string[] {
  const moves: string[] = [];
  if (firstStage) {
    moves.push(`Open ${firstStage.label} and write a one-line goal for the next 30 days.`);
  }
  if (a.specialty === "seo")
    moves.push("Run a 10-keyword shortlist for your top product/service this week.");
  else if (a.specialty === "performance")
    moves.push("Audit your conversion tracking before touching anything else.");
  else if (a.specialty === "email")
    moves.push("Pull the one segment you'd send tomorrow if you had to.");
  else if (a.specialty === "social")
    moves.push("Schedule a week of posts ahead so cadence stops being a daily decision.");
  else if (a.specialty === "brand")
    moves.push("Write a one-sentence positioning statement and pressure-test it on a stranger.");
  else if (a.specialty === "content")
    moves.push("Pick the one piece you'd publish first if you only had time for one.");
  else if (a.specialty === "analytics")
    moves.push("Pick the single KPI you'd defend in front of your CEO.");
  moves.push("Read the top tool's How-to-use section and bookmark its onboarding doc.");
  return moves.slice(0, 3);
}

/** Personalized copy-paste prompt the user feeds into the rank-1 tool. */
function buildToolPrompt(
  stage: MarketingStage,
  tool: MarketingToolProfile,
  a: MarketingAnswers,
): string {
  const audience =
    a.audienceType === "b2b"
      ? "B2B buyers"
      : a.audienceType === "b2c"
      ? "individual consumers"
      : "a mixed B2B/B2C audience";
  const biz =
    a.businessModel === "ecommerce"
      ? "ecommerce store"
      : a.businessModel === "saas_service"
      ? "SaaS / service business"
      : a.businessModel === "b2b_leadgen"
      ? "B2B lead-gen funnel"
      : "publishing / media operation";
  const reg = a.industry === "regulated" ? " (regulated industry — keep claims defensible)" : "";

  return [
    `You are helping a ${biz} marketer working on "${stage.label}".`,
    `Audience: ${audience}${reg}.`,
    `Goal of this step: ${stage.goal}`,
    `Constraints: keep the output in plain English, ready to paste into ${tool.name}.`,
    `Deliver: a working draft I can iterate on in one more round.`,
  ].join("\n");
}


/* ===== src/marketing/cp.ts ===== */
/**
 * Marketing module — Content Production decision point (CP).
 *
 * Fires inline at stages flagged `triggersCP` (per docx §2.10). Marketing
 * owns its own lightweight CP — it does NOT call into the Content Creator
 * module. Already-given answers (format, niche, audience) are reused so the
 * user is never asked the same thing twice.
 *
 * Three options:
 *   1. Full guidance — render the embedded mini-flow (format → starting point → output).
 *   2. Stuck at a stage — one follow-up to pick the stuck stage; render targeted guidance.
 *   3. Skip — render nothing; the surrounding roadmap step is enough.
 */


type CpChoice = "full" | "stuck" | "skip";

type CpFormat = "short_video" | "long_video" | "static" | "carousel" | "text" | "audio" | "mixed";

interface CpState {
  /** Has the user picked one of the three top-level options yet? */
  choice?: CpChoice;
  /** For Option 1 — content format, possibly pre-filled silently. */
  format?: CpFormat;
  /** For Option 1 — where they are starting from. */
  startingPoint?: "from_scratch" | "have_idea" | "have_draft";
  /** For Option 2 — which sub-stage they are stuck at. */
  stuckStage?: "ideation" | "production" | "editing" | "distribution";
}

interface CpRender {
  show: boolean;
  /** Pre-filled answer hints (rendered as confirmation chips inside the CP card). */
  prefills: { id: string; label: string }[];
  /** Headline shown above the three options. */
  prompt: string;
  /** Sub-guidance once a choice is made. */
  guidance?: string;
}

/** Predicate: should CP render at this stage? */
function cpShouldFire(stage: MarketingStage): boolean {
  return !!stage.triggersCP;
}

/** First element when a field is multi, else the field itself. */
function pick(field: string[] | string | undefined): string | undefined {
  return Array.isArray(field) ? field[0] : field;
}

/** Derive pre-filled CP format from earlier branch answers. Multi-pick fields
 *  use their first selection as the primary format hint; user can change in CP. */
function prefillFormat(a: MarketingAnswers): CpFormat | undefined {
  const sf = pick(a.socialFormat);
  if (sf === "short_video") return "short_video";
  if (sf === "long_video") return "long_video";
  if (sf === "static") return "static";
  if (sf === "text") return "text";
  if (sf === "mix") return "mixed";

  const ct = pick(a.contentType);
  if (ct === "video") return "long_video";
  if (ct === "audio") return "audio";
  if (ct === "written" || ct === "long_form") return "text";
  if (ct === "mixed") return "mixed";

  const pf = pick(a.perfCreativeFormat);
  if (pf === "static") return "static";
  if (pf === "video") return "short_video";
  if (pf === "carousel") return "carousel";
  if (pf === "search_text") return "text";
  if (pf === "mix") return "mixed";

  return undefined;
}

/** Build the CP render payload for a stage + current CP state + user answers. */
function buildCpRender(
  stage: MarketingStage,
  cp: CpState,
  a: MarketingAnswers,
): CpRender {
  if (!cpShouldFire(stage)) return { show: false, prefills: [], prompt: "" };

  const prefills: CpRender["prefills"] = [];
  const fmt = prefillFormat(a);
  if (fmt) prefills.push({ id: "cp.format", label: `Format: ${labelFormat(fmt)} (tap to change)` });
  if (a.audienceType)
    prefills.push({ id: "cp.audience", label: `Audience: ${a.audienceType.toUpperCase()}` });
  if (a.industry === "regulated")
    prefills.push({ id: "cp.regulated", label: "Regulated industry constraints apply" });

  const prompt = "Do you need guidance on creating this content?";
  let guidance: string | undefined;
  if (cp.choice === "full") {
    guidance = fullGuidance(stage, cp, a);
  } else if (cp.choice === "stuck") {
    guidance = stuckGuidance(stage, cp, a);
  } else if (cp.choice === "skip") {
    guidance = "Skipping content guidance — continuing with the marketing-specific stages.";
  }

  return { show: true, prefills, prompt, guidance };
}

function labelFormat(f: CpFormat): string {
  switch (f) {
    case "short_video": return "Short-form video";
    case "long_video": return "Long-form video";
    case "static": return "Static / image";
    case "carousel": return "Carousel";
    case "text": return "Text / written";
    case "audio": return "Audio / podcast";
    case "mixed": return "Mixed formats";
  }
}

function fullGuidance(stage: MarketingStage, cp: CpState, _a: MarketingAnswers): string {
  const fmt = cp.format ? labelFormat(cp.format) : "your chosen format";
  return `Full content walk-through for ${fmt} at "${stage.label}". Steps: ideation → production → editing → handoff.`;
}

function stuckGuidance(stage: MarketingStage, cp: CpState, _a: MarketingAnswers): string {
  const sub = cp.stuckStage ?? "production";
  return `Targeted guidance for "${sub}" inside ${stage.label}. We'll focus the recommendation on that single sub-step.`;
}

/** Translate the stuck-stage answer into a relevant follow-up stage key. */
function stuckStageKey(stage: MarketingStage, cp: CpState): MarketingStageKey | undefined {
  if (cp.choice !== "stuck" || !cp.stuckStage) return undefined;
  // We don't actually re-route the pipeline; CP guidance renders inline, then
  // the next outer stage continues. This map is exposed for the UI in case it
  // wants to deep-link a tool list for the stuck sub-stage.
  if (stage.key === "social.content_production" && cp.stuckStage === "ideation")
    return "content.ideation";
  if (stage.key === "social.content_production" && cp.stuckStage === "editing")
    return "content.editing";
  if (stage.key === "content.writing" && cp.stuckStage === "editing")
    return "content.editing";
  return undefined;
}

/* ===== src/ui/App.tsx ===== */
/**
 * FlowGenix — Alpha demo UI.
 *
 * Two-theme space aesthetic ("From Darkness to Light"):
 *   Dark mode = primary: deep navy void with gold/purple glow.
 *   Light mode = calm daylight version of the same constellation language.
 *
 * Quiz phase  : a cherry-blossom CONSTELLATION TREE that lights up as you answer
 *               (Ursa-Major style — branches drawn by connecting stars).
 * Roadmap     : a VERTICAL STAR PATH — each step is a glowing star node that blooms
 *               open on tap. No cards, one visual language.
 *
 * The file is the single source of UI truth. Vite mounts it via main.tsx; the
 * tools/build_demo.py bundler inlines it (plus the engine) into demo/flowgenix.html.
 * React/ReactDOM come from scope (imports under Vite, CDN globals in the demo).
 */




const { useState, useMemo, useEffect } = React;

// The Marketing module is bundled into the same page inside an isolated scope and
// published to window.MK (see tools/build_demo.py → marketing_iife). Reading it off
// window avoids any identifier clash with that scope and keeps this file Vite-buildable.
const _MK: any = (typeof window !== "undefined" && (window as any).MK) ? (window as any).MK : null;

// Dedupe the 167 rows to unique tools for the showcase, keeping the most-trusted row.
function uniqueTools() {
  const byName: Record<string, any> = {};
  for (const t of TOOL_PROFILES as any[]) {
    const cur = byName[t.name];
    if (!cur || t.trustScore > cur.trustScore) byName[t.name] = t;
  }
  return Object.values(byName).sort((a: any, b: any) => b.trustScore - a.trustScore || a.name.localeCompare(b.name));
}

const W_LABELS: [string, string][] = [
  ["specialtyFit", "Fit"], ["quality", "Quality"], ["speed", "Speed"], ["ease", "Ease"],
  ["consistency", "Consistency"], ["cost", "Value"], ["trust", "Trust"], ["stack", "Integrates"],
  ["risk", "Safe"], ["format", "Format"],
];

// Initial theme: respect the OS preference on first load, then localStorage.
function initialTheme(): "dark" | "light" {
  try {
    const saved = localStorage.getItem("fg-theme");
    if (saved === "dark" || saved === "light") return saved;
  } catch {}
  if (typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
    return "dark";
  }
  return "dark"; // Default to dark — that's the signature.
}

// ════════════════════════════════════════════════════════════════════════════
//  Root
// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [theme, setTheme] = useState<"dark" | "light">(initialTheme());
  const [view, setView] = useState<"home" | "explore" | "fields" | "quiz" | "adaptive" | "loading" | "roadmap" | "mkquiz" | "mkroadmap">("home");
  const [state, setState] = useState<UserState>({});

  // ── Marketing module state (isolated from the CC flow above) ──
  const [mkAnswers, setMkAnswers] = useState<any>({});
  const [mkHistory, setMkHistory] = useState<any[]>([]);
  const [answered, setAnswered] = useState<Set<string>>(new Set());
  const [history, setHistory] = useState<string[]>([]);
  const [memory, setMemory] = useState<Record<string, number>>({});
  const [roadmap, setRoadmap] = useState<Roadmap | null>(null);

  // ── AI layer ──
  // Persist key in localStorage so testing across refreshes doesn't require re-paste.
  // The key never leaves the browser tab; we call the Anthropic API directly with it.
  const [aiKey, setAiKey] = useState<string>(() => {
    try { return localStorage.getItem("fg-aikey") || ""; } catch { return ""; }
  });
  useEffect(() => {
    try {
      if (aiKey) localStorage.setItem("fg-aikey", aiKey);
      else localStorage.removeItem("fg-aikey");
    } catch {}
  }, [aiKey]);
  const [showConnect, setShowConnect] = useState(false);
  const [enhancing, setEnhancing] = useState(false);
  const [aiError, setAiError] = useState<string | null>(null);
  const [adaptiveQueue, setAdaptiveQueue] = useState<AdaptiveQuestion[]>([]);
  const [adaptiveIdx, setAdaptiveIdx] = useState(0);
  const [adaptiveState, setAdaptiveState] = useState<UserState>({});
  const [adaptiveLoading, setAdaptiveLoading] = useState(false);

  // ── Scroll-reveal observer: any element with [data-reveal] fades+rises in
  //    when it enters the viewport. Re-arms on view change so newly mounted
  //    sections animate too. ──
  useEffect(() => {
    const io = new IntersectionObserver(
      (entries) => {
        for (const e of entries) {
          if (e.isIntersecting) {
            e.target.classList.add("fg-in");
            io.unobserve(e.target);
          }
        }
      },
      { threshold: 0.12, rootMargin: "0px 0px -8% 0px" }
    );
    const arm = () => {
      document.querySelectorAll<HTMLElement>("[data-reveal]:not(.fg-in)").forEach((el) => io.observe(el));
    };
    arm();
    const t = window.setTimeout(arm, 60);
    return () => { window.clearTimeout(t); io.disconnect(); };
  }, [view]);

  useEffect(() => {
    try { localStorage.setItem("fg-theme", theme); } catch {}
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  const runtime = useMemo(
    () => new LlmAgentRuntime(createGeminiComplete()),
    [],
  );
  const aiOn = runtime.live;

  const current: Question | null = useMemo(
    () => (view === "quiz" ? pickNextQuestion(state, answered) : null),
    [view, state, answered],
  );

  // Current marketing question (null when the WHO→WHAT→HOW→WHY chain is satisfied).
  const mkCurrent: any = useMemo(
    () => (view === "mkquiz" && _MK ? _MK.nextQuestion(mkAnswers) : null),
    [view, mkAnswers],
  );

  // ── Marketing handlers ──
  function startMarketing() {
    setMkAnswers({});
    setMkHistory([]);
    setView("mkquiz");
  }
  function mkSubmit(values: Record<string, string>) {
    const q = _MK.nextQuestion(mkAnswers);
    if (!q) return;
    const next = { ...mkAnswers };
    if (q.apply) q.apply(next, values);
    else for (const k of Object.keys(values)) next[k] = values[k];
    setMkHistory([...mkHistory, mkAnswers]);
    setMkAnswers(next);
    if (!_MK.nextQuestion(next)) {
      // Brief loading bridge, then the star-path roadmap (deterministic).
      setView("loading");
      setTimeout(() => { setMkAnswers(next); setView("mkroadmap"); }, 1900);
    }
  }
  function mkBack() {
    if (!mkHistory.length) { setView("fields"); return; }
    const prev = mkHistory[mkHistory.length - 1];
    setMkHistory(mkHistory.slice(0, -1));
    setMkAnswers(prev);
  }
  function mkEditChip(qid: string) {
    const q = _MK.MARKETING_QUESTIONS.find((x: any) => x.id === qid);
    if (!q) return;
    const next = { ...mkAnswers };
    for (const p of q.parts) delete next[p.field];
    setMkAnswers(next);
  }

  function start() {
    setState({});
    setAnswered(new Set());
    setHistory([]);
    setMemory({});
    setRoadmap(null);
    setAdaptiveQueue([]);
    setView("quiz");
  }

  function buildAndEnhance(finalState: UserState) {
    setView("loading");
    setAiError(null);
    setTimeout(async () => {
      const base = assembleRoadmap(finalState, memory as any);
      setRoadmap(base);
      setView("roadmap");
      if (runtime.live) {
        setEnhancing(true);
        try {
          const enhanced = await enhanceRoadmap(base, finalState, runtime);
          setRoadmap(enhanced);
        } catch (err: any) {
          setAiError(err?.message ?? String(err));
        }
        setEnhancing(false);
      }
    }, 1900);
  }

  function goAdaptive(next: UserState) {
    setView("adaptive");
    setAdaptiveLoading(true);
    setAdaptiveQueue([]);
    setAdaptiveIdx(0);
    setAdaptiveState(next);
    runtime
      .generateAdaptiveQuestions(next)
      .then((qs) => setAdaptiveQueue(qs || []))
      .catch(() => setAdaptiveQueue([]))
      .finally(() => setAdaptiveLoading(false));
  }

  function answerAdaptive(note: string | null) {
    const cur = { ...adaptiveState, adaptiveNotes: [...(adaptiveState.adaptiveNotes ?? []), ...(note ? [note] : [])] };
    setAdaptiveState(cur);
    setState(cur);
    if (adaptiveIdx + 1 < adaptiveQueue.length) {
      setAdaptiveIdx(adaptiveIdx + 1);
    } else {
      buildAndEnhance(cur);
    }
  }

  function submit(id: string, value: string | string[]) {
    const next = { ...state };
    applyAnswer(next, id as any, value);
    const na = new Set(answered);
    na.add(id);
    setHistory([...history, id]);
    setState(next);
    setAnswered(na);
    if (!pickNextQuestion(next, na)) {
      goAdaptive(next);
    }
  }

  function back() {
    if (!history.length) { setView("home"); return; }
    const h = [...history];
    const last = h.pop()!;
    const na = new Set(answered);
    na.delete(last);
    const q = QUESTIONS.find((x) => x.id === last);
    const next = { ...state } as any;
    if (q) delete next[q.field];
    if (last === "Q5") { delete next.purpose; delete next.painSource; }
    if (last === "Q11") { delete next.budget; delete next.riskTolerance; }
    if (last === "Q10") { delete next.depth; delete next.examples; }
    if (last === "Q14") { delete next.outputReqs; delete next.commercialUse; }
    setHistory(h);
    setAnswered(na);
    setState(next);
  }

  function rebuildWithFeedback(signal: FeedbackSignal) {
    const m = applyToolFeedback(memory, signal);
    setMemory(m as any);
    setRoadmap(assembleRoadmap(state, m as any));
  }

  return (
    <div className="fg-root" data-theme={theme}>
      <Styles />
      <CosmicBackground />
      <TopBar
        onHome={() => setView("home")}
        onExplore={() => setView("explore")}
        layer={current?.layer}
        aiOn={aiOn}
        onConnect={() => setShowConnect(true)}
        theme={theme}
        onTheme={() => setTheme(theme === "dark" ? "light" : "dark")}
        view={view}
      />
      {view === "home" && <Home onStart={() => setView("fields")} onExplore={() => setView("explore")} />}
      {view === "explore" && <ExplorePage onStart={() => setView("fields")} />}
      {view === "fields" && (
        <FieldPicker onCC={start} onMarketing={startMarketing} onHome={() => setView("home")} />
      )}
      {view === "quiz" && (
        <Quiz state={state} answered={answered} current={current} onSubmit={submit} onBack={back} history={history} />
      )}
      {view === "mkquiz" && (
        <MarketingQuiz current={mkCurrent} answers={mkAnswers} onSubmit={mkSubmit} onBack={mkBack} onEditChip={mkEditChip} />
      )}
      {view === "mkroadmap" && (
        <MarketingRoadmap answers={mkAnswers} onRestart={() => setView("fields")} />
      )}
      {view === "adaptive" && (
        <AdaptiveStep
          q={adaptiveQueue[adaptiveIdx]}
          step={adaptiveIdx + 1}
          total={adaptiveQueue.length}
          loading={adaptiveLoading}
          aiOn={aiOn}
          onAnswer={answerAdaptive}
        />
      )}
      {view === "loading" && <LoadingTransition />}
      {view === "roadmap" && roadmap && (
        <RoadmapView roadmap={roadmap} onRestart={start} onFeedback={rebuildWithFeedback} enhancing={enhancing} aiOn={aiOn} aiError={aiError} />
      )}
      {showConnect && (
        <ConnectAI current={aiKey} onClose={() => setShowConnect(false)} onSave={(k: string) => { setAiKey(k); setShowConnect(false); }} />
      )}
      <Footer />
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
//  Atmosphere: cosmic background — abstract drifting starfield

function CosmicBackground() {
  // Deterministic positions so it doesn't reshuffle on every render.
  const { stars, shooting } = useMemo(() => {
    let seed = 137;
    const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    const starsOut: { x: number; y: number; r: number; d: number; o: number; dur: number }[] = [];
    for (let i = 0; i < 90; i++) {
      starsOut.push({
        x: rand() * 100,
        y: rand() * 100,
        r: 0.3 + rand() * 1.4,
        d: rand() * 8,
        o: 0.15 + rand() * 0.55,
        dur: 3 + rand() * 5,
      });
    }
    // A few shooting stars at staggered intervals / positions.
    const shootOut: { top: number; left: number; delay: number; dur: number }[] = [];
    for (let i = 0; i < 2; i++) {
      shootOut.push({
        top: 5 + rand() * 45,
        left: 30 + rand() * 60,
        delay: 3 + i * 6 + rand() * 4,
        dur: 1.1 + rand() * 0.8,
      });
    }
    return { stars: starsOut, shooting: shootOut };
  }, []);
  return (
    <div className="fg-cosmos" aria-hidden>
      {/* Pure black void with sparse white pinpoints — matches image 2's deep space.
         No drifting clouds, no color washes. Motion lives on text/sections, not the bg. */}
      <svg className="fg-cosmos-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        {stars.map((s, i) => (
          <circle
            key={i}
            cx={s.x}
            cy={s.y}
            r={s.r * 0.16}
            className="fg-cosmic-star"
            style={{ animationDelay: `${s.d}s`, animationDuration: `${s.dur}s`, ["--o" as any]: s.o }}
          />
        ))}
      </svg>
      {/* shooting stars */}
      {shooting.map((s, i) => (
        <span
          key={i}
          className="fg-shoot"
          style={{ top: `${s.top}%`, left: `${s.left}%`, animationDelay: `${s.delay}s`, animationDuration: `${s.dur}s` }}
        />
      ))}
    </div>
  );
}

function ConstellationHero() {
  // High-fidelity galaxy centerpiece. v4 focuses on the two extremes:
  //
  //   CENTER (the ignition point):
  //     • Blazing white pinpoint with multi-layer bloom
  //     • 8-point starburst rays radiating outward from the core (lens-flare style)
  //     • Sharper, tighter color falloff so the center reads as a DEFINITE POINT
  //
  //   EDGES (the spiral arms):
  //     • Real curved spiral-arm paths drawn as Bezier curves with gradient strokes
  //     • Two main arms + two trailing arms swept logarithmically
  //     • Star clusters seeded ALONG each arm so the eye traces the spiral
  //     • Each arm fades from warm-near-core to cool-blue at the tips
  //
  // Deterministic seeded RNG so the starfield never reshuffles between renders.
  const seed = (() => { let s = 4717; return () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; }; })();

  // Background starfield — outside the galaxy disk
  const bgStars: { x: number; y: number; r: number; bright: boolean }[] = [];
  for (let i = 0; i < 110; i++) {
    const x = seed() * 1600;
    const y = seed() * 1000;
    const dx = (x - 800), dy = (y - 500) * 2.4;
    const insideDisk = (dx * dx + dy * dy) < (500 * 500);
    if (insideDisk && seed() > 0.12) continue;
    const r = 0.5 + Math.pow(seed(), 3.2) * 3.4;
    bgStars.push({ x, y, r, bright: r > 2.5 });
  }
  // Arm-cluster stars — seeded ALONG each spiral arm so the arms look populated.
  // For each arm we sample t∈[0..1] and place a few stars near the path.
  const armStars: { x: number; y: number; r: number }[] = [];
  // Parametric spiral arm: r(t) = r0 * e^(b*t), theta = t0 + a*t.
  // Center is (800,500), disk rotated -20deg.
  const cx = 800, cy = 500, rot = -20 * Math.PI / 180;
  const armPoint = (t: number, thetaOffset: number) => {
    const r = 70 + 540 * t;                            // grows outward
    const theta = thetaOffset + t * 2.4 * Math.PI;     // ~430° of sweep
    const x0 = r * Math.cos(theta);
    const y0 = r * Math.sin(theta) * 0.32;              // disk is short along y
    // rotate the whole disk
    return [cx + x0 * Math.cos(rot) - y0 * Math.sin(rot), cy + x0 * Math.sin(rot) + y0 * Math.cos(rot)];
  };
  for (const thetaOffset of [0, Math.PI]) {
    for (let i = 0; i < 38; i++) {
      const t = 0.08 + (i / 38) * 0.92;
      const [x, y] = armPoint(t, thetaOffset);
      // Jitter perpendicular to the arm so stars don't lie on a perfect line.
      const jx = (seed() - 0.5) * 22;
      const jy = (seed() - 0.5) * 10;
      const r = 0.5 + Math.pow(seed(), 3) * 2.4;
      armStars.push({ x: x + jx, y: y + jy, r });
    }
  }

  // Build the spiral arm path d-attribute (two main arms).
  const armPath = (thetaOffset: number) => {
    const pts: [number, number][] = [];
    for (let i = 0; i <= 40; i++) pts.push(armPoint(i / 40, thetaOffset) as [number, number]);
    return pts.reduce((acc, [x, y], i) =>
      i === 0 ? `M ${x.toFixed(1)} ${y.toFixed(1)}` : `${acc} L ${x.toFixed(1)} ${y.toFixed(1)}`, "");
  };

  return (
    <svg className="fg-hero-constellation" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" aria-hidden>
      <defs>
        {/* Hot core — tighter, brighter ignition point */}
        <radialGradient id="fgGalCore" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stopColor="#FFFFFF" stopOpacity="1" />
          <stop offset="3%"   stopColor="#FFFFFF" stopOpacity=".98" />
          <stop offset="10%"  stopColor="#FFF6DA" stopOpacity=".92" />
          <stop offset="22%"  stopColor="#FFC97A" stopOpacity=".75" />
          <stop offset="38%"  stopColor="#FF8A52" stopOpacity=".55" />
          <stop offset="55%"  stopColor="#D04A8E" stopOpacity=".38" />
          <stop offset="72%"  stopColor="#7B4BE8" stopOpacity=".22" />
          <stop offset="88%"  stopColor="#3A4FA8" stopOpacity=".10" />
          <stop offset="100%" stopColor="#000000" stopOpacity="0" />
        </radialGradient>
        <radialGradient id="fgCoreFlare" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stopColor="#FFFFFF" stopOpacity=".95" />
          <stop offset="35%"  stopColor="#FFE6B0" stopOpacity=".30" />
          <stop offset="100%" stopColor="#FFE6B0" stopOpacity="0" />
        </radialGradient>
        {/* Arm stroke gradient — warm near core, cool at the tip */}
        <linearGradient id="fgArmStroke" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"  stopColor="#FFE6B0" stopOpacity="0" />
          <stop offset="15%" stopColor="#FFC97A" stopOpacity=".65" />
          <stop offset="40%" stopColor="#D25E8E" stopOpacity=".55" />
          <stop offset="70%" stopColor="#7B5BE8" stopOpacity=".45" />
          <stop offset="92%" stopColor="#4A7FE0" stopOpacity=".30" />
          <stop offset="100%" stopColor="#4A7FE0" stopOpacity="0" />
        </linearGradient>
        {/* Outer disk wash — kept faint, just a halo */}
        <radialGradient id="fgGalArm" cx="50%" cy="50%" r="50%">
          <stop offset="35%"  stopColor="#000000" stopOpacity="0" />
          <stop offset="58%"  stopColor="#4A6FCC" stopOpacity=".22" />
          <stop offset="80%"  stopColor="#2A3F90" stopOpacity=".10" />
          <stop offset="100%" stopColor="#000000" stopOpacity="0" />
        </radialGradient>
        <radialGradient id="fgGalBulge" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stopColor="#FFEEC0" stopOpacity=".90" />
          <stop offset="40%"  stopColor="#FF9A52" stopOpacity=".50" />
          <stop offset="80%"  stopColor="#B85C9E" stopOpacity=".18" />
          <stop offset="100%" stopColor="#000000" stopOpacity="0" />
        </radialGradient>
        <radialGradient id="fgStarHalo">
          <stop offset="0%"  stopColor="#FFF3D6" stopOpacity=".95" />
          <stop offset="40%" stopColor="#FFD27A" stopOpacity=".30" />
          <stop offset="100%" stopColor="#FFD27A" stopOpacity="0" />
        </radialGradient>
        {/* Filters — separate blur amounts for each layer keeps the core sharp
            and the halo soft */}
        <filter id="fgSoftBloom" x="-30%" y="-60%" width="160%" height="220%">
          <feGaussianBlur stdDeviation="8" />
        </filter>
        <filter id="fgArmBloom" x="-15%" y="-15%" width="130%" height="130%">
          <feGaussianBlur stdDeviation="2.4" />
        </filter>
        <filter id="fgCoreBloom" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="2" />
        </filter>
        <filter id="fgRayBlur" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="1.2" />
        </filter>
      </defs>

      {/* ─────────── Outer disk halo (very faint) ─────────── */}
      <g transform="translate(800 500) rotate(-20)">
        <ellipse rx="700" ry="160" fill="url(#fgGalArm)" opacity=".85" filter="url(#fgSoftBloom)" />
        <ellipse rx="560" ry="130" fill="url(#fgGalArm)" opacity=".70" />
      </g>

      {/* ─────────── SPIRAL ARMS — the real edge structure ─────────── */}
      <g filter="url(#fgArmBloom)" opacity=".95">
        {/* Two main arms — wider, brighter */}
        <path d={armPath(0)}        stroke="url(#fgArmStroke)" strokeWidth="34" fill="none" strokeLinecap="round" opacity=".80" />
        <path d={armPath(Math.PI)}  stroke="url(#fgArmStroke)" strokeWidth="34" fill="none" strokeLinecap="round" opacity=".80" />
        {/* Inner trailing arm pair — thinner, slightly offset */}
        <path d={armPath(Math.PI * 0.45)} stroke="url(#fgArmStroke)" strokeWidth="18" fill="none" strokeLinecap="round" opacity=".55" />
        <path d={armPath(Math.PI * 1.45)} stroke="url(#fgArmStroke)" strokeWidth="18" fill="none" strokeLinecap="round" opacity=".55" />
      </g>

      {/* ─────────── Star clusters seeded along each arm ─────────── */}
      <g opacity=".9">
        {armStars.map((s, i) => (
          <g key={`a${i}`}>
            <circle cx={s.x} cy={s.y} r={s.r * 3.2} fill="url(#fgStarHalo)" opacity=".55" />
            <circle cx={s.x} cy={s.y} r={s.r} fill="#FFF3D6" />
          </g>
        ))}
      </g>

      {/* ─────────── CENTER — bright bulge + ignition point + starburst rays ─────────── */}
      <g transform="translate(800 500) rotate(-20)">
        <ellipse rx="240" ry="92"  fill="url(#fgGalBulge)" filter="url(#fgCoreBloom)" />
        <ellipse rx="160" ry="62"  fill="url(#fgGalBulge)" opacity=".95" />
        {/* Core ignition */}
        <ellipse rx="110" ry="68"  fill="url(#fgGalCore)" filter="url(#fgCoreBloom)" />
        <ellipse rx="40"  ry="28"  fill="url(#fgGalCore)" />
        {/* Pure-white pinpoint at the very center */}
        <circle r="7" fill="#FFFFFF" />
        <circle r="14" fill="url(#fgCoreFlare)" />
        {/* 8-point starburst rays — diffraction-spike lens-flare effect */}
        <g stroke="#FFF6DA" strokeLinecap="round" filter="url(#fgRayBlur)">
          {/* Primary 4-way (horizontal + vertical) */}
          <line x1="-220" y1="0" x2="220" y2="0" strokeWidth="1.8" opacity=".85" />
          <line x1="0" y1="-110" x2="0" y2="110" strokeWidth="1.4" opacity=".70" />
          {/* Secondary 4-way (diagonals), shorter */}
          <line x1="-110" y1="-55" x2="110" y2="55" strokeWidth="1.0" opacity=".50" />
          <line x1="-110" y1="55"  x2="110" y2="-55" strokeWidth="1.0" opacity=".50" />
        </g>
      </g>

      {/* ─────────── Background starfield ─────────── */}
      {bgStars.map((s, i) => (
        <g key={`b${i}`} className="fg-hero-star" style={{ animationDelay: `${(i % 12) * 0.18}s` }}>
          {s.bright && (
            <>
              <circle cx={s.x} cy={s.y} r={s.r * 5} fill="url(#fgStarHalo)" />
              {/* 4-point diffraction spike for the brightest stars */}
              <g stroke="#FFF3D6" strokeLinecap="round" opacity=".55">
                <line x1={s.x - s.r * 4.5} y1={s.y} x2={s.x + s.r * 4.5} y2={s.y} strokeWidth=".55" />
                <line x1={s.x} y1={s.y - s.r * 4.5} x2={s.x} y2={s.y + s.r * 4.5} strokeWidth=".55" />
              </g>
            </>
          )}
          <circle cx={s.x} cy={s.y} r={s.r} fill="#FFF3D6" />
        </g>
      ))}
    </svg>
  );
}

// ════════════════════════════════════════════════════════════════════════════
//  Tools showcase (grouped by what they do)
// ════════════════════════════════════════════════════════════════════════════
const BUCKETS: { key: string; label: string; matches: RegExp }[] = [
  { key: "research", label: "Research & Ideas", matches: /(research|trend|brainstorm|hook)/i },
  { key: "writing", label: "Writing & Copy", matches: /(writing|copywrit|long-form|expander|formatter|caption writer|cold-email|promo|personalization|sequence planner|subject-line|editing\/style|meta\/schema|seo|hashtag)/i },
  { key: "voice", label: "Voice & Audio", matches: /(voice|text-to-speech|tts)/i },
  { key: "video", label: "Video", matches: /(video|avatar|storyboard|animation|clip|highlight|stock footage|caption generator)/i },
  { key: "image", label: "Image & Graphics", matches: /(image gen|thumbnail|variant|inpaint|upscal|product-shot|background|infographic|icon|graphic\/design|diagram)/i },
  { key: "design", label: "Layout & Assembly", matches: /(carousel|layout|newsletter assembler|email-template|email designer)/i },
  { key: "publishing", label: "Publishing & Analytics", matches: /(scheduler|publisher|performance-analytics|analytic)/i },
  { key: "automation", label: "Automation", matches: /(automation|workflow|automation-flow)/i },
];

function bucketFor(category: string): string {
  for (const b of BUCKETS) if (b.matches.test(category)) return b.key;
  return "research";
}

function ToolShowcase({ query }: { query?: string }) {
  const tools = useMemo(uniqueTools, []);
  const [active, setActive] = useState<any | null>(null);
  const [filter, setFilter] = useState<string>("all");

  const counts = useMemo(() => {
    const c: Record<string, number> = { all: tools.length };
    for (const t of tools as any[]) {
      const k = bucketFor(t.category);
      c[k] = (c[k] || 0) + 1;
    }
    return c;
  }, [tools]);

  const q = (query || "").trim().toLowerCase();
  const baseShown = filter === "all" ? tools : tools.filter((t: any) => bucketFor(t.category) === filter);
  const shown = q
    ? (baseShown as any[]).filter((t) =>
        t.name.toLowerCase().includes(q) ||
        (t.category || "").toLowerCase().includes(q) ||
        (t.exactTask || "").toLowerCase().includes(q) ||
        (t.bestForNiche || "").toLowerCase().includes(q)
      )
    : baseShown;

  return (
    <section className="fg-tools" id="tools">
      <div className="fg-sec-eyebrow">The tool universe</div>
      <h2 className="fg-sec-h">{tools.length} researched AI tools, mapped to the work</h2>
      <p className="fg-sec-sub">Every tool scored, ranked, and matched to the step that uses it. Tap any star for the verdict.</p>
      <div className="fg-filterbar">
        <button className={`fg-filter ${filter === "all" ? "on" : ""}`} onClick={() => setFilter("all")}>
          All <span className="fg-filter-count">{counts.all}</span>
        </button>
        {BUCKETS.map((b) => counts[b.key] ? (
          <button key={b.key} className={`fg-filter ${filter === b.key ? "on" : ""}`} onClick={() => setFilter(b.key)}>
            {b.label} <span className="fg-filter-count">{counts[b.key]}</span>
          </button>
        ) : null)}
      </div>
      <div className="fg-tool-grid">
        {shown.map((t: any) => (
          <button key={t.id} className="fg-tool-card" onClick={() => setActive(t)}>
            <div className="fg-tool-top">
              <span className="fg-tool-cat">{t.category}</span>
              <Stars score={t.trustScore} />
            </div>
            <div className="fg-tool-name">{t.name}</div>
            <div className="fg-tool-task">{t.exactTask}</div>
            <div className="fg-tool-foot">
              <span className="fg-tool-price">{t.startingPrice || "—"}</span>
              <span className="fg-tool-region">{t.region?.split("(")[0]}</span>
            </div>
          </button>
        ))}
      </div>
      {active && <ToolModal tool={active} onClose={() => setActive(null)} />}
    </section>
  );
}

function Stars({ score }: any) {
  return (
    <span className="fg-stars" title={`Trust ${score}/5`}>
      {"★★★★★".slice(0, score)}
      <span className="fg-stars-off">{"★★★★★".slice(score)}</span>

}

function ToolModal({ tool, onClose }: any) {

// ════════════════════════════════════════════════════════════════════════════
//  Constellation Tree — quiz progress visualization
// ════════════════════════════════════════════════════════════════════════════

// Cherry-blossom constellation: organic curving branches with star-blossoms at the tips.
// Each star = one slot in the user's path. The trunk curves up from base; branches arc outward
// like a real bonsai. Curves use SVG path 'Q' (quadratic) for natural sway.
// Layout is in a 200×320 viewBox (will scale fluidly).
const TREE_STARS: { x: number; y: number; size: number }[] = [
  // Base / lower trunk
  { x: 100, y: 305, size: 3 },     // 0 ground
  { x: 98,  y: 270, size: 3 },     // 1 lower trunk
  { x: 102, y: 235, size: 3.2 },   // 2 mid trunk (fork point)
  // Left side branch (lower)
  { x: 62,  y: 210, size: 3.4 },   // 3
  { x: 38,  y: 178, size: 4 },     // 4 — left blossom tip
  // Right side branch (lower)
  { x: 138, y: 208, size: 3.4 },   // 5
  { x: 164, y: 178, size: 4 },     // 6 — right blossom tip
  // Mid-trunk continuing up
  { x: 100, y: 198, size: 3.2 },   // 7
  // Left mid branch
  { x: 72,  y: 165, size: 3.4 },   // 8
  { x: 50,  y: 130, size: 4.2 },   // 9 — left-mid blossom
  // Right mid branch
  { x: 128, y: 165, size: 3.4 },   // 10
  { x: 150, y: 130, size: 4.2 },   // 11 — right-mid blossom
  // Crown
  { x: 100, y: 160, size: 3.4 },   // 12 upper trunk
  { x: 82,  y: 115, size: 4.4 },   // 13 left crown blossom
  { x: 118, y: 115, size: 4.4 },   // 14 right crown blossom
  { x: 100, y: 80,  size: 5 },     // 15 top blossom (north star)
];

// Curved branches as SVG paths. Each entry: from-index → to-index with a control point.
// Format: [fromIdx, toIdx, ctrlX, ctrlY]
const TREE_BRANCHES: [number, number, number, number][] = [
  [0, 1, 99, 290],     // trunk lower
  [1, 2, 102, 252],    // trunk mid
  [2, 3, 78, 224],     // → left lower
  [3, 4, 48, 195],     // → left tip
  [2, 5, 122, 224],    // → right lower
  [5, 6, 152, 195],    // → right tip
  [2, 7, 100, 215],    // trunk continues up
  [7, 8, 84, 182],     // → left mid
  [8, 9, 58, 146],     // → left mid blossom
  [7, 10, 116, 182],   // → right mid
  [10, 11, 140, 146],  // → right mid blossom
  [7, 12, 100, 178],   // trunk to crown
  [12, 13, 90, 137],   // crown left
  [12, 14, 110, 137],  // crown right
  [12, 15, 100, 118],  // crown top
];

// Decorative blossom petals scattered near lit stars (purely visual flourish).
const BLOSSOM_OFFSETS = [[-6, -3], [5, -5], [-3, 6], [7, 4], [0, -8]];

function ConstellationTree({ progress }: { progress: number }) {
  // progress ∈ [0,1]. Light up stars proportionally.
  const totalStars = TREE_STARS.length;
  const litCount = Math.max(0, Math.min(totalStars, Math.round(progress * totalStars)));
  return (
    <svg className="fg-tree" viewBox="0 0 200 330" preserveAspectRatio="xMidYMax meet" aria-hidden>
      <defs>
        <radialGradient id="fgstarbright">
          <stop offset="0%" stopColor="var(--star-bright)" stopOpacity="1" />
          <stop offset="55%" stopColor="var(--star-bright)" stopOpacity="0.45" />
          <stop offset="100%" stopColor="var(--star-bright)" stopOpacity="0" />
        </radialGradient>
        <radialGradient id="fgstarpurple">
          <stop offset="0%" stopColor="var(--purple-glow)" stopOpacity="1" />
          <stop offset="100%" stopColor="var(--purple-glow)" stopOpacity="0" />
        </radialGradient>
        <radialGradient id="fgblossom">
          <stop offset="0%" stopColor="var(--star-bright)" stopOpacity=".9" />
          <stop offset="100%" stopColor="var(--star-bright)" stopOpacity="0" />
        </radialGradient>
        <linearGradient id="fgbranchlit" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stopColor="var(--gold)" stopOpacity=".8" />
          <stop offset="100%" stopColor="var(--purple-glow)" stopOpacity=".9" />
        </linearGradient>
      </defs>

      {/* Curved branches */}
      {TREE_BRANCHES.map(([a, b, cx, cy], i) => {
        const lit = a < litCount && b < litCount;
        const aN = TREE_STARS[a], bN = TREE_STARS[b];
        return (
          <path
            key={i}
            d={`M ${aN.x} ${aN.y} Q ${cx} ${cy} ${bN.x} ${bN.y}`}
            className={`fg-tree-branch ${lit ? "lit" : ""}`}
            fill="none"
          />
        );
      })}

      {/* Blossom petals (only near lit stars) */}
      {TREE_STARS.slice(0, litCount).flatMap((s, idx) =>
        // Only scatter petals on stars marked as blossoms (size >= 4 — the tips)
        s.size >= 4
          ? BLOSSOM_OFFSETS.map((o, i) => (
              <circle
                key={`b-${idx}-${i}`}
                cx={s.x + o[0]}
                cy={s.y + o[1]}
                r="1.2"
                fill="url(#fgblossom)"
                className="fg-tree-petal"
                style={{ animationDelay: `${(idx + i) * 0.2}s` }}
              />
            ))
          : []
      )}

      {/* Stars */}
      {TREE_STARS.map((s, i) => {
        const lit = i < litCount;
        const next = i === litCount;
        return (
          <g key={i} className={`fg-tree-star ${lit ? "lit" : ""} ${next ? "next" : ""}`}>
            {lit && <circle cx={s.x} cy={s.y} r={s.size * 3.6} fill="url(#fgstarpurple)" className="fg-tree-halo" />}
            {lit && <circle cx={s.x} cy={s.y} r={s.size * 2.4} fill="url(#fgstarbright)" />}
            <circle cx={s.x} cy={s.y} r={s.size} className="fg-tree-core" />
            {lit && <circle cx={s.x} cy={s.y} r={s.size * 0.4} fill="#fff" opacity=".9" className="fg-tree-twinkle" />}
          </g>
        );
      })}
    </svg>
  );
}

// ════════════════════════════════════════════════════════════════════════════
//  Quiz
// ════════════════════════════════════════════════════════════════════════════
const COMPOUND: Record<string, any> = {
  Q5: {
    rows: [
      { label: "Why are you doing this?", opts: [["Starting from scratch", "create"], ["Fixing something I have", "improve"], ["Reusing old content", "repurpose"], ["Making it run on autopilot", "automate"]] },
      { label: "What's the headache you want to fix?", opts: [["I want to save time", "save_time"], ["I want less effort", "reduce_effort"], ["I want better quality", "improve_quality"], ["I want less confusion", "avoid_confusion"]] },
    ],
  },
  Q11: {
    rows: [
      { label: "Budget", opts: [["Free only", "free"], ["Up to ~$25/month", "low"], ["Best tool wins", "flexible"]] },
      { label: "How adventurous with new tools?", opts: [["Stick with proven", "safe"], ["A mix is fine", "mixed"], ["Try new things", "experimental"]] },
    ],
  },
};

function Quiz({ state, answered, current, onSubmit, onBack }: any) {
  const [sel, setSel] = useState<string[]>([]);
  const [pair, setPair] = useState<string[]>([]);
  // High-water mark so the tree never *unlights* — branches only grow, never shrink.
  const [stablePct, setStablePct] = useState(0);
  useEffect(() => { setSel([]); setPair([]); }, [current?.id]);

  // We always have ~13 questions on a full path; use answered count over a fixed estimate
  // (with a small floor so the first answer makes visible progress).
  const ESTIMATED_TOTAL = 13;
  const liveCount = answered.size;
  const livePct = Math.min(1, (liveCount + (current ? 0.15 : 0)) / ESTIMATED_TOTAL);
  useEffect(() => {
    if (livePct > stablePct) setStablePct(livePct);
  }, [livePct]);

  if (!current) return null;
  const prog = estimateProgress(state, answered);
  const compound = COMPOUND[current.id];

  function toggle(v: string) {
    if (current.type === "multi") setSel(sel.includes(v) ? sel.filter((x) => x !== v) : [...sel, v]);
    else setSel([v]);
  }
  function setPairVal(rowIdx: number, v: string) {
    const p = [...pair]; p[rowIdx] = v; setPair(p);
  }

  const ready = compound ? pair[0] && pair[1] : sel.length > 0;
  function go() {
    if (compound) onSubmit(current.id, `${pair[0]}|${pair[1]}`);
    else onSubmit(current.id, current.type === "multi" ? sel : sel[0]);
  }

  return (
    <section className="fg-quiz">
      <div className="fg-quiz-tree">
        <ConstellationTree progress={stablePct} />
        <div className="fg-tree-caption">
          ✦ {prog.answered} {prog.answered === 1 ? "star" : "stars"} lit
        </div>
      </div>

      <div className="fg-quiz-main">
        <div className="fg-q-card" key={current.id}>
          <div className="fg-q-eyebrow">
            <span className={`fg-q-layer-dot fg-layer-${current.layer}`} />
            {current.layer === "deepen" ? "Refining your path" : ({
              what: "Understanding your work", how: "Tuning your guidance", why: "Choosing the right tools"
            } as any)[current.layer] || current.layer}
          </div>
          <h2 className="fg-q-title">{current.title}</h2>
          {current.hint && <p className="fg-q-hint">{current.hint}</p>}

          {compound ? (
            <div className="fg-compound">
              {compound.rows.map((row: any, ri: number) => (
                <div className="fg-comp-row" key={ri}>
                  <div className="fg-comp-label">{row.label}</div>
                  <div className="fg-opts">
                    {row.opts.map(([l, v]: any) => (
                      <button key={v} className={`fg-opt ${pair[ri] === v ? "sel" : ""}`} onClick={() => setPairVal(ri, v)}>
                        <span>{l}</span>
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <>
              {current.type === "multi" && <div className="fg-multi-note">Pick any that apply</div>}
              <div className="fg-opts">
                {current.options.map((o: any) => (
                  <button key={o.value} className={`fg-opt ${sel.includes(o.value) ? "sel" : ""}`} onClick={() => toggle(o.value)}>
                    <span>{o.label}</span>
                    {o.hint && <span className="fg-opt-hint">{o.hint}</span>}
                  </button>
                ))}
              </div>
            </>
          )}

          <div className="fg-q-actions">
            <button className="fg-btn-back" onClick={onBack}>← Back</button>
            <button className="fg-btn-primary" disabled={!ready} onClick={go}>Continue →</button>
          </div>
        </div>
      </div>
    </section>
  );
}

function AdaptiveStep({ q, step, total, loading, aiOn, onAnswer }: any) {
  const [sel, setSel] = useState<string>("");
  useEffect(() => { setSel(""); }, [q?.id]);
  if (loading) {
    return (
      <section className="fg-quiz">
        <div className="fg-quiz-tree"><ConstellationTree progress={0.95} /></div>
        <div className="fg-quiz-main">
          <div className="fg-q-card" style={{ textAlign: "center" }}>
            <div className="fg-spin" style={{ margin: "20px auto" }} />
            <p className="fg-q-hint">Tuning one last question to your answers…</p>
          </div>
        </div>
      </section>
    );
  }
  if (!q) {
    return (
      <section className="fg-quiz">
        <div className="fg-quiz-tree"><ConstellationTree progress={1} /></div>
        <div className="fg-quiz-main">
          <div className="fg-q-card" style={{ textAlign: "center" }}>
            <h2 className="fg-q-title">Your constellation is complete</h2>
            <p className="fg-q-hint">Ready to draw your roadmap?</p>
            <button className="fg-btn-primary" onClick={() => onAnswer(null)}>Draw my roadmap →</button>
          </div>
        </div>
      </section>
    );
  }
  return (
    <section className="fg-quiz">
      <div className="fg-quiz-tree"><ConstellationTree progress={0.92} /></div>
      <div className="fg-quiz-main">
        <div className="fg-q-card" key={q.id}>
          <div className="fg-q-eyebrow" style={{ color: "var(--purple-glow)" }}>
            <span className="fg-q-layer-dot" style={{ background: "var(--purple-glow)" }} />
            {q.aiGenerated ? "✦ AI-authored question" : "✦ Personalised question"}{total > 1 ? ` · ${step} of ${total}` : ""}
          </div>
          <h2 className="fg-q-title">{q.title}</h2>
          {q.hint && <p className="fg-q-hint">{q.hint}</p>}
          <div className="fg-opts">
            {q.options.map((o: any) => (
              <button key={o.value} className={`fg-opt ${sel === o.value ? "sel" : ""}`} onClick={() => setSel(o.value)}>
                {o.label}
              </button>
            ))}
          </div>
          <div className="fg-q-actions">
            <button className="fg-btn-back" onClick={() => onAnswer(null)}>Skip</button>
            <button className="fg-btn-primary" disabled={!sel} onClick={() => onAnswer(sel)}>Draw my roadmap →</button>
          </div>
        </div>
      </div>
    </section>
  );
}

// ════════════════════════════════════════════════════════════════════════════
//  Loading transition — the tree dissolves into the constellation path
// ════════════════════════════════════════════════════════════════════════════
function LoadingTransition() {
  // Stars "released" from the tree that rise and drift — the visual bridge from the
  // constellation tree to the vertical star path.
  const rising = useMemo(() => {
    let seed = 71;
    const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    return Array.from({ length: 18 }, () => ({
      left: 10 + rand() * 80,
      delay: rand() * 1.2,
      dur: 1.1 + rand() * 1,
      size: 2 + rand() * 4,
    }));
  }, []);
  return (
    <section className="fg-loading">
      <div className="fg-loading-stage">
        <div className="fg-loading-tree"><ConstellationTree progress={1} /></div>
        <div className="fg-rising-field">
          {rising.map((r, i) => (
            <span
              key={i}
              className="fg-rising-star"
              style={{ left: `${r.left}%`, width: r.size, height: r.size, animationDelay: `${r.delay}s`, animationDuration: `${r.dur}s` }}
            />
          ))}
        </div>
      </div>
      <div className="fg-loading-text">
        <div className="fg-load-h">Charting your map</div>
        <div className="fg-load-sub">Turning your constellation into a step-by-step path…</div>
      </div>
    </section>
  );
}

// ════════════════════════════════════════════════════════════════════════════
//  Roadmap — vertical Star Path
// ════════════════════════════════════════════════════════════════════════════
function RoadmapView({ roadmap, onRestart, onFeedback, enhancing, aiOn, aiError }: any) {
  const s = roadmap.summary;
  const [openIdx, setOpenIdx] = useState<number | null>(0);
  return (
    <section className="fg-rm">
      <div className="fg-rm-head">
        <span className="fg-rm-shape">{roadmap.shape === "transformation" ? "Transformation path" : "Production path"}</span>
        <h1 className="fg-rm-h">Your {s.specialtyLabel} roadmap</h1>
        <div className="fg-rm-tags">
          {s.platforms.length > 0 && <Tag k="On" v={s.platforms.join(", ")} />}
          {s.niches.length > 0 && <Tag k="About" v={s.niches.join(", ")} />}
          <Tag k="Purpose" v={s.purpose} />
          {roadmap.aiEnhanced && <span className="fg-tag fg-tag-ai">✦ AI-enhanced</span>}
        </div>
      </div>

      {enhancing && (
        <div className="fg-enhancing"><span className="fg-spin-sm" /> Personalising your roadmap…</div>
      )}
      {aiError && (
        <div className="fg-ai-error">
          <b>⚠ AI enhancement failed</b> — your roadmap is showing the deterministic version.<br />
          <span className="fg-ai-error-msg">{aiError}</span>
        </div>
      )}

      {roadmap.brief && <BriefCard brief={roadmap.brief} ai={roadmap.aiEnhanced} />}

      {roadmap.niche && <NicheCard niche={roadmap.niche} />}

      {roadmap.fallbackStages.length > 0 && (
        <div className="fg-fallback">
          ⚠ {roadmap.fallbackStages.length} step(s) had no tool surviving your filters — showing the full pool there.
        </div>
      )}

      <div className="fg-path-h">{roadmap.steps.length} steps · tap a star to open it</div>

      <div className="fg-path">
        <div className="fg-path-line" />
        {roadmap.steps.map((step: RoadmapStep, i: number) => (
          <StarStep
            key={step.stage + i}
            step={step}
            index={i}
            isOpen={openIdx === i}
            isLast={i === roadmap.steps.length - 1}
            onToggle={() => setOpenIdx(openIdx === i ? null : i)}
            onFeedback={onFeedback}
          />

      <div className="fg-rm-foot">
        <button className="fg-btn-ghost" onClick={onRestart}>↻ Draw a new map</button>
      </div>
    </section>
  );
}

function PromptBox({ prompt }: any) {
  const [copied, setCopied] = useState(false);
  function copy() {
    try {
      navigator.clipboard.writeText(prompt);
      setCopied(true);
      setTimeout(() => setCopied(false), 1400);
    } catch { /* clipboard blocked */ }
  }
  return (
    <div className="fg-prompt">
      <div className="fg-prompt-head">
        <span>Copy-paste prompt</span>
        <button className="fg-copy-btn" onClick={copy}>{copied ? "✓ Copied" : "Copy"}</button>
      </div>
      <pre className="fg-prompt-body">{prompt}</pre>
    </div>
  );
}

const MK_LAYER_LABEL: Record<string, string> = {
  who: "Understanding your work",
  what: "Understanding your work",
  how: "Tuning your guidance",
  why: "Choosing the right tools",
};

function MarketingQuiz({ current, answers, onSubmit, onBack, onEditChip }: any) {
  // picks[field] is either a string (single) or string[] (multi).
  const [picks, setPicks] = useState<Record<string, any>>({});
  useEffect(() => { setPicks({}); }, [current?.id]);
  if (!current || !_MK) return null;

  // Branch-aware option swap for SP-b / SP-c (always single).
  let parts = current.parts;
  if (current.id === "SP-b" && answers.specialty) parts = [{ ...current.parts[0], options: _MK.spBreakdownOptions(answers.specialty) }];
  if (current.id === "SP-c" && answers.specialty) parts = [{ ...current.parts[0], options: _MK.spRepurposeOptions(answers.specialty) }];

  const chips = _MK.activeChips(answers);
  const compound = parts.length > 1;
  const anyMulti = parts.some((p: any) => p.type === "multi");
  const ready = parts.every((p: any) => {
    const v = picks[p.field];
    if (v === undefined) return false;
    if (p.type === "multi") return Array.isArray(v) && v.length > 0;
    return true;
  });

  function togglePick(p: any, value: string) {
    if (p.type === "multi") {
      const cur: string[] = Array.isArray(picks[p.field]) ? picks[p.field] : [];
      const next = cur.includes(value) ? cur.filter((v) => v !== value) : [...cur, value];
      setPicks({ ...picks, [p.field]: next });
    } else {
      setPicks({ ...picks, [p.field]: value });
    }
  }
  function isSelected(p: any, value: string) {
    const v = picks[p.field];
    if (p.type === "multi") return Array.isArray(v) && v.includes(value);
    return v === value;
  }

  const ESTIMATED_TOTAL = 13;
  const answeredCount = Object.values(answers).filter((v) => v !== undefined && v !== null && (!Array.isArray(v) || v.length > 0)).length;
  const pct = Math.min(1, (answeredCount + 0.15) / ESTIMATED_TOTAL);

  return (
    <section className="fg-quiz">
      <div className="fg-quiz-tree">
        <ConstellationTree progress={pct} />
        <div className="fg-tree-caption">✦ {answeredCount} {answeredCount === 1 ? "star" : "stars"} lit</div>
      </div>
      <div className="fg-quiz-main">
        {chips.length > 0 && (
          <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "14px", justifyContent: "center" }}>
            {chips.map((c: any) => (
              <button key={c.id} className="fg-pill" style={{ cursor: "pointer", border: "none" }} onClick={() => onEditChip(c.editQuestionId)} title={c.source}>
                {c.label}
              </button>
            ))}
          </div>
        )}
        <div className="fg-q-card" key={current.id}>
          <div className="fg-q-eyebrow">
            <span className={`fg-q-layer-dot fg-layer-${current.layer === "who" ? "what" : current.layer}`} />
            {MK_LAYER_LABEL[current.layer] || current.layer}
          </div>
          <h2 className="fg-q-title">{current.title}</h2>
          {current.hint && <p className="fg-q-hint">{current.hint}</p>}
          {anyMulti && !compound && <div className="fg-multi-note">Pick any that apply</div>}

          {compound ? (
            <div className="fg-compound">
              {parts.map((p: any) => (
                <div className="fg-comp-row" key={p.field}>
                  <div className="fg-comp-label">
                    {p.label}
                    {p.type === "multi" && <span className="fg-multi-note" style={{ marginLeft: "10px", fontSize: "10.5px", padding: "2px 8px" }}>Pick any that apply</span>}
                  </div>
                  <div className="fg-opts">
                    {p.options.map((o: any) => (
                      <button key={o.value} className={`fg-opt ${isSelected(p, o.value) ? "sel" : ""}`} onClick={() => togglePick(p, o.value)}>
                        <span>{o.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="fg-opts">
              {parts[0].options.map((o: any) => (
                <button key={o.value} className={`fg-opt ${isSelected(parts[0], o.value) ? "sel" : ""}`} onClick={() => togglePick(parts[0], o.value)}>
                  <span>{o.label}</span>
                  {o.hint && <span className="fg-opt-hint">{o.hint}</span>}
                </button>
              ))}
            </div>
          )}

          <div className="fg-q-actions">
            <button className="fg-btn-back" onClick={onBack}>← Back</button>
            <button className="fg-btn-primary" disabled={!ready} onClick={() => onSubmit(picks)}>Continue →</button>
          </div>
        </div>
      </div>
    </section>
  );
}

const MK_SPECIALTY_LABEL: Record<string, string> = {
  performance: "Performance & Paid Media", seo: "SEO & AI Search Visibility",
  email: "Email & Lifecycle", social: "Social Media", brand: "Brand & Creative",

};
const MK_PURPOSE_LABEL: Record<string, string> = {
  create: "Production", improve: "Improve", repurpose: "Transformation", automate: "Automation",
};

function MarketingRoadmap({ answers, onRestart }: any) {
  const [openIdx, setOpenIdx] = useState<number | null>(0);
  if (!_MK) return null;

  const stages = _MK.determineStages(answers);
  const chips = _MK.buildHeaderChips(answers);
  const brief = _MK.buildStrategyBrief(answers);
  const assumed = stages.filter((s: any) => s.assumedWorking);
  const active = stages.filter((s: any) => !s.assumedWorking);
  const quick = _MK.buildQuickStart(answers, active[0] || stages[0]);
  const showDisc = _MK.shouldShowDisclosure(answers);

  const steps = active.map((stage: any, i: number) => {
    const pool = _MK.poolForStage(_MK.MARKETING_TOOL_PROFILES, stage.key);
    const ranked = _MK.rankStageTools(pool, answers);
    const top = ranked[0] ? ranked[0].tool : null;
    const how = top ? _MK.renderHowText(_MK.buildHowComponents(stage, top, active[i + 1] || null, answers), answers.depth) : "";
    const prompt = top ? _MK.buildToolPrompt(stage, top, answers) : "";
    return { stage, ranked, top, how, prompt, order: i + 1 };
  });

  return (
    <section className="fg-rm">
      <div className="fg-rm-head">
        <span className="fg-rm-shape">{MK_PURPOSE_LABEL[answers.purpose] || "Production"} path</span>
        <h1 className="fg-rm-h">Your {MK_SPECIALTY_LABEL[answers.specialty] || "marketing"} roadmap</h1>
        <div className="fg-rm-tags">
          {chips.map((c: string) => <span key={c} className="fg-tag">{c}</span>)}
        </div>
      </div>

      {brief && (
        <div className="fg-brief">
          <div className="fg-brief-h">✦ Your game plan</div>
          <div className="fg-brief-row"><span className="fg-brief-k">The play</span><span className="fg-brief-v">{brief.play}</span></div>
          <div className="fg-brief-row"><span className="fg-brief-k">Nail this</span><span className="fg-brief-v">{brief.nail}</span></div>
          <div className="fg-brief-row"><span className="fg-brief-k">Watch out for</span><span className="fg-brief-v">{brief.risk}</span></div>
        </div>
      )}

      {quick?.length > 0 && (
        <div className="fg-niche">
          <div className="fg-niche-h">◆ Quick start — your first 3 moves</div>
          <ol style={{ margin: "6px 0 0", paddingLeft: "20px" }}>
            {quick.map((q: string, i: number) => <li key={i} className="fg-nf-v" style={{ margin: "6px 0" }}>{q}</li>)}
          </ol>
        </div>
      )}

      {assumed.length > 0 && (
        <div className="fg-fallback">✓ Assumed working: {assumed.map((s: any) => s.label).join(" · ")} — we start your detailed plan at the step that needs fixing.</div>
      )}

      <div className="fg-path-h">{steps.length} steps · tap a star to open it</div>

      <div className="fg-path">
        <div className="fg-path-line" />
        {steps.map((st: any, i: number) => (
          <MarketingStar
            key={st.stage.key + i}
            data={st}
            answers={answers}
            isOpen={openIdx === i}
            isLast={i === steps.length - 1}
            onToggle={() => setOpenIdx(openIdx === i ? null : i)}
          />
        ))}
      </div>

      {showDisc && (
        <div className="fg-ai-error" style={{ borderColor: "#5C3B0F" }}>
          <b>⚠ AI-disclosure reminder</b><br />
          {_MK.DISCLOSURE_TEXT}<br />
          <span className="fg-ai-error-msg">{_MK.DISCLOSURE_FOOTNOTE}</span>
        </div>
      )}

      <div className="fg-rm-foot">
        <button className="fg-btn-ghost" onClick={onRestart}>↻ Draw a new map</button>
      </div>
    </section>
  );
}
