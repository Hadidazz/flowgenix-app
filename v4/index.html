// Capability buckets — what the tool DOES, not which marketing field it lives under.
// Tools that span fields (Claude, ChatGPT, Perplexity, Gemini) land in one capability
// bucket and carry per-specialty tags on the card so a marketer scanning a bucket
// instantly sees "this LLM also serves email + brand + content."
const MK_CAP_BUCKETS: { key: string; label: string; matches: RegExp }[] = [
  { key: "llm",       label: "LLMs & general AI assistants", matches: /^(chatgpt|claude|gemini|perplexity)/i },
  { key: "research",  label: "Research, insight & audience", matches: /(research|insight|audience|persona|trend|panel|spark|attest)/i },
  { key: "seo",       label: "SEO, on-page & GEO optimization", matches: /(keyword|on-page|seo|geo|aeo|technical seo|schema|surfer|frase|clearscope|screaming frog)/i },
  { key: "linkpr",    label: "Link building, outreach & PR",   matches: /(link|outreach|backlink|pr |digital pr|hunter)/i },
  { key: "ads",       label: "Paid ads & campaign management", matches: /(campaign|bid|ad creative|paid|advantage\+|performance max|tiktok ads|google ads|meta ads)/i },
  { key: "creative",  label: "Creative generation (image, video, design)", matches: /(image|video|design|midjourney|runway|canva|adobe|dalle|firefly|capcut|invideo|synthesia|heygen|veo|krea|flux|figma|leonardo|ideogram)/i },
  { key: "email",     label: "Email & lifecycle platforms",    matches: /(klaviyo|mailchimp|hubspot|braze|customer\.io|sendgrid|email marketing|crm-based)/i },
  { key: "social",    label: "Social scheduling & community",  matches: /(buffer|hootsuite|sprout|later|metricool|community management|social listening|scheduler)/i },
  { key: "writing",   label: "Writing, copy & content production", matches: /(copywrit|writing|drafting|content (gen|production)|editing|grammarly|jasper|copy\.ai|writesonic|article)/i },
  { key: "brand",     label: "Brand strategy, positioning & guidelines", matches: /(brand strategy|positioning|messaging|guidelines|documentation)/i },
  { key: "analytics", label: "Analytics, attribution & dashboards", matches: /(analytic|attribution|tracking|tagging|dashboard|reporting|bi tool|funnel|ga4|triple whale|windsor|cometly)/i },
  { key: "testing",   label: "Experimentation & optimization", matches: /(experiment|a-?b test|testing|optimization|optimiz|vwo|optimizely|kameleoon)/i },
];
const MK_FALLBACK_BUCKET = { key: "other", label: "Other AI tools", matches: /.*/ };

function mkBucketFor(t: any) {
  const hay = `${t.name} ${t.category}`;
  for (const b of MK_CAP_BUCKETS) {
    if (b.matches.test(hay)) return b.key;
  }
  return MK_FALLBACK_BUCKET.key;
}

const MK_SPEC_SHORT: Record<string, string> = {
  seo: "SEO", perf: "Paid", email: "Email", social: "Social",
  brand: "Brand", content: "Content", analytics: "Analytics", shared: "Cross-field",
};

function MarketingToolShowcase({ query }: { query: string }) {
  const [active, setActive] = useState<any | null>(null);
  if (!_MK) return null;

  // Dedup by tool name, keep highest trust, but COLLECT every specialty the
  // tool appears under so we can show cross-field tags on each card.
  const byName: Record<string, any> = {};
  for (const t of _MK.MARKETING_TOOL_PROFILES as any[]) {
    const cur = byName[t.name];
    if (!cur) {
      byName[t.name] = { ...t, specialties: new Set([t.specialty]) };
    } else {
      cur.specialties.add(t.specialty);
      if (t.trustScore > cur.trustScore) Object.assign(cur, t, { specialties: cur.specialties });
    }
  }
  const all = (Object.values(byName) as any[]).map((t) => ({ ...t, specialties: Array.from(t.specialties) }));

  const q = (query || "").trim().toLowerCase();
  const filtered = q
    ? all.filter((t) =>
        t.name.toLowerCase().includes(q) ||
        (t.category || "").toLowerCase().includes(q) ||
        (t.exactTask || "").toLowerCase().includes(q) ||
        (t.specialties || []).some((s: string) => (MK_SPEC_SHORT[s] || s).toLowerCase().includes(q))
      )
    : all;

  return (
    <section className="fg-tools" id="tools">
      <div className="fg-sec-eyebrow">Marketing tool universe</div>
      <h2 className="fg-sec-h">{all.length} marketing AI tools, grouped by what they do</h2>
      <p className="fg-sec-sub">A tool like Claude or ChatGPT serves many fields, so it appears once under its capability — with tags showing every marketing specialty it covers.</p>

      {MK_CAP_BUCKETS.concat([MK_FALLBACK_BUCKET]).map((b) => {
        const list = filtered.filter((t) => mkBucketFor(t) === b.key).sort((a, b) => b.trustScore - a.trustScore || a.name.localeCompare(b.name));
        if (!list.length) return null;
        return (
          <div key={b.key}>
            <div className="fg-sec-eyebrow" style={{ marginTop: "28px", textAlign: "left" }}>{b.label} <span style={{ opacity: 0.5 }}>· {list.length}</span></div>
            <div className="fg-tool-grid">
              {list.map((t) => (
                <button key={t.id} className="fg-tool-card" onClick={() => setActive(t)}>
                  <div className="fg-tool-top"><span className="fg-tool-cat">{t.category}</span><Stars score={t.trustScore} /></div>
                  <div className="fg-tool-name">{t.name}</div>
                  <div className="fg-tool-task">{t.exactTask}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", margin: "6px 0 10px" }}>
                    {(t.specialties || []).map((sp: string) => (
                      <span key={sp} className="fg-rt-pill" style={{ fontSize: "10px", padding: "2px 7px" }}>{MK_SPEC_SHORT[sp] || sp}</span>
                    ))}
                  </div>
                  <div className="fg-tool-foot">
                    <span className="fg-tool-price">{t.startingPrice || "—"}</span>
                    <span className="fg-tool-region">{(t.region || "").split("(")[0]}</span>
                  </div>
                </button>
              ))}
            </div>
          </div>
        );
      })}
      {filtered.length === 0 && (
        <p className="fg-sec-sub" style={{ textAlign: "center", padding: "40px 0" }}>No tools match "{query}". Try a different keyword.</p>
      )}
      {active && <MarketingToolModal tool={active} onClose={() => setActive(null)} />}
    </section>
  );
}

function MarketingToolModal({ tool, onClose }: any) {
  const fits = [tool.primarySpecialty, tool.secondarySpecialties].filter(Boolean).join(", ");
  return (
    <div className="fg-modal-bg" onClick={onClose}>
      <div className="fg-modal" onClick={(e) => e.stopPropagation()}>
        <button className="fg-modal-x" onClick={onClose}>×</button>
        <span className="fg-tool-cat">{tool.category}</span>
        <h3 className="fg-modal-h">{tool.name}</h3>
        <div className="fg-modal-meta">
          <Stars score={tool.trustScore} />
          <span>· {tool.startingPrice || "Pricing varies"}</span>
          {tool.region && <span>· {tool.region}</span>}
        </div>
        <p className="fg-modal-task">{tool.exactTask}</p>
        {tool.freeTier && (<><div className="fg-modal-label">Free tier</div><p className="fg-modal-text">{tool.freeTier}</p></>)}
        {fits && (<><div className="fg-modal-label">Where it fits</div><p className="fg-modal-text">{fits}</p></>)}
        {tool.sourceNotes && (<><div className="fg-modal-label">Notes</div><p className="fg-modal-text">{tool.sourceNotes}</p></>)}
        {tool.toolUrl && <a className="fg-btn-primary" href={tool.toolUrl} target="_blank" rel="noopener" style={{ display: "inline-block", marginTop: "16px" }}>Open {tool.name} ↗</a>}
      </div>
    </div>
  );
}

function exportRoadmap(roadmap: Roadmap) {
  const lines: string[] = [];
  lines.push(`FLOWGENIX ROADMAP — ${roadmap.summary.specialtyLabel}`);
  lines.push(`${roadmap.shape} · ${roadmap.summary.purpose} · ${roadmap.summary.niches.join(", ")}`);
  lines.push("");
  if (roadmap.brief) {
    lines.push("STRATEGIC READ");
    lines.push("• The play: " + roadmap.brief.play);
    lines.push("• Nail this: " + roadmap.brief.nail);
    lines.push("• Watch out: " + roadmap.brief.risk);
    lines.push("");
  }
  if (roadmap.quickStart?.length) {
    lines.push("FIRST 3 MOVES");
    roadmap.quickStart.forEach((m: string) => lines.push("• " + m));
    lines.push("");
  }
  roadmap.steps.forEach((s, i) => {
    lines.push(`STEP ${i + 1} · ${s.label} · ${s.minutes}`);
    lines.push(`  Tool: ${s.primaryTool?.name || "—"}`);
    lines.push(`  In:   ${s.input}`);
    lines.push(`  Out:  ${s.output}`);
    lines.push(`  How:  ${s.how}`);
    lines.push(`  Pro:  ${s.proMove}`);
    lines.push(`  Avoid:${s.avoid}`);
    if (s.prompt) {
      lines.push(`  Prompt:`);
      s.prompt.split("\n").forEach((p) => lines.push("    " + p));
    }
    lines.push("");
  });
  const blob = new Blob([lines.join("\n")], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `flowgenix-${roadmap.summary.specialtyLabel.replace(/\s+/g, "-").toLowerCase()}.txt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ════════════════════════════════════════════════════════════════════════════
//  Styles — dark-primary space aesthetic with a sibling light mode
// ════════════════════════════════════════════════════════════════════════════
function Styles() {
  return <style>{CSS}</style>;
}

const CSS = `
/* ── Theme tokens ─────────────────────────────────────────────────────────── */
:root, [data-theme="dark"]{
  /* Visual identity — designed from image 2 (the spiral galaxy):
       • Background = jet black void. 99% of the image is black.
       • Accent palette = colors that actually appear IN the galaxy:
         - warm gold core (#FFC15E / #FFE6B0 hot center)
         - blue spiral arms (#4A7FE0)
         - violet inner ring (#8B5BD4)
         - dusty red-purple hint (#B8527C, used sparingly)
         - white starlight (#F2F4FA)
     No wide color gradients on the background — the void stays black, color appears
     ONLY on surfaces, text, and accents. Motion lives on text/section reveals. */
  --bg:#000000;
  --bg-elev:rgba(8,10,18,.86);
  --bg-card:rgba(12,14,24,.86);
  --bg-card-solid:#0A0C16;
  --text:#F2F4FA;
  --text-soft:#A8AEC2;
  --text-faint:#6A6F84;
  --line:rgba(160,170,200,.13);
  --line-strong:rgba(180,190,220,.28);
  --accent:#4A7FE0;           /* spiral-arm blue */
  --accent-soft:rgba(74,127,224,.14);
  --teal:#3EC1A7;
  --teal-soft:rgba(62,193,167,.14);
  --green:#4FA86A;
  --green-soft:rgba(79,168,106,.16);
  --amber:#FFC15E;            /* galactic core warm */
  --amber-soft:rgba(255,193,94,.16);
  --red:#B8527C;              /* dusty red-purple from inner ring */
  --red-soft:rgba(184,82,124,.14);
  --purple:#8B5BD4;           /* inner ring violet */
  --purple-soft:rgba(139,91,212,.18);
  --purple-glow:#A77BE8;
  --gold:#FFC15E;             /* primary highlight — the galactic core */
  --gold-soft:rgba(255,193,94,.18);
  --star:#E8ECF5;
  --star-dim:#5A607A;
  --star-bright:#FFE6B0;      /* hot core white */
  --brand:#F2F4FA;
  --shadow:0 10px 40px rgba(0,0,0,.65);
  --halo:0 0 22px rgba(255,193,94,.22),0 0 50px rgba(139,91,212,.14);
}
/* Light = "universe at dawn": a soft lavender-to-sky gradient, deep-violet ink, and
   jewel-tone stars (violet/indigo) instead of glowing gold — gold-on-white reads muddy. */
[data-theme="light"]{
  --bg:#EEF1FB;
  --bg-elev:rgba(255,255,255,.92);
  --bg-card:#FFFFFF;
  --text:#241B47;
  --text-soft:#4E4773;
  --text-faint:#867FA6;
  --line:rgba(60,45,120,.13);
  --line-strong:rgba(60,45,120,.24);
  --accent:#5A4BD6;
  --accent-soft:rgba(90,75,214,.14);
  --teal:#0E8C8C;
  --teal-soft:rgba(14,140,140,.13);
  --green:#3E8E5A;
  --green-soft:rgba(62,142,90,.15);
  --amber:#C77A2E;
  --amber-soft:rgba(199,122,46,.14);
  --red:#D24B6A;
  --red-soft:rgba(210,75,106,.12);
  --purple:#6B4BE0;
  --purple-soft:rgba(107,75,224,.16);
  --purple-glow:#7C5CF5;
  /* In light mode "gold" becomes a rich violet-magenta so star accents stay vivid, not muddy. */
  --gold:#8B5CF6;
  --gold-soft:rgba(139,92,246,.16);
  --star:#6B5CC4;
  --star-dim:#C4C0DC;
  --star-bright:#7C4DFF;
  --brand:#241B47;
  --shadow:0 6px 26px rgba(60,45,120,.14);
  --halo:0 0 22px rgba(124,77,255,.30),0 0 46px rgba(90,75,214,.20);
  /* cosmos atmosphere — pale dawn clouds */
  --cosmos-top:rgba(150,130,245,.30);
  --cosmos-bot:rgba(120,180,240,.26);
  --neb-a:#9B7DFF;
  --neb-b:#6BA8F0;
  --neb-c:#C89BFF;
}

/* ── Base ─────────────────────────────────────────────────────────────────── */
*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden;background:var(--bg) !important}
#root{margin:0;padding:0;background:var(--bg)}
#fg-boot{display:none !important}
.fg-root{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;line-height:1.55;position:relative;overflow-x:hidden;margin:0;padding:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
b{font-weight:700;color:var(--text)}

/* ── Cosmic background (fixed, always behind, alive) ─────────────────────── */
/* Pure black void. NO gradients, NO color washes. The galaxy lives in accents,
   not in the background. The body is the empty space between stars. */
.fg-cosmos{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;background:var(--bg)}
.fg-cosmos-svg{position:absolute;inset:0;width:100%;height:100%;opacity:.85}
[data-theme="light"] .fg-cosmos-svg{opacity:.50}
.fg-cosmic-star{fill:var(--star);opacity:var(--o,.5);animation:fgcosmic var(--d,4s) ease-in-out infinite}
@keyframes fgcosmic{0%,100%{opacity:calc(var(--o,.5) * .3)}50%{opacity:var(--o,.5)}}

/* shooting stars: a bright head with a fading tail streaking down-left */
.fg-shoot{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--star-bright);
  box-shadow:0 0 6px 1px var(--star-bright);opacity:0;
  animation-name:fgshoot;animation-timing-function:ease-in;animation-iteration-count:infinite;animation-fill-mode:both}
.fg-shoot::after{content:"";position:absolute;top:50%;right:0;width:90px;height:1px;transform-origin:right center;transform:translateY(-50%) rotate(28deg);
  background:linear-gradient(90deg,transparent,var(--star-bright))}
@keyframes fgshoot{0%{opacity:0;transform:translate(0,0) scale(.6)}6%{opacity:1}18%{opacity:1}30%{opacity:0;transform:translate(-220px,118px) scale(1)}100%{opacity:0;transform:translate(-220px,118px)}}
[data-theme="light"] .fg-shoot{opacity:0;background:var(--accent);box-shadow:0 0 5px 1px var(--accent)}
[data-theme="light"] .fg-shoot::after{background:linear-gradient(90deg,transparent,var(--accent))}

/* ── Layout: everything above background ─────────────────────────────────── */
/* Lift CONTENT above the fixed cosmos — but never the cosmos itself (it must stay fixed/behind).
   The :not(.fg-cosmos) guard is load-bearing: without it this rule's higher specificity yanks
   the background into normal flow, creating dead space at the top and killing the animations. */
.fg-root > section, .fg-root > div:not(.fg-cosmos) { position:relative; z-index:1; }

/* ── Top bar ──────────────────────────────────────────────────────────────── */
.fg-top{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;background:var(--bg-elev);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
.fg-logo-btn{padding:0}
.fg-logo{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.01em;color:var(--brand)}
.fg-logo-text{font-weight:800;letter-spacing:-.02em}
.fg-nav{display:flex;gap:4px;align-items:center}
.fg-nav-link{font-size:13.5px;font-weight:600;color:var(--text-soft);padding:7px 14px;border-radius:100px;transition:all .15s;background:transparent;border:none}
.fg-nav-link:hover{color:var(--text);background:var(--bg-card)}
.fg-nav-link.on{color:var(--text);background:var(--bg-card);border:1px solid var(--line)}
.fg-top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.fg-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);background:var(--gold-soft);padding:5px 11px;border-radius:100px;border:1px solid var(--gold-soft)}
.fg-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:fgblink 2.2s infinite}
@keyframes fgblink{0%,100%{opacity:1}50%{opacity:.35}}
.fg-layer{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:5px 11px;border-radius:100px;border:1px solid var(--line)}
.fg-layer-what,.fg-layer-deepen{color:var(--accent);background:var(--accent-soft)}
.fg-layer-how{color:var(--teal);background:var(--teal-soft)}
.fg-layer-why{color:var(--purple-glow);background:var(--purple-soft)}
.fg-theme-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:transparent;font-size:16px;color:var(--text);transition:all .15s}
.fg-theme-btn:hover{border-color:var(--gold);color:var(--gold)}
.fg-ai-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 12px;border-radius:100px;border:1px solid var(--purple);color:var(--purple-glow);background:var(--purple-soft);transition:all .15s}
.fg-ai-btn:hover,.fg-ai-btn.on{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 0 16px var(--purple-soft)}
.fg-ai-spark{font-size:14px}

/* ── Buttons ──────────────────────────────────────────────────────────────── */
/* Galaxy gradient: warm gold core → violet inner ring → spiral-arm blue.
   This is the same color sequence as the centerpiece SVG — the button literally
   carries the galaxy palette. */
.fg-btn-primary{position:relative;background:linear-gradient(120deg,#FFC15E 0%,#B85C9E 38%,#8B5BD4 65%,#4A7FE0 100%);color:#0A0712;font-weight:700;font-size:15px;padding:14px 28px;border-radius:100px;box-shadow:0 0 22px rgba(255,193,94,.32),0 0 46px rgba(139,91,212,.18);transition:transform .15s,box-shadow .15s;letter-spacing:.01em}
.fg-btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 0 28px rgba(255,193,94,.50),0 0 60px rgba(139,91,212,.32)}

.fg-btn-ghost{border:1px solid rgba(255,193,94,.32);background:rgba(255,193,94,.04);color:var(--gold);font-weight:600;font-size:14px;padding:12px 22px;border-radius:100px;transition:all .15s}
.fg-btn-ghost:hover{border-color:var(--gold);background:rgba(255,193,94,.12);color:var(--star-bright);box-shadow:0 0 16px rgba(255,193,94,.20)}
.fg-btn-back{color:var(--text-soft);font-size:14px;padding:11px 18px;border-radius:100px;border:1px solid var(--line);background:transparent;transition:all .15s}
.fg-btn-back:hover{border-color:var(--line-strong);color:var(--text)}

/* ── Hero ─────────────────────────────────────────────────────────────────── */
.fg-hero{position:relative;max-width:1100px;margin:0 auto;padding:60px 24px 60px;text-align:center;overflow:visible}
/* No standalone glow — the galaxy SVG below IS the centerpiece. Keep an empty
   element so existing markup doesn't break. */
.fg-hero-glow{display:none}
.fg-hero-constellation{position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:min(1320px,124%);height:auto;aspect-ratio:1600/1000;pointer-events:none;opacity:1;z-index:0;
  filter:drop-shadow(0 0 30px rgba(255,193,94,.18))}
[data-theme="light"] .fg-hero-constellation{opacity:.55;filter:none}
.fg-hero-star{animation:fgheropulse 4s ease-in-out infinite both}
@keyframes fgheropulse{0%,100%{opacity:.4}50%{opacity:1}}
.fg-hero-content{position:relative;z-index:2;padding:60px 0}
.fg-eyebrow{display:inline-block;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--gold);background:var(--gold-soft);padding:6px 14px;border-radius:100px;border:1px solid var(--gold-soft)}
.fg-hero-h{font-size:clamp(36px,7vw,68px);font-weight:800;line-height:1.05;letter-spacing:-.035em;margin:24px 0;color:var(--text)}

.fg-hero-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:30px}
.fg-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--line);border-radius:100px;padding:7px 14px;font-size:12.5px;color:var(--text-soft);backdrop-filter:blur(10px)}
.fg-pill-star{color:var(--gold);font-size:11px}

/* ── How it works ─────────────────────────────────────────────────────────── */
.fg-how{max-width:1100px;margin:0 auto;padding:60px 24px;text-align:center}
.fg-sec-eyebrow{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:var(--gold);margin-bottom:14px}
.fg-sec-h{font-size:clamp(26px,4vw,38px);font-weight:800;letter-spacing:-.025em;margin-bottom:8px;color:var(--text);line-height:1.15}
.fg-sec-sub{color:var(--text-soft);max-width:600px;margin:0 auto 32px;font-size:15px}
.fg-how-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:36px;text-align:left}
.fg-how-card{position:relative;background:var(--bg-card);border:1px solid var(--line);border-radius:18px;padding:28px;backdrop-filter:blur(20px);overflow:hidden;transition:border-color .2s,transform .2s}
.fg-how-card:hover{border-color:var(--accent);transform:translateY(-3px)}
.fg-how-card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top right,var(--purple-soft),transparent 60%);opacity:.5;pointer-events:none}
.fg-how-num{position:relative;font-size:36px;font-weight:800;color:var(--gold);letter-spacing:-.03em;margin-bottom:14px;text-shadow:0 0 18px var(--gold-soft)}
.fg-how-h{position:relative;font-size:18px;font-weight:700;margin:0 0 10px;color:var(--text)}
.fg-how-b{position:relative;font-size:14.5px;color:var(--text-soft);margin:0;line-height:1.6}

/* ── Fields strip ─────────────────────────────────────────────────────────── */
.fg-fields{max-width:1100px;margin:0 auto;padding:40px 24px 80px;text-align:center}

/* ── Tools showcase ───────────────────────────────────────────────────────── */
.fg-tools{max-width:1180px;margin:0 auto;padding:60px 24px 80px;text-align:center}
.fg-filterbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:30px 0 32px}

.fg-filter-count{display:inline-block;margin-left:6px;font-size:11px;font-weight:700;opacity:.6}

.fg-tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:14px;text-align:left}
.fg-tool-card{background:var(--bg-card);border:1px solid var(--line);border-radius:14px;padding:18px;transition:all .15s;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(10px)}
.fg-tool-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.fg-tool-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.fg-tool-cat{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:6px;color:var(--purple-glow);background:var(--purple-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;display:inline-block}
.fg-tool-name{font-weight:800;font-size:16px;color:var(--text)}
.fg-tool-task{font-size:13px;color:var(--text-soft);flex:1;line-height:1.5}
.fg-tool-foot{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-faint);margin-top:6px;padding-top:10px;border-top:1px solid var(--line)}
.fg-tool-price{font-weight:700;color:var(--teal)}

.fg-stars-off{color:var(--line-strong)}

/* ── Modal ────────────────────────────────────────────────────────────────── */
.fg-modal-bg{position:fixed;inset:0;background:rgba(2,3,10,.78);backdrop-filter:blur(8px);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;animation:fgFade .2s ease}
.fg-modal{background:var(--bg-card);border:1px solid var(--line-strong);border-radius:18px;max-width:520px;width:100%;max-height:88vh;overflow:auto;padding:30px;position:relative;backdrop-filter:blur(30px);box-shadow:var(--shadow),var(--halo)}
.fg-modal-x{position:absolute;top:14px;right:18px;font-size:26px;color:var(--text-soft);line-height:1;transition:color .15s}
.fg-modal-x:hover{color:var(--text)}
.fg-modal-h{font-size:24px;font-weight:800;color:var(--text);margin:12px 0 6px;letter-spacing:-.02em}
.fg-modal-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12.5px;color:var(--text-soft);margin-bottom:14px}
.fg-modal-task{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text)}
.fg-modal-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-top:18px;margin-bottom:4px}
.fg-modal-text{font-size:13.5px;color:var(--text-soft);line-height:1.6}
.fg-wgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin-top:8px}
.fg-wrow{display:flex;align-items:center;gap:8px}
.fg-wlbl{font-size:11px;color:var(--text-faint);width:78px}
.fg-wbar{flex:1;height:6px;background:var(--line);border-radius:4px;overflow:hidden}
.fg-wfill{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--purple))}

/* ── Quiz (constellation tree on side) ────────────────────────────────────── */
.fg-quiz{max-width:1100px;margin:0 auto;padding:40px 24px 80px;display:grid;grid-template-columns:300px 1fr;gap:50px;align-items:start}
.fg-quiz-tree{position:sticky;top:90px;display:flex;flex-direction:column;align-items:center;gap:14px}
.fg-tree{width:100%;max-width:300px;height:auto;filter:drop-shadow(0 0 30px var(--purple-soft))}
.fg-tree-branch{stroke:var(--line-strong);stroke-width:1.4;stroke-linecap:round;transition:stroke .9s,stroke-width .9s,filter .9s}
.fg-tree-branch.lit{stroke:url(#fgbranchlit);stroke-width:2.2;filter:drop-shadow(0 0 6px var(--gold))}
[data-theme="light"] .fg-tree-branch.lit{filter:drop-shadow(0 0 4px var(--gold-soft))}
.fg-tree-star .fg-tree-core{fill:var(--star-dim);transition:fill .7s}
.fg-tree-star.lit .fg-tree-core{fill:var(--star-bright);filter:drop-shadow(0 0 4px var(--star-bright))}
.fg-tree-star.next .fg-tree-core{fill:var(--purple-glow);transform-origin:center;animation:fgnextpulse 1.6s ease-in-out infinite;filter:drop-shadow(0 0 8px var(--purple-glow))}
@keyframes fgnextpulse{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.6);opacity:1}}
.fg-tree-halo{animation:fghalo 3.5s ease-in-out infinite}
@keyframes fghalo{0%,100%{opacity:.55}50%{opacity:1}}
.fg-tree-twinkle{animation:fgtwinkle 2.4s ease-in-out infinite}
@keyframes fgtwinkle{0%,100%{opacity:.7}50%{opacity:1}}
.fg-tree-petal{animation:fgpetal 4s ease-in-out infinite}
@keyframes fgpetal{0%,100%{opacity:0}40%,60%{opacity:.9}}
.fg-tree-caption{font-size:11.5px;color:var(--text-faint);letter-spacing:.04em;text-transform:uppercase;font-weight:600}

.fg-quiz-main{min-width:0}
.fg-q-card{background:var(--bg-card);border:1px solid var(--line);border-radius:20px;padding:36px;backdrop-filter:blur(20px);animation:fgUp .35s ease both;box-shadow:var(--shadow)}
@keyframes fgUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fgFade{from{opacity:0}to{opacity:1}}
/* ── Reveal-on-view: the animation lives here, not in the background. ────── */
@keyframes fgRevealUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes fgRevealGlow{
  0%{opacity:0;transform:translateY(14px);filter:blur(6px)}
  60%{opacity:1;filter:blur(0)}
  100%{opacity:1;transform:none;filter:blur(0)}
}
/* Word-shimmer for hero headlines: a single sweep of warm light across the text. */
@keyframes fgWordShimmer{
  0%{background-position:-180% 0}
  100%{background-position:280% 0}
}
[data-reveal]{opacity:0;transform:translateY(18px);will-change:opacity,transform}
[data-reveal].fg-in{animation:fgRevealUp .7s cubic-bezier(.22,.61,.36,1) both}
[data-reveal="glow"].fg-in{animation:fgRevealGlow .9s cubic-bezier(.22,.61,.36,1) both}
/* Stagger children of [data-reveal-group] — each direct child gets +90ms delay. */
[data-reveal-group] > [data-reveal]{transition-delay:0s}
[data-reveal-group].fg-in > [data-reveal]:nth-child(1){animation-delay:.00s}
[data-reveal-group].fg-in > [data-reveal]:nth-child(2){animation-delay:.09s}
[data-reveal-group].fg-in > [data-reveal]:nth-child(3){animation-delay:.18s}
[data-reveal-group].fg-in > [data-reveal]:nth-child(4){animation-delay:.27s}
[data-reveal-group].fg-in > [data-reveal]:nth-child(5){animation-delay:.36s}
[data-reveal-group].fg-in > [data-reveal]:nth-child(6){animation-delay:.45s}
[data-reveal-group].fg-in > [data-reveal]:nth-child(n+7){animation-delay:.54s}
/* Headline shimmer — applied via class .fg-shimmer-text. Single sweep on reveal. */
.fg-shimmer-text{
  background:linear-gradient(90deg,var(--text) 0%,var(--text) 40%,var(--star-bright) 50%,var(--text) 60%,var(--text) 100%);
  background-size:200% 100%;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
}
[data-reveal].fg-in .fg-shimmer-text{animation:fgWordShimmer 2.2s ease-out .3s 1 both}
@media (prefers-reduced-motion: reduce){
  [data-reveal],[data-reveal].fg-in{animation:none !important;opacity:1;transform:none}
  .fg-shimmer-text{animation:none !important;color:var(--text);-webkit-text-fill-color:var(--text)}
}
.fg-q-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.fg-q-layer-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.fg-q-title{font-size:clamp(22px,3.6vw,30px);font-weight:800;letter-spacing:-.025em;margin:0 0 10px;color:var(--text);line-height:1.2}
.fg-q-hint{color:var(--text-soft);margin-bottom:26px;font-size:14.5px;line-height:1.6}
.fg-multi-note{display:inline-block;font-size:11.5px;color:var(--purple-glow);font-weight:600;margin-bottom:16px;background:var(--purple-soft);padding:4px 10px;border-radius:6px}
.fg-opts{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.fg-opt{text-align:left;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14.5px;font-weight:600;color:var(--text);transition:all .14s;display:flex;flex-direction:column;gap:4px}
.fg-opt:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-1px)}
.fg-opt.sel{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent),0 0 14px var(--accent-soft)}
.fg-opt-hint{font-size:12.5px;font-weight:400;color:var(--text-soft);line-height:1.5}
.fg-compound{display:flex;flex-direction:column;gap:24px}
.fg-comp-label{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.fg-q-actions{display:flex;justify-content:space-between;margin-top:30px;gap:12px}

/* ── Loading transition (constellation → path handoff) ───────────────────── */
.fg-loading{max-width:600px;margin:0 auto;padding:60px 24px;display:flex;flex-direction:column;align-items:center;gap:24px;text-align:center;animation:fgFade .4s ease both}
.fg-loading-stage{position:relative;width:300px;max-width:70vw;height:300px}
.fg-loading-tree{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;animation:fgTreeRelease 1.9s ease-in forwards}
@keyframes fgTreeRelease{0%{transform:scale(1) translateY(0);opacity:1}55%{opacity:1}100%{transform:scale(1.5) translateY(-30px);opacity:0}}
.fg-rising-field{position:absolute;inset:0;pointer-events:none}
.fg-rising-star{position:absolute;bottom:30%;border-radius:50%;background:var(--star-bright);box-shadow:0 0 8px 2px var(--star-bright);opacity:0;animation-name:fgRise;animation-timing-function:ease-out;animation-iteration-count:infinite}
@keyframes fgRise{0%{opacity:0;transform:translateY(0) scale(.5)}20%{opacity:1}100%{opacity:0;transform:translateY(-180px) scale(1)}}
.fg-loading-text{animation:fgFade .8s ease both}
.fg-load-h{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-bottom:6px}
.fg-load-sub{color:var(--text-soft);font-size:15px}
.fg-spin{width:42px;height:42px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--purple-glow);animation:fgspin .9s linear infinite}
@keyframes fgspin{to{transform:rotate(360deg)}}

/* ── Roadmap header ───────────────────────────────────────────────────────── */
.fg-rm{max-width:920px;margin:0 auto;padding:40px 24px 80px;animation:fgRoadmapIn .8s cubic-bezier(.2,.7,.2,1) both}
@keyframes fgRoadmapIn{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:none}}
.fg-rm-head{margin-bottom:32px;text-align:center;animation:fgFade 1s ease both}
.fg-rm-shape{display:inline-block;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);background:var(--gold-soft);padding:6px 14px;border-radius:100px;border:1px solid var(--gold-soft)}
.fg-rm-h{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.03em;margin:18px 0 18px;text-transform:capitalize;color:var(--text);line-height:1.15}
.fg-rm-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.fg-tag{font-size:12.5px;color:var(--text-soft);background:var(--bg-card);border:1px solid var(--line);border-radius:100px;padding:5px 13px;text-transform:capitalize;backdrop-filter:blur(10px)}
.fg-tag b{color:var(--text);text-transform:none;margin-right:4px;font-weight:700}
.fg-tag-ai{color:var(--purple-glow);background:var(--purple-soft);border-color:var(--purple)}

/* ── Brief / quickstart / niche cards ─────────────────────────────────────── */
.fg-brief{background:linear-gradient(135deg,var(--purple-soft),var(--accent-soft));border:1px solid var(--purple);border-radius:18px;padding:24px 26px;margin-bottom:18px;backdrop-filter:blur(20px);box-shadow:0 0 30px var(--purple-soft)}
.fg-brief-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--purple-glow);margin-bottom:16px}
.fg-brief-row{display:flex;gap:14px;padding:10px 0;border-top:1px solid rgba(155,140,255,.18)}
.fg-brief-row:first-of-type{border-top:none;padding-top:0}
.fg-brief-k{flex-shrink:0;width:90px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--purple-glow);padding-top:2px}
.fg-brief-v{font-size:14.5px;color:var(--text);line-height:1.55;flex:1}

.fg-quickstart{background:linear-gradient(135deg,rgba(245,197,66,.12),rgba(155,140,255,.10));border:1px solid var(--gold);border-radius:18px;padding:22px 26px;margin-bottom:18px;backdrop-filter:blur(20px);box-shadow:0 0 30px rgba(245,197,66,.15)}
.fg-qs-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:14px}
.fg-qs-row{font-size:14.5px;line-height:1.6;padding:7px 0;border-top:1px solid rgba(245,197,66,.18);color:var(--text)}
.fg-qs-row:first-of-type{border-top:none}

.fg-niche{background:linear-gradient(135deg,var(--teal-soft),var(--accent-soft));border:1px solid var(--teal);border-radius:18px;padding:22px 26px;margin-bottom:18px;backdrop-filter:blur(20px)}
.fg-niche-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-bottom:18px}
.fg-niche-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px}
.fg-nf-l{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:5px}
.fg-nf-v{font-size:14px;color:var(--text);line-height:1.5}

.fg-fallback{background:var(--amber-soft);border:1px solid var(--amber);color:var(--amber);border-radius:14px;padding:12px 16px;font-size:13px;font-weight:600;margin-bottom:18px}
.fg-enhancing{display:flex;align-items:center;gap:12px;background:var(--purple-soft);border:1px solid var(--purple);color:var(--purple-glow);border-radius:14px;padding:12px 16px;font-size:13.5px;font-weight:600;margin-bottom:18px}
.fg-ai-error{background:var(--red-soft);border:1px solid var(--red);color:var(--red);border-radius:14px;padding:14px 18px;font-size:13px;margin-bottom:18px;line-height:1.6}
.fg-ai-error-msg{font-family:Consolas,monospace;font-size:11.5px;opacity:.85;word-break:break-all}
.fg-spin-sm{width:14px;height:14px;border-radius:50%;border:2px solid rgba(155,140,255,.3);border-top-color:var(--purple-glow);animation:fgspin .8s linear infinite;flex-shrink:0}

/* ── Star path ────────────────────────────────────────────────────────────── */
.fg-path-h{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);text-align:center;margin:28px 0 18px}
.fg-path{position:relative;padding-left:0;display:flex;flex-direction:column;gap:8px}
.fg-path-line{position:absolute;left:31px;top:18px;bottom:18px;width:2px;background:linear-gradient(180deg,var(--gold),var(--purple-glow),var(--accent));opacity:.45;border-radius:2px;pointer-events:none;box-shadow:0 0 12px var(--purple-soft);animation:fgPathShimmer 4s ease-in-out infinite}
@keyframes fgPathShimmer{0%,100%{opacity:.35}50%{opacity:.7}}
.fg-star-core{animation:fgStarBreathe 4s ease-in-out infinite}
.fg-star-step:nth-child(2n) .fg-star-core{animation-delay:1.3s}
.fg-star-step:nth-child(3n) .fg-star-core{animation-delay:2.1s}
.fg-star-step:nth-child(4n) .fg-star-core{animation-delay:.7s}
@keyframes fgStarBreathe{0%,100%{box-shadow:0 0 18px var(--gold),inset 0 0 8px rgba(255,255,255,.4)}50%{box-shadow:0 0 30px var(--gold),0 0 50px var(--gold-soft),inset 0 0 10px rgba(255,255,255,.55)}}
.fg-star-step{position:relative;display:grid;grid-template-columns:64px 1fr;gap:14px;align-items:start;padding:14px 0;transition:all .25s;animation:fgStarFadeIn .6s ease both}
.fg-star-step:nth-child(1){animation-delay:.05s}
.fg-star-step:nth-child(2){animation-delay:.18s}
.fg-star-step:nth-child(3){animation-delay:.30s}
.fg-star-step:nth-child(4){animation-delay:.42s}
.fg-star-step:nth-child(5){animation-delay:.54s}
.fg-star-step:nth-child(6){animation-delay:.66s}
.fg-star-step:nth-child(7){animation-delay:.78s}
.fg-star-step:nth-child(8){animation-delay:.90s}
.fg-star-step:nth-child(9){animation-delay:1.02s}
.fg-star-step:nth-child(10){animation-delay:1.14s}
.fg-star-step:nth-child(11){animation-delay:1.26s}
.fg-star-step:nth-child(12){animation-delay:1.38s}
@keyframes fgStarFadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.fg-star-step:hover .fg-star-orbit{opacity:.7;transform:scale(1.2)}
.fg-star-node{position:relative;width:64px;height:64px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;cursor:pointer}
.fg-star-orbit{position:absolute;inset:6px;border-radius:50%;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);opacity:.5;transition:all .3s;filter:blur(2px)}
.fg-star-step.open .fg-star-orbit{opacity:1;transform:scale(1.3);background:radial-gradient(circle,var(--purple-glow) 0%,transparent 70%)}
.fg-star-core{position:relative;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--star-bright));display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--gold),inset 0 0 8px rgba(255,255,255,.4);transition:all .3s;z-index:2}
.fg-star-step.open .fg-star-core{background:linear-gradient(135deg,var(--purple-glow),var(--gold));box-shadow:0 0 28px var(--purple-glow),inset 0 0 10px rgba(255,255,255,.5);transform:scale(1.1)}
.fg-star-num{font-size:13px;font-weight:800;color:#0B0F1C}
.fg-star-summary{flex:1;text-align:left;background:transparent;padding:14px 18px;border-radius:14px;display:flex;flex-direction:column;gap:4px;transition:background .15s,border-color .15s;border:1px solid transparent;cursor:pointer;min-width:0}
.fg-star-step:hover .fg-star-summary{background:var(--bg-card);border-color:var(--line)}
.fg-star-step.open .fg-star-summary{background:var(--bg-card);border-color:var(--purple);box-shadow:var(--halo)}
.fg-star-name{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.01em;line-height:1.25}
.fg-star-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12.5px}
.fg-star-tool{font-weight:700;color:var(--gold);background:var(--gold-soft);padding:2px 9px;border-radius:6px}
.fg-star-mins{color:var(--text-faint);font-weight:600}
.fg-star-goal{font-size:13.5px;color:var(--text-soft);line-height:1.5}

.fg-star-detail{grid-column:1 / -1;margin-left:78px;background:var(--bg-card);border:1px solid var(--purple);border-radius:16px;padding:22px;animation:fgUp .35s ease both;box-shadow:var(--halo);backdrop-filter:blur(20px)}
.fg-section-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin:18px 0 8px}
.fg-section-label:first-child{margin-top:0}
.fg-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 14px;background:var(--bg);border:1px solid var(--line);border-radius:12px;font-size:12.5px;color:var(--text-soft)}
.fg-flow-cell{line-height:1.4}
.fg-flow-cell b{color:var(--text-faint);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:4px;font-weight:700}
.fg-flow-cell.tool{font-weight:800;color:var(--gold);background:var(--gold-soft);padding:4px 10px;border-radius:6px;font-size:12.5px}
.fg-flow-cell.out{color:var(--text);font-weight:600}
.fg-flow-arrow{color:var(--text-faint);font-weight:800}
.fg-how-text{font-size:14.5px;color:var(--text);line-height:1.7;background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:14px 16px;margin:0}
.fg-coach{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.fg-coach-cell{font-size:13px;line-height:1.55;border-radius:10px;padding:12px 14px}
.fg-coach-cell .fg-coach-k{display:block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.fg-coach-cell.pro{background:var(--green-soft);color:var(--text);border:1px solid var(--green-soft)}
.fg-coach-cell.pro .fg-coach-k{color:var(--green)}
.fg-coach-cell.avoid{background:var(--red-soft);color:var(--text);border:1px solid var(--red-soft)}
.fg-coach-cell.avoid .fg-coach-k{color:var(--red)}

.fg-prompt{margin-top:14px;border:1px solid var(--line-strong);border-radius:12px;overflow:hidden;background:#05070F}
.fg-prompt-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#080B18;color:var(--text-soft);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--line)}
.fg-copy-btn{font-size:11px;font-weight:700;color:#fff;background:var(--accent);border-radius:6px;padding:5px 12px;transition:background .15s}
.fg-copy-btn:hover{background:var(--purple)}
.fg-prompt-body{margin:0;padding:14px;color:#D8E2F0;font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.65;white-space:pre-wrap;word-break:break-word;max-height:280px;overflow:auto}

.fg-tool-list{display:flex;flex-direction:column;gap:8px}
.fg-rt{display:flex;gap:12px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;transition:border-color .15s}
.fg-rt:hover{border-color:var(--accent)}
.fg-rt.rt-1{border-color:var(--gold);background:var(--gold-soft)}
.fg-rt-rank{flex-shrink:0;font-weight:800;font-size:13px;color:var(--gold);width:26px}
.fg-rt-info{flex:1}
.fg-rt-name{font-weight:700;font-size:14.5px;color:var(--text)}
.fg-rt-score{font-weight:500;font-size:11.5px;color:var(--text-faint);margin-left:6px}
.fg-rt-why{font-size:13px;color:var(--text-soft);margin:4px 0 8px;line-height:1.55}

.fg-cta-band{position:relative;padding:80px 24px;margin-top:40px;text-align:center;overflow:hidden}

/* ── Footer ───────────────────────────────────────────────────────────────── */
.fg-footer{border-top:1px solid var(--line);margin-top:0;padding:36px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(2,3,10,.55);backdrop-filter:blur(20px)}

/* ── Input ────────────────────────────────────────────────────────────────── */
.fg-input{width:100%;border:1.5px solid var(--line);background:var(--bg);color:var(--text);border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;margin-top:4px;transition:border-color .15s}
.fg-input:focus{outline:none;border-color:var(--purple)}
.fg-modal-note{font-size:11.5px;color:var(--text-faint);margin-top:10px;line-height:1.5}

/* ── Mobile responsiveness ───────────────────────────────────────────────── */
@media (max-width:880px){
  .fg-quiz{grid-template-columns:1fr;gap:24px}
  .fg-quiz-tree{position:relative;top:0;flex-direction:row;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg-card);border:1px solid var(--line);border-radius:18px;backdrop-filter:blur(20px)}

  .fg-star-num{font-size:11px}
  .fg-star-summary{padding:10px 12px}
  .fg-star-name{font-size:15px}

/* ── Belief band (home) ──────────────────────────────────────────────────── */
.fg-belief{position:relative;padding:80px 24px 60px;text-align:center;overflow:hidden}

.fg-belief-p{color:var(--text-soft);font-size:16px;line-height:1.7;max-width:640px;margin:0 auto}

/* ── Explore page ────────────────────────────────────────────────────────── */

.fg-explore-h{font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.03em;line-height:1.15;color:var(--text);margin:14px 0 16px}
.fg-explore-p{color:var(--text-soft);font-size:16px;line-height:1.65;max-width:640px;margin:0 auto 28px}
.fg-search-wrap{position:relative;max-width:520px;margin:0 auto 8px;display:flex;align-items:center}

.fg-search-input{width:100%;background:var(--bg-card);border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:15px;padding:13px 44px 13px 44px;border-radius:12px;outline:none;transition:all .15s}

[data-theme="dark"] .fg-sec-eyebrow{

  background:linear-gradient(90deg,rgba(255,193,94,.18),rgba(184,82,124,.14));
  border:1px solid rgba(255,193,94,.34);
  box-shadow:0 0 14px rgba(255,193,94,.14);
}

[data-theme="dark"] .fg-pill{
  background:linear-gradient(135deg,rgba(255,193,94,.06),rgba(74,127,224,.08));
  border:1px solid rgba(255,193,94,.18);
  color:#E8ECF5;
}
[data-theme="dark"] .fg-pill:nth-child(2){border-color:rgba(139,91,212,.24)}
[data-theme="dark"] .fg-pill:nth-child(3){border-color:rgba(74,127,224,.24)}
[data-theme="dark"] .fg-pill:nth-child(4){border-color:rgba(184,82,124,.24)}
[data-theme="dark"] .fg-pill-star{color:var(--gold)}
/* Cards: dark base + subtle warm cast inside + colorful gradient border on hover.
   The gradient border uses a layered background to draw a 1px colored outline. */
[data-theme="dark"] .fg-how-card,
[data-theme="dark"] .fg-tool-card,
[data-theme="dark"] .fg-q-card{
  background:
    linear-gradient(135deg,rgba(255,193,94,.04),rgba(139,91,212,.05) 55%,rgba(74,127,224,.05)) padding-box,
    linear-gradient(135deg,rgba(255,193,94,.22),rgba(139,91,212,.18) 55%,rgba(74,127,224,.22)) border-box;
  border:1px solid transparent;
  transition:transform .18s,box-shadow .18s,background .18s;
}
[data-theme="dark"] .fg-how-card:hover,
[data-theme="dark"] .fg-tool-card:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 32px rgba(255,193,94,.10),0 0 24px rgba(139,91,212,.12);
}
/* How-card numerals get the warm gold */
[data-theme="dark"] .fg-how-num{
  color:transparent;
  background:linear-gradient(120deg,#FFC15E,#B85C9E);
  -webkit-background-clip:text;background-clip:text;
  font-weight:800;
}
/* Field chips on the strip — variety per chip so the row feels like a constellation */
[data-theme="dark"] .fg-field-chip{
  background:rgba(12,14,24,.7);
  border:1px solid rgba(160,170,200,.18);
  color:var(--text-soft);
}
[data-theme="dark"] .fg-field-chip.live{
  background:linear-gradient(120deg,rgba(255,193,94,.16),rgba(184,82,124,.12));
  border-color:rgba(255,193,94,.45);
  color:#FFE6B0;
  box-shadow:0 0 18px rgba(255,193,94,.18);
}
/* CTA band — gentle galactic gradient fill so the bottom CTA feels like the core */
[data-theme="dark"] .fg-cta-band{
  background:
    radial-gradient(ellipse 60% 80% at 50% 50%, rgba(255,193,94,.10), transparent 60%),
    radial-gradient(ellipse 70% 60% at 30% 30%, rgba(139,91,212,.10), transparent 60%),
    radial-gradient(ellipse 70% 60% at 70% 70%, rgba(74,127,224,.10), transparent 60%);
  border-top:1px solid rgba(255,193,94,.16);
  border-bottom:1px solid rgba(74,127,224,.14);
}
/* The hero gradient text — use the full galaxy sweep */
[data-theme="dark"] .fg-grad{
  background:linear-gradient(120deg,#FFE6B0 0%,#FFC15E 28%,#B85C9E 55%,#8B5BD4 78%,#4A7FE0 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
/* Topbar — add a thin gold line at the bottom so it's not invisible */
[data-theme="dark"] .fg-top{
  border-bottom:1px solid rgba(255,193,94,.16);
  background:linear-gradient(180deg,rgba(8,10,18,.92),rgba(8,10,18,.7));
}

[data-theme="dark"] .fg-logo-text{
  background:linear-gradient(120deg,#FFE6B0,#FFC15E 40%,#8B5BD4);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}

[data-theme="dark"] .fg-nav-link.on{color:var(--gold);text-shadow:0 0 14px rgba(255,193,94,.4)}

[data-theme="dark"] .fg-field-pick{

}
[data-theme="dark"] .fg-field-pick:hover{
  border-color:rgba(255,193,94,.55);
  box-shadow:0 0 24px rgba(255,193,94,.18);
}
